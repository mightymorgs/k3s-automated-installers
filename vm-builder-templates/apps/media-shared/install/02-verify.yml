- name: Verify Media Shared Storage
  hosts: "{{ target_hosts | default('localhost') }}"
  gather_facts: false
  become: false

  vars:
    app_name: media-shared
    app_namespace: "media-stack"

    # Global timeout constants
    health_probe_timeout_seconds: 5
    retry_interval_seconds: 10

  tasks:
    # ========== 1. CHECK PVC IS BOUND ==========
    - name: Check PVC is bound
      ansible.builtin.command: >-
        kubectl -n {{ app_namespace }} get pvc media-shared-pvc
        -o jsonpath='{.status.phase}'
      register: pvc_phase
      changed_when: false
      failed_when: pvc_phase.stdout != 'Bound'
      retries: 3
      delay: "{{ retry_interval_seconds }}"
      until: pvc_phase.rc == 0 and pvc_phase.stdout == 'Bound'

    # ========== 2. CHECK PVC CAPACITY ==========
    - name: Get PVC capacity
      ansible.builtin.command: >-
        kubectl -n {{ app_namespace }} get pvc media-shared-pvc
        -o jsonpath='{.status.capacity.storage}'
      register: pvc_capacity
      changed_when: false

    # ========== 3. DISPLAY VERIFICATION SUMMARY ==========
    - name: Display verification summary
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "Media Shared Storage Verification Summary"
          - "=========================================="
          - "PVC Phase:    {{ pvc_phase.stdout }} -- OK"
          - "Capacity:     {{ pvc_capacity.stdout | default('unknown') }}"
          - "=========================================="
