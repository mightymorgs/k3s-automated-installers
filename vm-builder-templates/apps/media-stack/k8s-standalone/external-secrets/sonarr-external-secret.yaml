---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: sonarr-secrets
  namespace: media-stack
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: sonarr-secrets
    creationPolicy: Owner
  data:
    - secretKey: api_key
      remoteRef:
        key: secret/apps/media-stack/sonarr
        property: api_key
    - secretKey: url
      remoteRef:
        key: secret/apps/media-stack/sonarr
        property: url
    - secretKey: nodeport_url
      remoteRef:
        key: secret/apps/media-stack/sonarr
        property: nodeport_url
