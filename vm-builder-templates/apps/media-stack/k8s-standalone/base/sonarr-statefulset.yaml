---
# Sonarr StatefulSet
# TV show PVR for automated downloads
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: sonarr
  namespace: media-stack
  labels:
    app: sonarr
    app.kubernetes.io/name: sonarr
    app.kubernetes.io/component: pvr
spec:
  serviceName: sonarr
  replicas: 1
  selector:
    matchLabels:
      app: sonarr
  template:
    metadata:
      labels:
        app: sonarr
    spec:
      containers:
        - name: sonarr
          image: lscr.io/linuxserver/sonarr:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "Australia/Sydney"
          ports:
            - name: http
              containerPort: 8989
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /config
            - name: nfs-media
              mountPath: /media
              subPath: media
            - name: nfs-media
              mountPath: /downloads
              subPath: downloads
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: nfs-media
          persistentVolumeClaim:
            claimName: nfs-media-pvc
  volumeClaimTemplates:
    - metadata:
        name: config
        labels:
          app: sonarr
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: longhorn
        resources:
          requests:
            storage: 5Gi
