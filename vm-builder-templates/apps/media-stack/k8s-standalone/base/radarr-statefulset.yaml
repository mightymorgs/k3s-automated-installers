---
# Radarr StatefulSet
# Movie PVR
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: radarr
  namespace: media-stack
  labels:
    app: radarr
    app.kubernetes.io/name: radarr
    app.kubernetes.io/component: movie-pvr
spec:
  serviceName: radarr
  replicas: 1
  selector:
    matchLabels:
      app: radarr
  template:
    metadata:
      labels:
        app: radarr
    spec:
      containers:
        - name: radarr
          image: lscr.io/linuxserver/radarr:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "Australia/Sydney"
          ports:
            - name: http
              containerPort: 7878
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /config
            - name: nfs-media
              mountPath: /media
              subPath: media
            - name: nfs-media
              mountPath: /downloads
              subPath: downloads
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: nfs-media
          persistentVolumeClaim:
            claimName: nfs-media-pvc
  volumeClaimTemplates:
    - metadata:
        name: config
        labels:
          app: radarr
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: longhorn
        resources:
          requests:
            storage: 5Gi
