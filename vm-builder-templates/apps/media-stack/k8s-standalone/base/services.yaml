---
# Sonarr Service
# NOTE: Using LoadBalancer temporarily until IngressRoute CRD issues resolved
apiVersion: v1
kind: Service
metadata:
  name: sonarr
  namespace: media-stack
  labels:
    app: sonarr
spec:
  type: LoadBalancer
  selector:
    app: sonarr
  ports:
    - name: http
      port: 8989
      targetPort: 8989
      protocol: TCP

