---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: radarr
  namespace: media-stack
  labels:
    app: radarr
    app.kubernetes.io/name: radarr
    app.kubernetes.io/component: movie-pvr
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`radarr.local`) || PathPrefix(`/radarr`)
      kind: Rule
      services:
        - name: radarr
          port: 7878
