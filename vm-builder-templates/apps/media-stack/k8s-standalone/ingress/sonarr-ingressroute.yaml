---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: sonarr
  namespace: media-stack
  labels:
    app: sonarr
    app.kubernetes.io/name: sonarr
    app.kubernetes.io/component: tv-pvr
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`sonarr.local`) || PathPrefix(`/sonarr`)
      kind: Rule
      services:
        - name: sonarr
          port: 8989
