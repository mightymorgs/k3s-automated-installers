- name: Wait for Media Stack Readiness
  hosts: "{{ target_hosts | default('localhost') }}"
  gather_facts: false
  become: false

  vars:
    media_namespace: media-stack
    apps:
      - name: sonarr
        port: 8989
      - name: radarr
        port: 7878
      - name: sabnzbd
        port: 8080
      - name: prowlarr
        port: 9696
      - name: qbittorrent
        port: 8081

    # Global timeout constants
    app_start_timeout_seconds: 600
    retry_interval_seconds: 10

  tasks:
    - name: Wait for StatefulSet pods to be ready
      ansible.builtin.command: >-
        kubectl -n {{ media_namespace }} wait
        --for=condition=ready pod
        -l app={{ item.name }}
        --timeout={{ app_start_timeout_seconds }}s
      loop: "{{ apps }}"
      register: pod_wait
      changed_when: false
      retries: 3
      delay: "{{ retry_interval_seconds }}"
      until: pod_wait.rc == 0

    - name: Check PVC status for each app
      ansible.builtin.command: >-
        kubectl -n {{ media_namespace }} get pvc
        -l app={{ item.name }}
        -o jsonpath='{.items[*].status.phase}'
      loop: "{{ apps }}"
      register: pvc_status
      changed_when: false

    - name: Verify all PVCs are bound
      ansible.builtin.assert:
        that:
          - item.stdout == 'Bound' or item.stdout == ''
        fail_msg: "PVC for {{ item.item.name }} is not bound: {{ item.stdout }}"
      loop: "{{ pvc_status.results }}"
      when: item.stdout | length > 0

    - name: Get pod status summary
      ansible.builtin.command: kubectl -n {{ media_namespace }} get pods -o wide
      register: pod_summary
      changed_when: false

    - name: Display pod status
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "Media Stack Pod Status"
          - "=========================================="
          - "{{ pod_summary.stdout_lines }}"
          - "=========================================="
