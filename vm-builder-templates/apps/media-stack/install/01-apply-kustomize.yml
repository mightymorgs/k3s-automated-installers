- name: Deploy Media Stack via Kustomize
  hosts: "{{ target_hosts | default('localhost') }}"
  gather_facts: true
  become: false

  vars:
    # Storage backend: 'longhorn' (cloud/default) or 'nfs-homelab' (local NAS)
    media_storage_backend: "{{ storage_backend | default('longhorn') }}"
    # Default to GCP overlay when not specified
    kustomize_path: "{{ kustomize_path_override | default(playbook_dir + '/../k8s-standalone/overlays/gcp') }}"
    media_namespace: media-stack

    # Global timeout constants
    app_start_timeout_seconds: 600
    retry_interval_seconds: 10
    health_probe_timeout_seconds: 5

  tasks:
    - name: Display storage configuration
      ansible.builtin.debug:
        msg: "Deploying media stack with storage backend: {{ media_storage_backend }}"

    - name: Verify kubectl is available
      ansible.builtin.command: kubectl version --client
      register: kubectl_check
      changed_when: false

    - name: Verify K3s cluster is accessible
      ansible.builtin.command: kubectl get nodes
      register: nodes_check
      changed_when: false
      retries: 5
      delay: 10
      until: nodes_check.rc == 0

    - name: Check if Longhorn storage class exists
      ansible.builtin.command: kubectl get storageclass longhorn
      register: longhorn_sc
      changed_when: false
      failed_when: false
      when: media_storage_backend == 'longhorn'

    - name: Fail if Longhorn not available (when using longhorn backend)
      ansible.builtin.fail:
        msg: "Longhorn storage class not found. Install Longhorn before deploying media stack with longhorn backend."
      when: media_storage_backend == 'longhorn' and longhorn_sc.rc != 0

    - name: Ensure namespace exists
      ansible.builtin.shell: |
        kubectl create namespace {{ media_namespace }} --dry-run=client -o yaml | kubectl apply -f -
      register: ns_apply
      changed_when: "'created' in ns_apply.stdout or 'configured' in ns_apply.stdout"

    - name: Label namespace
      ansible.builtin.command: >-
        kubectl label namespace {{ media_namespace }}
        app.kubernetes.io/name=media-stack
        app.kubernetes.io/part-of=golden-master
        --overwrite
      changed_when: false

    - name: Apply media stack Kustomize manifests
      ansible.builtin.command:
        cmd: kubectl apply -k {{ kustomize_path }}
      register: kustomize_apply
      changed_when: "'created' in kustomize_apply.stdout or 'configured' in kustomize_apply.stdout"

    - name: Display applied resources
      ansible.builtin.debug:
        msg: "{{ kustomize_apply.stdout_lines }}"
