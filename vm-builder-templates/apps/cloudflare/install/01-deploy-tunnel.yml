#     K8s Deployment with tunnel token, and write tunnel state to BWS.
#   bws_state:
#     reads:
#       - path: "cloudflare.api_token_key"
#         purpose: "Cloudflare API authentication"
#       - path: "cloudflare.account_id_key"
#         purpose: "Cloudflare account for tunnel API"
#     writes:
#       - path: "_state.cloudflare.tunnel_id"
