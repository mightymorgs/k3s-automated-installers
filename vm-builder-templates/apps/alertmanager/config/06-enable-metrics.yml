---
# playbook_metadata:
#   id: "atomic/apps/alertmanager/06-enable-metrics"
#   type: "atomic"
#
#   # ========== FILE LOCATION ==========
#   path_info:
#     file_path: "atomic/apps/alertmanager/config/06-enable-metrics.yml"
#     category: "apps"
#     subsystem: "alertmanager"
#
#   # ========== TRADITIONAL METADATA ==========
#   batch_id: "20260225_prometheus_metrics"
#   dependencies: ["alertmanager_deployed"]
#   provides: ["alertmanager_metrics_enabled"]
#   tags: ["alertmanager", "prometheus", "metrics", "observability", "phase4"]
#   estimated_duration: 30
#   parallel_safe: false
#   idempotent: true
#   description: >-
#     Add Prometheus scrape annotations to the Alertmanager workload.
#     Alertmanager natively exposes metrics on port 9093 at /metrics.
#     This playbook discovers whether Alertmanager runs as a statefulset
#     or deployment, then adds pod-level annotations so Prometheus
#     auto-discovers and scrapes the metrics endpoint via its
#     kubernetes-pods scrape config.
#   requires_apps: ["alertmanager", "prometheus"]

- name: Enable Prometheus metrics scraping for Alertmanager
  hosts: "{{ target_hosts | default('localhost') }}"
  gather_facts: false
  become: false

  vars:
    alertmanager_namespace: "alertmanager"
    app_namespace: "{{ alertmanager_namespace }}"
  tasks:
    # ========== CHECK IF ALERTMANAGER IS DEPLOYED ==========
    - name: Check if Alertmanager pod is running
      ansible.builtin.command:
        cmd: kubectl get pod -n {{ app_namespace }} -l app=alertmanager --no-headers
      environment:
        KUBECONFIG: "{{ kubeconfig_path | default('/etc/rancher/k3s/k3s.yaml') }}"
      register: alertmanager_pod_check
      changed_when: false
      failed_when: false

    - name: Skip if Alertmanager not deployed
      ansible.builtin.debug:
        msg: "Alertmanager not deployed - skipping metrics configuration"
      when: alertmanager_pod_check.rc != 0 or alertmanager_pod_check.stdout | length == 0

    - name: End play if Alertmanager not available
      ansible.builtin.meta: end_play
      when: alertmanager_pod_check.rc != 0 or alertmanager_pod_check.stdout | length == 0

    # ========== DISCOVER WORKLOAD TYPE ==========
    # Alertmanager may run as a StatefulSet or Deployment depending on
    # the Helm chart or manifest used. Check StatefulSet first.
    - name: Check for Alertmanager statefulset
      ansible.builtin.command:
        cmd: >-
          kubectl get statefulset -n {{ app_namespace }}
          -l app=alertmanager
          -o jsonpath='{.items[0].metadata.name}'
      environment:
        KUBECONFIG: "{{ kubeconfig_path | default('/etc/rancher/k3s/k3s.yaml') }}"
      register: sts_check
      changed_when: false
      failed_when: false

    - name: Check for Alertmanager deployment
      ansible.builtin.command:
        cmd: >-
          kubectl get deployment -n {{ app_namespace }}
          -l app=alertmanager
          -o jsonpath='{.items[0].metadata.name}'
      environment:
        KUBECONFIG: "{{ kubeconfig_path | default('/etc/rancher/k3s/k3s.yaml') }}"
      register: deploy_check
      changed_when: false
      failed_when: false
      when: sts_check.stdout | length == 0

    - name: Set workload facts
      ansible.builtin.set_fact:
        workload_kind: "{{ 'statefulset' if sts_check.stdout | length > 0 else 'deployment' }}"
        workload_name: "{{ sts_check.stdout if sts_check.stdout | length > 0 else (deploy_check.stdout | default('alertmanager')) }}"

    # ========== CHECK IF ANNOTATIONS ALREADY PRESENT ==========
    - name: Check if prometheus annotations already present
      ansible.builtin.command:
        cmd: >-
          kubectl get {{ workload_kind }} {{ workload_name }} -n {{ app_namespace }}
          -o jsonpath='{.spec.template.metadata.annotations.prometheus\.io/scrape}'
      environment:
        KUBECONFIG: "{{ kubeconfig_path | default('/etc/rancher/k3s/k3s.yaml') }}"
      register: current_scrape
      changed_when: false
      failed_when: false

    # ========== ADD PROMETHEUS SCRAPE ANNOTATIONS ==========
    - name: Add Prometheus scrape annotations to Alertmanager
      ansible.builtin.command:
        cmd: >-
          kubectl patch {{ workload_kind }} {{ workload_name }} -n {{ app_namespace }} --type merge -p
          '{"spec":{"template":{"metadata":{"annotations":{"prometheus.io/scrape":"true","prometheus.io/port":"9093","prometheus.io/path":"/metrics"}}}}}'
      environment:
        KUBECONFIG: "{{ kubeconfig_path | default('/etc/rancher/k3s/k3s.yaml') }}"
      register: patch_result
      changed_when: "'patched' in patch_result.stdout"
      when: current_scrape.stdout != "true"

    - name: Annotations already present
      ansible.builtin.debug:
        msg: "Prometheus scrape annotations already present on {{ workload_kind }}/{{ workload_name }} - skipping"
      when: current_scrape.stdout == "true"

    # ========== WAIT FOR ROLLOUT ==========
    - name: Wait for Alertmanager rollout to complete
      ansible.builtin.command:
        cmd: kubectl rollout status {{ workload_kind }}/{{ workload_name }} -n {{ app_namespace }} --timeout=120s
      environment:
        KUBECONFIG: "{{ kubeconfig_path | default('/etc/rancher/k3s/k3s.yaml') }}"
      changed_when: false
      when: current_scrape.stdout != "true"

    # ========== DISPLAY RESULT ==========
    - name: Display configuration result
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "Alertmanager Prometheus Metrics Enabled"
          - "=========================================="
          - "Target: {{ workload_kind }}/{{ workload_name }}"
          - "Namespace: {{ app_namespace }}"
          - "Scrape Port: 9093"
          - "Metrics Path: /metrics"
          - "Status: {{ 'Annotations added' if current_scrape.stdout != 'true' else 'Already configured' }}"
          - "=========================================="
