---
# playbook_metadata:
#   id: "atomic/apps/langfuse/06-wire-vault-secrets"
#   type: "atomic"
#
#   # ========== FILE LOCATION ==========
#   path_info:
#     file_path: "atomic/apps/langfuse/config/06-wire-vault-secrets.yml"
#     category: "apps"
#     subsystem: "langfuse"
#
#   # ========== TRADITIONAL METADATA ==========
#   dependencies: ["langfuse_deployed", "vault_deployed", "external_secrets_vault_wired"]
#   provides: ["langfuse_vault_secrets_configured"]
#   tags: ["langfuse", "vault", "external-secrets", "secrets", "phase4"]
#   estimated_duration: 60
#   parallel_safe: false
#   idempotent: true
#   description: >-
#     Replace hardcoded Langfuse secrets with an ExternalSecret CRD that
#     pulls nextauth_secret and salt from Vault path apps/data/langfuse/.
#     Requires a working ClusterSecretStore (vault-backend) from the
#     external-secrets/04-wire-vault playbook. Creates the ExternalSecret
#     in the ai-tools namespace.
#   requires_apps: ["langfuse", "vault", "external-secrets"]
#
#   # ========== BWS STATE INTERACTION ==========
#   bws_state: {}

- name: Wire Vault Secrets into Langfuse via ExternalSecret
  hosts: "{{ target_hosts | default('localhost') }}"
  gather_facts: false
  become: false

  vars:
    external_secrets_namespace: "external-secrets"
    langfuse_namespace: "ai-tools"
    vault_kv_path: "apps/data/langfuse"
    store_name: vault-backend
    external_secret_name: langfuse-vault-secrets
    k8s_secret_name: langfuse-vault-secrets
    kubeconfig: "{{ kubeconfig_path | default('/etc/rancher/k3s/k3s.yaml') }}"

  tasks:
    # ========== VALIDATE PREREQUISITES ==========
    - name: Check if External Secrets Operator is running
      ansible.builtin.command:
        cmd: >-
          kubectl get deployment -n {{ external_secrets_namespace }}
          -l app.kubernetes.io/name=external-secrets
          --no-headers
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: eso_check
      changed_when: false
      failed_when: false

    - name: End play if ESO not deployed
      ansible.builtin.meta: end_play
      when: eso_check.rc != 0 or eso_check.stdout | length == 0

    - name: Check if ClusterSecretStore vault-backend exists and is Ready
      ansible.builtin.command:
        cmd: >-
          kubectl get clustersecretstore {{ store_name }}
          -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}'
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: css_check
      changed_when: false
      failed_when: false

    - name: Warn if ClusterSecretStore not ready
      ansible.builtin.debug:
        msg: >-
          WARNING: ClusterSecretStore '{{ store_name }}' is not Ready
          (status: {{ css_check.stdout | default('not found') }}).
          ExternalSecret may not sync. Run external-secrets/04-wire-vault first.
      when: css_check.rc != 0 or css_check.stdout != 'True'

    # ========== CHECK IF NAMESPACE EXISTS ==========
    - name: Check if Langfuse namespace exists
      ansible.builtin.command:
        cmd: kubectl get namespace {{ langfuse_namespace }} --no-headers
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: ns_check
      changed_when: false
      failed_when: false

    - name: End play if Langfuse namespace does not exist
      ansible.builtin.meta: end_play
      when: ns_check.rc != 0 or ns_check.stdout | length == 0

    # ========== CHECK IF EXTERNALSECRET ALREADY EXISTS ==========
    - name: Check if ExternalSecret already exists
      ansible.builtin.command:
        cmd: >-
          kubectl get externalsecret {{ external_secret_name }}
          -n {{ langfuse_namespace }} --no-headers
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: existing_es
      changed_when: false
      failed_when: false

    - name: Set ExternalSecret existence fact
      ansible.builtin.set_fact:
        external_secret_exists: "{{ existing_es.rc == 0 and existing_es.stdout | length > 0 }}"

    # ========== CREATE EXTERNALSECRET ==========
    - name: Create or update ExternalSecret for Langfuse
      ansible.builtin.command:
        cmd: kubectl apply -f -
      args:
        stdin: |
          apiVersion: external-secrets.io/v1beta1
          kind: ExternalSecret
          metadata:
            name: {{ external_secret_name }}
            namespace: {{ langfuse_namespace }}
            labels:
              app.kubernetes.io/name: langfuse
              app.kubernetes.io/component: secrets
              app.kubernetes.io/managed-by: ansible
          spec:
            refreshInterval: 1h
            secretStoreRef:
              name: {{ store_name }}
              kind: ClusterSecretStore
            target:
              name: {{ k8s_secret_name }}
              creationPolicy: Owner
            data:
              - secretKey: nextauth_secret
                remoteRef:
                  key: {{ vault_kv_path }}
                  property: nextauth_secret
              - secretKey: salt
                remoteRef:
                  key: {{ vault_kv_path }}
                  property: salt
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: es_result
      changed_when: "'created' in es_result.stdout or 'configured' in es_result.stdout"

    - name: Display ExternalSecret apply result
      ansible.builtin.debug:
        msg: "ExternalSecret '{{ external_secret_name }}' in ns '{{ langfuse_namespace }}': {{ es_result.stdout }}"

    # ========== WAIT FOR EXTERNALSECRET TO SYNC ==========
    - name: Wait for ExternalSecret to become SecretSynced
      ansible.builtin.command:
        cmd: >-
          kubectl get externalsecret {{ external_secret_name }}
          -n {{ langfuse_namespace }}
          -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}'
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: es_status
      until: es_status.stdout == "True"
      retries: 12
      delay: 5
      changed_when: false
      failed_when: false

    - name: Set ExternalSecret sync status
      ansible.builtin.set_fact:
        es_synced: "{{ es_status.stdout == 'True' }}"

    - name: Warn if ExternalSecret not synced
      ansible.builtin.debug:
        msg: |
          WARNING: ExternalSecret '{{ external_secret_name }}' is not synced.
          Possible causes:
            - Vault path '{{ vault_kv_path }}' does not exist
            - nextauth_secret or salt keys missing in Vault
            - ClusterSecretStore '{{ store_name }}' not ready
          Debug: kubectl describe externalsecret {{ external_secret_name }} -n {{ langfuse_namespace }}
      when: not es_synced

    # ========== VERIFY K8S SECRET CREATED ==========
    - name: Check if K8s Secret was created
      ansible.builtin.command:
        cmd: kubectl get secret {{ k8s_secret_name }} -n {{ langfuse_namespace }} --no-headers
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: secret_check
      changed_when: false
      failed_when: false

    # ========== DISPLAY RESULT ==========
    - name: Display wiring result
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "Langfuse <-> Vault Secrets Wiring Complete"
          - "=========================================="
          - ""
          - "ExternalSecret: {{ external_secret_name }} ({{ es_result.stdout }})"
          - "K8s Secret: {{ k8s_secret_name }} ({{ 'created' if secret_check.rc == 0 else 'not yet created' }})"
          - "Vault Path: {{ vault_kv_path }}"
          - "Keys: nextauth_secret, salt"
          - "Sync Status: {{ 'Synced' if es_synced else 'Not synced - see warning above' }}"
          - "Refresh Interval: 1h"
          - ""
          - "Next step: Update Langfuse deployment to mount {{ k8s_secret_name }}"
          - "  envFrom:"
          - "    - secretRef:"
          - "        name: {{ k8s_secret_name }}"
          - "=========================================="
