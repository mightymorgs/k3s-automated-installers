#   description: >-
#     Configure Langfuse for Tailscale Ingress mode. Sets NextAuth.js
#     environment variables so Langfuse trusts the Tailscale proxy headers,
#     listens on all interfaces, and keeps password auth as a fallback.
#     NEXTAUTH_URL is pointed at the Tailscale IP on NodePort 30901.
#   requires_apps: ["langfuse"]
#
#   # ========== BWS STATE INTERACTION (v3.2) ==========
#   bws_state:
#     writes:
#       - path: "_state.apps.langfuse.configured"
#         example: true

- name: Configure Langfuse for Tailscale Ingress
  hosts: "{{ target_hosts | default('localhost') }}"
  gather_facts: false
  become: false

  vars:
    langfuse_namespace: "ai-tools"
    app_namespace: "{{ langfuse_namespace }}"
    # langfuse_url: from BWS _state via Phase 4 extra-vars

  tasks:
    # ========== CHECK IF LANGFUSE IS DEPLOYED ==========
    - name: Check if Langfuse pod is running
      ansible.builtin.command:
        cmd: kubectl get pod -n {{ app_namespace }} -l app=langfuse --no-headers
      environment:
        KUBECONFIG: "{{ kubeconfig_path | default('/etc/rancher/k3s/k3s.yaml') }}"
      register: langfuse_pod_check
      changed_when: false
      failed_when: false

    - name: Skip if Langfuse not deployed
      ansible.builtin.debug:
        msg: "Langfuse not deployed - skipping API configuration"
      when: langfuse_pod_check.rc != 0 or langfuse_pod_check.stdout | length == 0

    - name: End play if Langfuse not available
      ansible.builtin.meta: end_play
      when: langfuse_pod_check.rc != 0 or langfuse_pod_check.stdout | length == 0

    # ========== PATCH DEPLOYMENT WITH NEXTAUTH ENV VARS ==========
    - name: Configure NextAuth.js environment for Tailscale mode
      ansible.builtin.command:
        cmd: >-
          kubectl set env deployment/langfuse -n {{ app_namespace }}
          AUTH_DISABLE_USER_PASSWORD=false
          NEXTAUTH_URL={{ langfuse_url }}
          AUTH_TRUST_HOST=true
          HOSTNAME=0.0.0.0
      environment:
        KUBECONFIG: "{{ kubeconfig_path | default('/etc/rancher/k3s/k3s.yaml') }}"
      register: env_patch_result
      changed_when: "'updated' in env_patch_result.stdout"

    # ========== WAIT FOR ROLLOUT ==========
    - name: Wait for Langfuse rollout to complete
      ansible.builtin.command:
        cmd: kubectl rollout status deployment/langfuse -n {{ app_namespace }} --timeout=120s
      environment:
        KUBECONFIG: "{{ kubeconfig_path | default('/etc/rancher/k3s/k3s.yaml') }}"
      changed_when: false

    # ========== VERIFY LANGFUSE IS ACCESSIBLE ==========
    - name: Verify Langfuse health endpoint is reachable
      ansible.builtin.uri:
        url: "{{ langfuse_url }}/api/health"
        method: GET
        return_content: false
      register: health_check
      retries: 10
      delay: 6
      until: health_check.status is defined and health_check.status == 200
      failed_when: false

    - name: Fail if Langfuse not accessible after rollout
      ansible.builtin.fail:
        msg: "Langfuse not accessible after rollout (last status: {{ health_check.status | default('unknown') }})"
      when: health_check.status is not defined or health_check.status != 200

    # ========== DISPLAY RESULT ==========
    - name: Display configuration result
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "Langfuse API Configuration Complete"
          - "=========================================="
          - "Password Auth: Enabled (fallback)"
          - "NEXTAUTH_URL: {{ langfuse_url }}"
          - "AUTH_TRUST_HOST: true"
          - "HOSTNAME: 0.0.0.0 (all interfaces)"
          - "Auth Layer: Tailscale (password login kept as fallback)"
          - "Health Check: {{ langfuse_url }}/api/health ({{ health_check.status }})"
          - "=========================================="
