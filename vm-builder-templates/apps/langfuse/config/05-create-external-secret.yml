---
# playbook_metadata:
#   id: "atomic/apps/langfuse/05-create-external-secret"
#   type: "atomic"
#
#   # ========== FILE LOCATION ==========
#   path_info:
#     file_path: "atomic/apps/langfuse/config/05-create-external-secret.yml"
#     category: "apps"
#     subsystem: "langfuse"
#
#   # ========== TRADITIONAL METADATA ==========
#   dependencies: ["langfuse_deployed", "external_secrets_vault_wired"]
#   provides: ["langfuse_external_secret_created"]
#   tags: ["langfuse", "external-secrets", "vault", "secrets", "phase4"]
#   estimated_duration: 60
#   parallel_safe: false
#   idempotent: true
#   description: >-
#     Create an ExternalSecret CRD in the ai-tools namespace that pulls
#     Langfuse secrets from Vault via the ClusterSecretStore vault-backend.
#     Creates a K8s Secret 'langfuse-secrets' with keys 'nextauth-secret'
#     and 'salt' from separate Vault paths.
#   requires_apps: ["langfuse", "external-secrets", "vault"]

- name: Create ExternalSecret for Langfuse
  hosts: "{{ target_hosts | default('localhost') }}"
  gather_facts: false
  become: false

  vars:
    langfuse_namespace: "ai-tools"
    app_namespace: "{{ langfuse_namespace }}"
    store_name: vault-backend
    secret_name: langfuse-secrets
    external_secret_name: langfuse-secrets
    # Vault KV v2 paths relative to the store's configured path (apps/).
    # Full Vault API paths:
    #   apps/data/langfuse/nextauth_secret
    #   apps/data/langfuse/salt
    vault_nextauth_key: langfuse/nextauth_secret
    vault_salt_key: langfuse/salt
    kubeconfig: "{{ kubeconfig_path | default('/etc/rancher/k3s/k3s.yaml') }}"

  tasks:
    # ========== VALIDATE PREREQUISITES ==========
    - name: Check if namespace exists
      ansible.builtin.command:
        cmd: kubectl get namespace {{ app_namespace }} --no-headers
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: ns_check
      changed_when: false
      failed_when: false

    - name: Skip if namespace not found
      ansible.builtin.debug:
        msg: "Namespace {{ app_namespace }} not found - skipping ExternalSecret creation"
      when: ns_check.rc != 0

    - name: End play if namespace not available
      ansible.builtin.meta: end_play
      when: ns_check.rc != 0

    - name: Verify ClusterSecretStore exists
      ansible.builtin.command:
        cmd: kubectl get clustersecretstore {{ store_name }} --no-headers
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: css_check
      changed_when: false
      failed_when: false

    - name: Skip if ClusterSecretStore not found
      ansible.builtin.debug:
        msg: >-
          ClusterSecretStore '{{ store_name }}' not found.
          Run external-secrets/config/04-wire-vault.yml first.
      when: css_check.rc != 0

    - name: End play if ClusterSecretStore not available
      ansible.builtin.meta: end_play
      when: css_check.rc != 0

    # ========== CHECK IF EXTERNALSECRET ALREADY EXISTS ==========
    - name: Check if ExternalSecret already exists
      ansible.builtin.command:
        cmd: >-
          kubectl get externalsecret {{ external_secret_name }}
          -n {{ app_namespace }} --no-headers
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: es_check
      changed_when: false
      failed_when: false

    - name: Set existence fact
      ansible.builtin.set_fact:
        es_exists: "{{ es_check.rc == 0 and es_check.stdout | length > 0 }}"

    # ========== CREATE EXTERNALSECRET CRD ==========
    # Langfuse requires two secrets from Vault: the NextAuth secret (used for
    # session signing) and a salt value (used for hashing). Both are pulled
    # into a single K8s Secret with distinct keys.
    - name: Apply ExternalSecret for Langfuse
      ansible.builtin.command:
        cmd: kubectl apply -f -
      args:
        stdin: |
          apiVersion: external-secrets.io/v1
          kind: ExternalSecret
          metadata:
            name: {{ external_secret_name }}
            namespace: {{ app_namespace }}
            labels:
              app.kubernetes.io/name: langfuse
              app.kubernetes.io/component: external-secret
              app.kubernetes.io/managed-by: ansible
          spec:
            refreshInterval: 1h
            secretStoreRef:
              name: {{ store_name }}
              kind: ClusterSecretStore
            target:
              name: {{ secret_name }}
              creationPolicy: Owner
            data:
              - secretKey: nextauth-secret
                remoteRef:
                  key: {{ vault_nextauth_key }}
                  property: nextauth_secret
              - secretKey: salt
                remoteRef:
                  key: {{ vault_salt_key }}
                  property: salt
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: apply_result
      changed_when: "'created' in apply_result.stdout or 'configured' in apply_result.stdout"

    # ========== WAIT FOR SECRET SYNC ==========
    - name: Wait for ExternalSecret to become ready
      ansible.builtin.command:
        cmd: >-
          kubectl get externalsecret {{ external_secret_name }}
          -n {{ app_namespace }}
          -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}'
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: es_status
      until: es_status.stdout == "True"
      retries: 12
      delay: 5
      changed_when: false
      failed_when: false

    - name: Set readiness fact
      ansible.builtin.set_fact:
        es_ready: "{{ es_status.stdout == 'True' }}"

    - name: Warn if ExternalSecret not ready
      ansible.builtin.debug:
        msg: |
          WARNING: ExternalSecret '{{ external_secret_name }}' is not Ready.
          Possible causes:
            - Vault paths '{{ vault_nextauth_key }}' or '{{ vault_salt_key }}' do not exist
            - ClusterSecretStore '{{ store_name }}' is not healthy
            - Vault token has insufficient permissions
          Debug: kubectl describe externalsecret {{ external_secret_name }} -n {{ app_namespace }}
      when: not es_ready

    # ========== VERIFY K8S SECRET CREATED ==========
    - name: Check if K8s Secret was created
      ansible.builtin.command:
        cmd: >-
          kubectl get secret {{ secret_name }}
          -n {{ app_namespace }} --no-headers
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: secret_check
      changed_when: false
      failed_when: false

    # ========== DISPLAY RESULT ==========
    - name: Display ExternalSecret result
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "Langfuse ExternalSecret Created"
          - "=========================================="
          - "Namespace: {{ app_namespace }}"
          - "ExternalSecret: {{ external_secret_name }} ({{ 'applied' if not es_exists else 'updated' }})"
          - "ClusterSecretStore: {{ store_name }}"
          - "Vault Paths:"
          - "  - {{ vault_nextauth_key }} -> nextauth-secret"
          - "  - {{ vault_salt_key }} -> salt"
          - "K8s Secret: {{ secret_name }} ({{ 'created' if secret_check.rc == 0 else 'pending' }})"
          - "Secret Keys: [nextauth-secret, salt]"
          - "Status: {{ 'Ready' if es_ready else 'Not Ready - see warning above' }}"
          - "=========================================="
