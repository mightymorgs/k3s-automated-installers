- name: Langfuse - Create/Update Prompt
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    inventory_secret_name: "{{ lookup('env', 'VM_INVENTORY_SECRET') }}"
    langfuse_base_url: "{{ langfuse_url }}"
    langfuse_api_base: "{{ langfuse_base_url }}/api/public"
    endpoint: "/prompts"

    # Required fields (must be provided by caller)
    # name: Prompt name (required)
    # prompt: Prompt content - string for text, array for chat messages (required)

    # Optional fields with defaults
    prompt_type: "{{ prompt_type_input | default('text') }}"
    config: "{{ config_input | default({}) }}"
    labels: "{{ labels_input | default([]) }}"
    tags: "{{ tags_input | default([]) }}"

  tasks:
    # ===== STEP 1: Validate Required Inputs =====
    - name: Validate required inputs are provided
      ansible.builtin.assert:
        that:
          - name is defined and name | length > 0
          - prompt is defined
        fail_msg: "Required inputs missing: name, prompt"
        success_msg: "All required inputs validated"

    - name: Validate prompt type
      ansible.builtin.assert:
        that:
          - prompt_type in ['text', 'chat']
        fail_msg: "Invalid prompt_type: must be 'text' or 'chat'"
        success_msg: "Prompt type validated: {{ prompt_type }}"

    # ===== STEP 2: Read BWS Inventory =====
    - name: Fetch VM inventory from BWS
      ansible.builtin.shell: |
        bws secret get "{{ inventory_secret_name }}" --output json
      environment:
        BWS_ACCESS_TOKEN: "{{ lookup('env', 'BWS_ACCESS_TOKEN') }}"
      register: bws_result
      changed_when: false
      no_log: true

    - name: Parse inventory JSON
      ansible.builtin.set_fact:
        inventory: "{{ (bws_result.stdout | from_json).value | from_json }}"
      no_log: true

    - name: Extract Langfuse credentials
      ansible.builtin.set_fact:
        langfuse_public_key: >-
          {{ inventory._state.apps.langfuse.public_key | default(langfuse_public_key) }}
        langfuse_secret_key: >-
          {{ inventory._state.apps.langfuse.secret_key | default(langfuse_secret_key) }}
      no_log: true

    - name: Override base URL from inventory if available
      ansible.builtin.set_fact:
        langfuse_base_url: "{{ inventory._state.apps.langfuse.url }}"
        langfuse_api_base: "{{ inventory._state.apps.langfuse.url }}/api/public"
      when: inventory._state.apps.langfuse.url is defined

    - name: Validate credentials are available
      ansible.builtin.assert:
        that:
          - langfuse_public_key | length > 0
          - langfuse_secret_key | length > 0
        fail_msg: "Langfuse credentials not found in BWS _state or environment"
        success_msg: "Langfuse credentials loaded"

    # ===== STEP 3: Check for Existing Prompt (Idempotency info) =====
    - name: Check if prompt already exists
      ansible.builtin.uri:
        url: "{{ langfuse_api_base }}{{ endpoint }}/{{ name | urlencode }}"
        method: GET
        user: "{{ langfuse_public_key }}"
        password: "{{ langfuse_secret_key }}"
        force_basic_auth: true
        status_code: [200, 404]
        validate_certs: false
      register: existing_prompt
      no_log: true

    - name: Set existing prompt fact
      ansible.builtin.set_fact:
        prompt_exists: "{{ existing_prompt.status == 200 }}"
        existing_prompt_version: "{{ existing_prompt.json.version | default(0) if existing_prompt.status == 200 else 0 }}"

    - name: Display existing prompt info
      ansible.builtin.debug:
        msg: "Prompt '{{ name }}' already exists at version {{ existing_prompt_version }}. Creating new version."
      when: prompt_exists

    # ===== STEP 4: Build Prompt Payload =====
    - name: Build prompt creation payload
      ansible.builtin.set_fact:
        prompt_payload:
          name: "{{ name }}"
          prompt: "{{ prompt }}"
          type: "{{ prompt_type }}"
          config: "{{ config if config | length > 0 else omit }}"
          labels: "{{ labels if labels | length > 0 else omit }}"
          tags: "{{ tags if tags | length > 0 else omit }}"
      no_log: true

    # ===== STEP 5: Create Prompt =====
    - name: Create prompt in Langfuse
      ansible.builtin.uri:
        url: "{{ langfuse_api_base }}{{ endpoint }}"
        method: POST
        user: "{{ langfuse_public_key }}"
        password: "{{ langfuse_secret_key }}"
        force_basic_auth: true
        body_format: json
        body: "{{ prompt_payload }}"
        status_code: [200, 201]
        validate_certs: false
      register: create_result
      no_log: true

    - name: Extract prompt result
      ansible.builtin.set_fact:
        created_prompt_name: "{{ create_result.json.name }}"
        created_prompt_version: "{{ create_result.json.version }}"
        created_prompt_type: "{{ create_result.json.type | default(prompt_type) }}"
      no_log: false

    # ===== STEP 6: Write Result to BWS._state =====
    - name: Derive prompt key name for BWS writeback
      ansible.builtin.set_fact:
        prompt_key: "{{ name | lower | regex_replace('[^a-z0-9-]', '-') }}"
      no_log: false

    - name: Update BWS inventory with prompt info
      ansible.builtin.shell: |
        # Get current inventory
        CURRENT=$(bws secret get "{{ inventory_secret_name }}" --output json | jq -r '.value')

        # Get current timestamp
        TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

        # Merge prompt info into _state.apps.langfuse.prompts
        UPDATED=$(echo "$CURRENT" | jq --arg pk "{{ prompt_key }}" \
          --arg pname "{{ created_prompt_name }}" \
          --argjson pversion {{ created_prompt_version }} \
          --arg ptype "{{ created_prompt_type }}" \
          --arg timestamp "$TIMESTAMP" \
          '
          if ._state.apps.langfuse == null then ._state.apps.langfuse = {} else . end |
          if ._state.apps.langfuse.prompts == null then ._state.apps.langfuse.prompts = {} else . end |
          if ._state.apps.langfuse.prompts[$pk] == null then ._state.apps.langfuse.prompts[$pk] = {} else . end |
          ._state.apps.langfuse.prompts[$pk].name = $pname |
          ._state.apps.langfuse.prompts[$pk].version = $pversion |
          ._state.apps.langfuse.prompts[$pk].type = $ptype |
          ._state.apps.langfuse.prompts[$pk].created_at = $timestamp
        ')

        # Write back to BWS
        bws secret edit "{{ inventory_secret_name }}" --value "$UPDATED"
      environment:
        BWS_ACCESS_TOKEN: "{{ lookup('env', 'BWS_ACCESS_TOKEN') }}"
      register: bws_update_result
      changed_when: true
      no_log: true

    # ===== STEP 7: Output Result =====
    - name: Display prompt creation result
      ansible.builtin.debug:
        msg:
          status: "{{ 'updated' if prompt_exists else 'created' }}"
          name: "{{ created_prompt_name }}"
          version: "{{ created_prompt_version }}"
          type: "{{ created_prompt_type }}"
          previous_version: "{{ existing_prompt_version if prompt_exists else 'N/A' }}"
