---
apiVersion: v1
kind: ConfigMap
metadata:
  name: langfuse-config
  namespace: langfuse
  labels:
    app.kubernetes.io/name: langfuse
data:
  # Langfuse configuration
  NEXTAUTH_URL: "https://langfuse.${DOMAIN}"
  TELEMETRY_ENABLED: "false"
  LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "true"

  # Database configuration (uses external secret for connection string)
  DATABASE_HOST: "langfuse-postgres"
  DATABASE_PORT: "5432"
  DATABASE_NAME: "langfuse"
