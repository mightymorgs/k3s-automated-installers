---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: langfuse-postgres
  namespace: langfuse
  labels:
    app.kubernetes.io/name: langfuse-postgres
    app.kubernetes.io/component: database
spec:
  serviceName: langfuse-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: langfuse-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: langfuse-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: langfuse-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: langfuse-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              value: langfuse
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: longhorn
        resources:
          requests:
            storage: 10Gi
