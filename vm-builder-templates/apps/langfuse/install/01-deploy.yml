- name: Deploy Langfuse
  hosts: "{{ target_hosts | default('localhost') }}"
  gather_facts: true
  become: false

  vars:
    app_name: langfuse
    app_namespace: "ai-tools"
    templates_dir: "{{ playbook_dir }}/../templates"
    render_dir: "/tmp/langfuse-manifests"
    kubectl_action: "{{ 'replace --force' if install_mode | default('rebuild') == 'full' else 'apply' }}"
    # Secret values — generated at deploy time, overridable via extra-vars
    postgres_password: "{{ lookup('password', '/dev/null length=32 chars=ascii_letters,digits') }}"
    nextauth_secret: "{{ lookup('password', '/dev/null length=32 chars=ascii_letters,digits') }}"
    salt: "{{ lookup('password', '/dev/null length=32 chars=ascii_letters,digits') }}"
    app_start_timeout_seconds: 600
    retry_interval_seconds: 10
    health_probe_timeout_seconds: 5

  tasks:
    # ========== 1. VERIFY PREREQUISITES ==========
    - name: Verify kubectl is available
      ansible.builtin.command: kubectl version --client
      register: kubectl_check
      changed_when: false

    - name: Verify K3s cluster is accessible
      ansible.builtin.command: kubectl get nodes
      register: nodes_check
      changed_when: false
      retries: 5
      delay: "{{ retry_interval_seconds }}"
      until: nodes_check.rc == 0

    # ========== 2. CREATE NAMESPACE ==========
    - name: Ensure namespace exists
      ansible.builtin.shell: |
        kubectl create namespace {{ app_namespace }} --dry-run=client -o yaml | kubectl apply -f -
      register: ns_apply
      changed_when: "'created' in ns_apply.stdout or 'configured' in ns_apply.stdout"

    - name: Label namespace
      ansible.builtin.command: >-
        kubectl label namespace {{ app_namespace }}
        app.kubernetes.io/name={{ app_name }}
        app.kubernetes.io/part-of=golden-master
        --overwrite
      changed_when: false

    # ========== 3. CHECK EXISTING SECRETS (idempotency) ==========
    - name: Check for existing postgres secret
      ansible.builtin.command: >-
        kubectl get secret langfuse-postgres -n {{ app_namespace }}
        -o jsonpath='{.data.password}'
      register: existing_pg_secret
      changed_when: false
      failed_when: false

    - name: Decode existing postgres password
      ansible.builtin.set_fact:
        postgres_password: "{{ existing_pg_secret.stdout | b64decode }}"
      when:
        - existing_pg_secret.rc == 0
        - existing_pg_secret.stdout | default('') | length > 0
        - (existing_pg_secret.stdout | b64decode) | length > 0

    - name: Check for existing config secret
      ansible.builtin.command: >-
        kubectl get secret langfuse-config -n {{ app_namespace }}
        -o jsonpath='{.data.NEXTAUTH_SECRET}'
      register: existing_config_secret
      changed_when: false
      failed_when: false

    - name: Decode existing NextAuth secret
      ansible.builtin.set_fact:
        nextauth_secret: "{{ existing_config_secret.stdout | b64decode }}"
      when:
        - existing_config_secret.rc == 0
        - existing_config_secret.stdout | default('') | length > 0
        - (existing_config_secret.stdout | b64decode) | length > 0

    - name: Check for existing salt
      ansible.builtin.command: >-
        kubectl get secret langfuse-config -n {{ app_namespace }}
        -o jsonpath='{.data.SALT}'
      register: existing_salt
      changed_when: false
      failed_when: false

    - name: Decode existing salt
      ansible.builtin.set_fact:
        salt: "{{ existing_salt.stdout | b64decode }}"
      when:
        - existing_salt.rc == 0
        - existing_salt.stdout | default('') | length > 0
        - (existing_salt.stdout | b64decode) | length > 0

    # Generate credentials if not preserved from existing secrets.
    # Uses _resolved_ prefix to avoid Ansible extra-var precedence (priority 22 > set_fact 19).
    - name: Generate missing postgres password
      ansible.builtin.set_fact:
        _resolved_postgres_password: "{{ postgres_password | default('') }}"
    - name: Generate postgres password if empty
      ansible.builtin.set_fact:
        _resolved_postgres_password: "{{ lookup('ansible.builtin.password', '/dev/null chars=ascii_letters,digits length=32') }}"
      when: _resolved_postgres_password | default('') | length == 0

    - name: Generate missing nextauth secret
      ansible.builtin.set_fact:
        _resolved_nextauth_secret: "{{ nextauth_secret | default('') }}"
    - name: Generate nextauth secret if empty
      ansible.builtin.set_fact:
        _resolved_nextauth_secret: "{{ lookup('ansible.builtin.password', '/dev/null chars=ascii_letters,digits length=64') }}"
      when: _resolved_nextauth_secret | default('') | length == 0

    - name: Generate missing salt
      ansible.builtin.set_fact:
        _resolved_salt: "{{ salt | default('') }}"
    - name: Generate salt if empty
      ansible.builtin.set_fact:
        _resolved_salt: "{{ lookup('ansible.builtin.password', '/dev/null chars=ascii_letters,digits length=32') }}"
      when: _resolved_salt | default('') | length == 0

    - name: Set resolved credentials for template rendering
      ansible.builtin.set_fact:
        postgres_password: "{{ _resolved_postgres_password }}"
        nextauth_secret: "{{ _resolved_nextauth_secret }}"
        salt: "{{ _resolved_salt }}"

    - name: Guard against empty secret values
      ansible.builtin.fail:
        msg: >-
          Refusing to deploy — credential field '{{ item.name }}' is empty.
          Neither preservation from existing K8s Secret nor generation produced a value.
      when: item.value | default('') | length == 0
      loop:
        - { name: "postgres_password", value: "{{ _resolved_postgres_password }}" }
        - { name: "nextauth_secret", value: "{{ _resolved_nextauth_secret }}" }
        - { name: "salt", value: "{{ _resolved_salt }}" }
      loop_control:
        label: "{{ item.name }}"
      no_log: true

    # ========== 4. RENDER J2 TEMPLATES ==========
    # Note: section 3 checks existing secrets above
    - name: Create render directory
      ansible.builtin.file:
        path: "{{ render_dir }}"
        state: directory
        mode: '0755'

    - name: Render secrets template
      ansible.builtin.template:
        src: "{{ templates_dir }}/secrets.yaml.j2"
        dest: "{{ render_dir }}/secrets.yaml"
        mode: '0644'

    - name: Render postgres statefulset template
      ansible.builtin.template:
        src: "{{ templates_dir }}/postgres-statefulset.yaml.j2"
        dest: "{{ render_dir }}/postgres-statefulset.yaml"
        mode: '0644'

    - name: Render postgres service template
      ansible.builtin.template:
        src: "{{ templates_dir }}/postgres-service.yaml.j2"
        dest: "{{ render_dir }}/postgres-service.yaml"
        mode: '0644'

    - name: Render deployment template
      ansible.builtin.template:
        src: "{{ templates_dir }}/deployment.yaml.j2"
        dest: "{{ render_dir }}/deployment.yaml"
        mode: '0644'

    - name: Render service template
      ansible.builtin.template:
        src: "{{ templates_dir }}/service.yaml.j2"
        dest: "{{ render_dir }}/service.yaml"
        mode: '0644'

    - name: Render PushSecret template
      ansible.builtin.template:
        src: "{{ templates_dir }}/pushsecret.yaml.j2"
        dest: "{{ render_dir }}/pushsecret.yaml"
        mode: '0644'

    # ========== 5. APPLY RENDERED MANIFESTS ==========
    # Secrets must use 'apply' even in full mode to avoid wiping generated passwords
    - name: Apply secrets (never replace --force)
      ansible.builtin.command:
        cmd: kubectl apply -f {{ render_dir }}/secrets.yaml
      register: secrets_apply
      changed_when: "'created' in secrets_apply.stdout or 'configured' in secrets_apply.stdout"

    - name: Apply PushSecret (always kubectl apply — protected kind)
      ansible.builtin.command:
        cmd: kubectl apply -f {{ render_dir }}/pushsecret.yaml
      register: pushsecret_apply
      changed_when: "'created' in pushsecret_apply.stdout or 'configured' in pushsecret_apply.stdout"

    - name: Apply workload manifests
      ansible.builtin.command:
        cmd: kubectl {{ kubectl_action }} -f {{ render_dir }}/{{ item }}
      loop:
        - postgres-statefulset.yaml
        - postgres-service.yaml
        - deployment.yaml
        - service.yaml
      register: workload_apply
      changed_when: "'created' in workload_apply.stdout or 'configured' in workload_apply.stdout"

    # ========== 6. WAIT FOR POSTGRES ==========
    - name: Wait for PostgreSQL pod to be ready
      ansible.builtin.command: >-
        kubectl -n {{ app_namespace }} wait
        --for=condition=ready pod
        -l app={{ postgres_host | default('langfuse-postgres') }}
        --timeout={{ app_start_timeout_seconds }}s
      register: postgres_wait
      changed_when: false
      retries: 3
      delay: "{{ retry_interval_seconds }}"
      until: postgres_wait.rc == 0

    # ========== 7. WAIT FOR LANGFUSE ==========
    # Rollout status ensures old pods are terminated and new pods are created.
    # Without this, kubectl wait can succeed on the OLD pod during a rolling
    # update, then the verify playbook tries to exec into a deleted pod.
    - name: Wait for Langfuse deployment rollout
      ansible.builtin.command: >-
        kubectl -n {{ app_namespace }} rollout status
        deployment/{{ app_name }}
        --timeout={{ app_start_timeout_seconds }}s
      register: langfuse_rollout
      changed_when: false

    - name: Wait for Langfuse pod to be ready
      ansible.builtin.command: >-
        kubectl -n {{ app_namespace }} wait
        --for=condition=ready pod
        -l app={{ app_name }}
        --timeout={{ app_start_timeout_seconds }}s
      register: langfuse_wait
      changed_when: false
      retries: 3
      delay: "{{ retry_interval_seconds }}"
      until: langfuse_wait.rc == 0

    # ========== 8. DISPLAY STATUS ==========
    - name: Get Tailscale IP for access URL
      ansible.builtin.command: tailscale ip -4
      register: tailscale_ip
      changed_when: false
      failed_when: false

    - name: Display deployment status
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "Langfuse Deployed Successfully"
          - "=========================================="
          - "Namespace: {{ app_namespace }}"
          - "Image: {{ image | default('langfuse/langfuse:2') }}"
          - "PostgreSQL: {{ postgres_image | default('postgres:15-alpine') }}"
          - "Access URL: http://{{ tailscale_ip.stdout | default(ansible_hostname) }}:{{ nodeport | default(30901) }}"
          - "=========================================="

    # ========== 9. CLEANUP ==========
    - name: Clean up render directory
      ansible.builtin.file:
        path: "{{ render_dir }}"
        state: absent
