---
apiVersion: v1
kind: Service
metadata:
  name: qbittorrent
  namespace: qbittorrent
  labels:
    app.kubernetes.io/name: qbittorrent
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: qbittorrent
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
      nodePort: 30808
