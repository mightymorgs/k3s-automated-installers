#   description: >-
#     Deploy qbittorrent-exporter sidecar container to qBittorrent StatefulSet
#     for Prometheus metrics scraping. Uses the martabal/qbittorrent-exporter
#     image on port 8090 and adds prometheus.io annotations for automatic
#     discovery.
#   requires_apps: ["qbittorrent", "prometheus"]

- name: Deploy qbittorrent-exporter sidecar for qBittorrent
  hosts: "{{ target_hosts | default('localhost') }}"
  gather_facts: false
  become: false

  vars:
    qbittorrent_namespace: "media-stack"
    app_namespace: "{{ qbittorrent_namespace }}"
    statefulset_name: qbittorrent
    exporter_image: "ghcr.io/martabal/qbittorrent-exporter:latest"
    exporter_port: 8090
    sidecar_container_name: qbittorrent-exporter
    kubeconfig: "{{ kubeconfig_path | default('/etc/rancher/k3s/k3s.yaml') }}"

  tasks:
    # ========== VALIDATE PREREQUISITES ==========
    - name: Check if qBittorrent StatefulSet exists
      ansible.builtin.command:
        cmd: >-
          kubectl get statefulset {{ statefulset_name }}
          -n {{ app_namespace }} --no-headers
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: sts_check
      changed_when: false
      failed_when: false

    - name: Skip if StatefulSet not deployed
      ansible.builtin.debug:
        msg: "qBittorrent StatefulSet not deployed - skipping exporter sidecar"
      when: sts_check.rc != 0 or sts_check.stdout | length == 0

    - name: End play if StatefulSet not available
      ansible.builtin.meta: end_play
      when: sts_check.rc != 0 or sts_check.stdout | length == 0

    # ========== CHECK IF SIDECAR ALREADY EXISTS ==========
    - name: Get current container names in StatefulSet
      ansible.builtin.command:
        cmd: >-
          kubectl get statefulset {{ statefulset_name }}
          -n {{ app_namespace }}
          -o jsonpath='{.spec.template.spec.containers[*].name}'
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: container_names
      changed_when: false

    - name: Set sidecar existence fact
      ansible.builtin.set_fact:
        sidecar_exists: "{{ sidecar_container_name in container_names.stdout.split() }}"

    # ========== PATCH STATEFULSET WITH EXPORTER SIDECAR ==========
    # qbittorrent-exporter connects to qBittorrent's web UI on localhost:8080
    # and exposes Prometheus metrics on port 8090. No API key required --
    # authentication is optional and handled via environment variables.
    - name: Add qbittorrent-exporter sidecar container to StatefulSet
      ansible.builtin.command:
        cmd: >-
          kubectl patch statefulset {{ statefulset_name }}
          -n {{ app_namespace }} --type json
          -p '[{"op": "add", "path": "/spec/template/spec/containers/-", "value": {
            "name": "{{ sidecar_container_name }}",
            "image": "{{ exporter_image }}",
            "ports": [{"containerPort": {{ exporter_port }}, "name": "metrics", "protocol": "TCP"}],
            "env": [
              {"name": "QBITTORRENT_BASE_URL", "value": "http://localhost:8080"},
              {"name": "EXPORTER_PORT", "value": "{{ exporter_port }}"}
            ],
            "resources": {"requests": {"cpu": "10m", "memory": "32Mi"}, "limits": {"memory": "64Mi"}}
          }}]'
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: patch_result
      changed_when: "'patched' in patch_result.stdout"
      when: not sidecar_exists

    # ========== ADD PROMETHEUS ANNOTATIONS ==========
    - name: Add Prometheus scrape annotations
      ansible.builtin.command:
        cmd: >-
          kubectl patch statefulset {{ statefulset_name }}
          -n {{ app_namespace }} --type merge
          -p '{"spec": {"template": {"metadata": {"annotations": {
            "prometheus.io/scrape": "true",
            "prometheus.io/port": "{{ exporter_port }}",
            "prometheus.io/path": "/metrics"
          }}}}}'
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: annotation_result
      changed_when: "'patched' in annotation_result.stdout"

    # ========== WAIT FOR ROLLOUT ==========
    - name: Wait for StatefulSet rollout to complete
      ansible.builtin.command:
        cmd: >-
          kubectl rollout status statefulset/{{ statefulset_name }}
          -n {{ app_namespace }} --timeout=180s
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      changed_when: false
      when: not sidecar_exists

    # ========== VERIFY SIDECAR IS RUNNING ==========
    - name: Verify exporter container is present after rollout
      ansible.builtin.command:
        cmd: >-
          kubectl get statefulset {{ statefulset_name }}
          -n {{ app_namespace }}
          -o jsonpath='{.spec.template.spec.containers[*].name}'
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: verify_containers
      changed_when: false

    - name: Set verification fact
      ansible.builtin.set_fact:
        sidecar_verified: "{{ sidecar_container_name in verify_containers.stdout.split() }}"

    # ========== DISPLAY RESULT ==========
    - name: Display exporter deployment result
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "qBittorrent Exporter Sidecar Deployment"
          - "=========================================="
          - "StatefulSet: {{ app_namespace }}/{{ statefulset_name }}"
          - "Exporter: {{ exporter_image }}"
          - "Base URL: http://localhost:8080"
          - "Metrics Port: {{ exporter_port }}"
          - "Sidecar: {{ 'deployed' if not sidecar_exists else 'already exists' }}"
          - "Verified: {{ sidecar_verified }}"
          - "Prometheus Annotations: scrape=true, port={{ exporter_port }}"
          - "=========================================="
