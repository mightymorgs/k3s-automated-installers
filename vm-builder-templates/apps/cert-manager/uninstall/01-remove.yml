---
- name: Uninstall cert-manager
  hosts: "{{ target_hosts | default('localhost') }}"
  gather_facts: false
  become: false

  vars:
    app_name: cert-manager
    app_namespace: "cert-manager"
  tasks:
    - name: Check namespace exists
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Namespace
        name: "{{ app_namespace }}"
      register: ns_check

    - name: Skip if namespace does not exist
      ansible.builtin.meta: end_play
      when: ns_check.resources | length == 0

    # Clean up cert-manager CRDs to avoid finalizer hangs
    - name: Delete all Certificates
      ansible.builtin.shell: |
        kubectl delete certificates --all --all-namespaces 2>/dev/null || true
      changed_when: false
      failed_when: false

    - name: Delete all ClusterIssuers
      ansible.builtin.shell: |
        kubectl delete clusterissuers --all 2>/dev/null || true
      changed_when: false
      failed_when: false

    - name: Delete all Issuers
      ansible.builtin.shell: |
        kubectl delete issuers --all --all-namespaces 2>/dev/null || true
      changed_when: false
      failed_when: false

    - name: Delete all Deployments in cert-manager namespace
      kubernetes.core.k8s_info:
        api_version: apps/v1
        kind: Deployment
        namespace: "{{ app_namespace }}"
      register: cm_deployments

    - name: Remove cert-manager Deployments
      kubernetes.core.k8s:
        api_version: apps/v1
        kind: Deployment
        name: "{{ item.metadata.name }}"
        namespace: "{{ app_namespace }}"
        state: absent
        wait: true
        wait_timeout: 120
      loop: "{{ cm_deployments.resources }}"
      loop_control:
        label: "{{ item.metadata.name }}"

    - name: Delete all Services in cert-manager namespace
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Service
        namespace: "{{ app_namespace }}"
      register: cm_services

    - name: Remove cert-manager Services
      kubernetes.core.k8s:
        api_version: v1
        kind: Service
        name: "{{ item.metadata.name }}"
        namespace: "{{ app_namespace }}"
        state: absent
      loop: "{{ cm_services.resources }}"
      loop_control:
        label: "{{ item.metadata.name }}"
