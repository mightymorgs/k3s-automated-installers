---
# playbook_metadata:
#   id: "atomic/apps/cert-manager/06-enable-metrics"
#   type: "atomic"
#
#   # ========== FILE LOCATION ==========
#   path_info:
#     file_path: "atomic/apps/cert-manager/config/06-enable-metrics.yml"
#     category: "apps"
#     subsystem: "cert-manager"
#
#   # ========== TRADITIONAL METADATA ==========
#   batch_id: "20260225_prometheus_metrics"
#   dependencies: ["cert_manager_deployed"]
#   provides: ["cert_manager_metrics_enabled"]
#   tags: ["cert-manager", "prometheus", "metrics", "observability", "phase4"]
#   estimated_duration: 30
#   parallel_safe: false
#   idempotent: true
#   description: >-
#     Add Prometheus scrape annotations to the cert-manager controller
#     deployment. cert-manager natively exposes metrics on port 9402
#     at /metrics. This playbook adds pod-level annotations so Prometheus
#     auto-discovers and scrapes the metrics endpoint via its
#     kubernetes-pods scrape config.
#   requires_apps: ["cert-manager", "prometheus"]

- name: Enable Prometheus metrics scraping for cert-manager
  hosts: "{{ target_hosts | default('localhost') }}"
  gather_facts: false
  become: false

  vars:
    cert_manager_namespace: "cert-manager"
    app_namespace: "{{ cert_manager_namespace }}"
  tasks:
    # ========== CHECK IF CERT-MANAGER IS DEPLOYED ==========
    - name: Check if cert-manager controller pod is running
      ansible.builtin.command:
        cmd: kubectl get pod -n {{ app_namespace }} -l app.kubernetes.io/name=cert-manager --no-headers
      environment:
        KUBECONFIG: "{{ kubeconfig_path | default('/etc/rancher/k3s/k3s.yaml') }}"
      register: certmanager_pod_check
      changed_when: false
      failed_when: false

    - name: Skip if cert-manager not deployed
      ansible.builtin.debug:
        msg: "cert-manager not deployed - skipping metrics configuration"
      when: certmanager_pod_check.rc != 0 or certmanager_pod_check.stdout | length == 0

    - name: End play if cert-manager not available
      ansible.builtin.meta: end_play
      when: certmanager_pod_check.rc != 0 or certmanager_pod_check.stdout | length == 0

    # ========== CHECK IF ANNOTATIONS ALREADY PRESENT ==========
    - name: Check if prometheus annotations already present
      ansible.builtin.command:
        cmd: >-
          kubectl get deployment cert-manager -n {{ app_namespace }}
          -o jsonpath='{.spec.template.metadata.annotations.prometheus\.io/scrape}'
      environment:
        KUBECONFIG: "{{ kubeconfig_path | default('/etc/rancher/k3s/k3s.yaml') }}"
      register: current_scrape
      changed_when: false
      failed_when: false

    # ========== ADD PROMETHEUS SCRAPE ANNOTATIONS ==========
    - name: Add Prometheus scrape annotations to cert-manager
      ansible.builtin.command:
        cmd: >-
          kubectl patch deployment cert-manager -n {{ app_namespace }} --type merge -p
          '{"spec":{"template":{"metadata":{"annotations":{"prometheus.io/scrape":"true","prometheus.io/port":"9402","prometheus.io/path":"/metrics"}}}}}'
      environment:
        KUBECONFIG: "{{ kubeconfig_path | default('/etc/rancher/k3s/k3s.yaml') }}"
      register: patch_result
      changed_when: "'patched' in patch_result.stdout"
      when: current_scrape.stdout != "true"

    - name: Annotations already present
      ansible.builtin.debug:
        msg: "Prometheus scrape annotations already present on cert-manager - skipping"
      when: current_scrape.stdout == "true"

    # ========== WAIT FOR ROLLOUT ==========
    - name: Wait for cert-manager rollout to complete
      ansible.builtin.command:
        cmd: kubectl rollout status deployment/cert-manager -n {{ app_namespace }} --timeout=120s
      environment:
        KUBECONFIG: "{{ kubeconfig_path | default('/etc/rancher/k3s/k3s.yaml') }}"
      changed_when: false
      when: current_scrape.stdout != "true"

    # ========== DISPLAY RESULT ==========
    - name: Display configuration result
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "cert-manager Prometheus Metrics Enabled"
          - "=========================================="
          - "Target: deployment/cert-manager"
          - "Namespace: {{ app_namespace }}"
          - "Scrape Port: 9402"
          - "Metrics Path: /metrics"
          - "Status: {{ 'Annotations added' if current_scrape.stdout != 'true' else 'Already configured' }}"
          - "=========================================="
