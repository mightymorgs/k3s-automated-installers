#   estimated_duration: 45
#   parallel_safe: true
#   idempotent: true
#   description: Configure cert-manager with Cloudflare Origin CA for edge certificates
#
#   # ========== BWS STATE INTERACTION (v3.2) ==========
#   bws_state:
#     reads:
#       - path: "_state.cloudflare.api_token"
