- name: Deploy Prometheus
  hosts: "{{ target_hosts | default('localhost') }}"
  gather_facts: true
  become: false

  vars:
    app_name: prometheus
    app_namespace: "observability"
    templates_dir: "{{ playbook_dir }}/../templates"
    render_dir: "/tmp/prometheus-manifests"
    kubectl_action: "{{ 'replace --force' if install_mode | default('rebuild') == 'full' else 'apply' }}"
    container_port: 9090
    health_path: "/-/healthy"

    # Global timeout constants
    app_start_timeout_seconds: 600
    retry_interval_seconds: 10
    health_probe_timeout_seconds: 5

  tasks:
    # ========================================
    # VERIFY PREREQUISITES
    # ========================================
    - name: Verify kubectl is available
      ansible.builtin.command: kubectl version --client
      register: kubectl_check
      changed_when: false

    - name: Verify K3s cluster is accessible
      ansible.builtin.command: kubectl get nodes
      register: nodes_check
      changed_when: false
      retries: 5
      delay: 10
      until: nodes_check.rc == 0

    # ========================================
    # RENDER J2 TEMPLATES
    # ========================================
    - name: Create render directory
      ansible.builtin.file:
        path: "{{ render_dir }}"
        state: directory
        mode: '0755'

    - name: Render RBAC template
      ansible.builtin.template:
        src: "{{ templates_dir }}/rbac.yaml.j2"
        dest: "{{ render_dir }}/rbac.yaml"
        mode: '0644'

    - name: Render ConfigMap template
      ansible.builtin.template:
        src: "{{ templates_dir }}/configmap.yaml.j2"
        dest: "{{ render_dir }}/configmap.yaml"
        mode: '0644'

    - name: Render StatefulSet template
      ansible.builtin.template:
        src: "{{ templates_dir }}/statefulset.yaml.j2"
        dest: "{{ render_dir }}/statefulset.yaml"
        mode: '0644'

    - name: Render Service template
      ansible.builtin.template:
        src: "{{ templates_dir }}/service.yaml.j2"
        dest: "{{ render_dir }}/service.yaml"
        mode: '0644'

    # ========================================
    # APPLY MANIFESTS
    # ========================================
    - name: Ensure namespace exists
      ansible.builtin.shell: |
        kubectl create namespace {{ app_namespace }} --dry-run=client -o yaml | kubectl apply -f -
      register: ns_apply
      changed_when: "'created' in ns_apply.stdout or 'configured' in ns_apply.stdout"

    - name: Label namespace
      ansible.builtin.command: >-
        kubectl label namespace {{ app_namespace }}
        app.kubernetes.io/name={{ app_name }}
        app.kubernetes.io/part-of=golden-master
        --overwrite
      changed_when: false

    # Split-apply: protected kinds (Namespace, Secret, PVC, PushSecret) always use
    # kubectl apply. Workloads use kubectl_action (which may be replace --force).
    # This prevents namespace cascade deletion and secret rotation on rebuild.
    - name: Apply protected resources (Namespace, Secret, PVC, PushSecret)
      ansible.builtin.shell: |
        for f in {{ render_dir }}/*.yaml; do
          kind=$(grep -m1 '^kind:' "$f" 2>/dev/null | awk '{print $2}')
          case "$kind" in
            Namespace|Secret|PersistentVolumeClaim|PushSecret|ClusterRole|ClusterRoleBinding)
              kubectl apply -f "$f" 2>&1 && echo "[APPLIED] $f"
              ;;
          esac
        done
      register: protected_apply
      changed_when: "'created' in protected_apply.stdout or 'configured' in protected_apply.stdout"

    - name: Apply workload resources
      ansible.builtin.shell: |
        for f in {{ render_dir }}/*.yaml; do
          kind=$(grep -m1 '^kind:' "$f" 2>/dev/null | awk '{print $2}')
          case "$kind" in
            Namespace|Secret|PersistentVolumeClaim|PushSecret|ClusterRole|ClusterRoleBinding)
              ;;  # already applied above
            *)
              kubectl {{ kubectl_action }} -f "$f" 2>&1 && echo "[APPLIED] $f"
              ;;
          esac
        done
      register: workload_apply
      changed_when: "'created' in workload_apply.stdout or 'configured' in workload_apply.stdout"

    # ========================================
    # WAIT FOR READY
    # ========================================
    - name: Wait for StatefulSet to create pod
      ansible.builtin.command: >-
        kubectl -n {{ app_namespace }} get pod -l app={{ app_name }} --no-headers
      register: pod_exists
      changed_when: false
      retries: "{{ (app_start_timeout_seconds / retry_interval_seconds) | int }}"
      delay: "{{ retry_interval_seconds }}"
      until: pod_exists.rc == 0 and pod_exists.stdout | length > 0

    - name: Wait for pod to be ready
      ansible.builtin.command: >-
        kubectl -n {{ app_namespace }} wait
        --for=condition=ready pod
        -l app={{ app_name }}
        --timeout={{ app_start_timeout_seconds }}s
      register: pod_wait
      changed_when: false
      retries: 3
      delay: "{{ retry_interval_seconds }}"
      until: pod_wait.rc == 0

    # ========================================
    # DISPLAY STATUS
    # ========================================
    - name: Get Tailscale IP for access URL
      ansible.builtin.command: tailscale ip -4
      register: tailscale_ip
      changed_when: false
      failed_when: false

    - name: Display deployment status
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "Prometheus Deployed Successfully"
          - "=========================================="
          - "Namespace: {{ app_namespace }}"
          - "Image: {{ image | default('prom/prometheus:v2.54.1') }}"
          - "Access URL: http://{{ tailscale_ip.stdout | default(ansible_hostname) }}:{{ nodeport | default(30909) }}"
          - "Internal URL: http://{{ app_name }}.{{ app_namespace }}.svc:{{ container_port }}"
          - "=========================================="

    # ========================================
    # CLEANUP
    # ========================================
    - name: Clean up render directory
      ansible.builtin.file:
        path: "{{ render_dir }}"
        state: absent

    # ========================================
    # WRITE TO BWS._state
    # ========================================
    - name: Write Prometheus state to BWS
      ansible.builtin.debug:
        msg: "TODO: Call generic BWS writeback playbook with Prometheus state"
