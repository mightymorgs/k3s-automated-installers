---
# playbook_metadata:
#   id: "atomic/apps/prometheus/04-configure-api"
#   type: "atomic"
#
#   # ========== FILE LOCATION ==========
#   path_info:
#     file_path: "atomic/apps/prometheus/config/04-configure-api.yml"
#     category: "apps"
#     subsystem: "prometheus"
#
#   # ========== TRADITIONAL METADATA ==========
#   batch_id: "20260221_api_config_auth"
#   dependencies: ["prometheus_deployed"]
#   provides: ["prometheus_api_configured"]
#   tags: ["prometheus", "api", "configuration", "zero-touch"]
#   estimated_duration: 120
#   parallel_safe: false
#   idempotent: true
#   description: >-
#     Configure Prometheus for Tailscale Ingress mode.
#     Sets --web.external-url so Prometheus generates correct self-referencing
#     links when accessed via the Tailscale IP. Verifies --web.enable-lifecycle
#     is present for remote config reload capability. Prometheus has no built-in
#     authentication — Tailscale provides the network-level access control.
#   requires_apps: ["prometheus"]
#
#   # ========== BWS STATE INTERACTION (v3.2) ==========
#   bws_state:
#     writes:
#       - path: "_state.apps.prometheus.configured"
#         example: true

- name: Configure Prometheus for Tailscale Ingress
  hosts: "{{ target_hosts | default('localhost') }}"
  gather_facts: false
  become: false

  vars:
    prometheus_namespace: "observability"
    app_namespace: "{{ prometheus_namespace }}"
    # prometheus_url: from BWS _state via Phase 4 extra-vars

  tasks:
    # ========== CHECK IF PROMETHEUS IS DEPLOYED ==========
    - name: Check if Prometheus pod is running
      ansible.builtin.command:
        cmd: kubectl get pod -n {{ app_namespace }} -l app=prometheus --no-headers
      environment:
        KUBECONFIG: "{{ kubeconfig_path | default('/etc/rancher/k3s/k3s.yaml') }}"
      register: prometheus_pod_check
      changed_when: false
      failed_when: false

    - name: Skip if Prometheus not deployed
      ansible.builtin.debug:
        msg: "Prometheus not deployed - skipping API configuration"
      when: prometheus_pod_check.rc != 0 or prometheus_pod_check.stdout | length == 0

    - name: End play if Prometheus not available
      ansible.builtin.meta: end_play
      when: prometheus_pod_check.rc != 0 or prometheus_pod_check.stdout | length == 0

    # ========== SET WEB EXTERNAL URL ==========
    # Prometheus uses command-line args (not env vars) for configuration.
    # Patch the StatefulSet container args to include --web.external-url so
    # Prometheus generates correct self-referencing links via Tailscale.
    - name: Get current Prometheus StatefulSet args
      ansible.builtin.command:
        cmd: >-
          kubectl get statefulset/prometheus -n {{ app_namespace }}
          -o jsonpath='{.spec.template.spec.containers[0].args}'
      environment:
        KUBECONFIG: "{{ kubeconfig_path | default('/etc/rancher/k3s/k3s.yaml') }}"
      register: current_args
      changed_when: false

    - name: Check if --web.external-url is already set
      ansible.builtin.set_fact:
        external_url_present: "{{ '--web.external-url' in current_args.stdout }}"

    - name: Patch StatefulSet with --web.external-url
      ansible.builtin.command:
        cmd: >-
          kubectl patch statefulset/prometheus -n {{ app_namespace }}
          --type=json
          -p='[{"op": "add", "path": "/spec/template/spec/containers/0/args/-", "value": "--web.external-url={{ prometheus_url }}"}]'
      environment:
        KUBECONFIG: "{{ kubeconfig_path | default('/etc/rancher/k3s/k3s.yaml') }}"
      register: patch_result
      changed_when: "'patched' in patch_result.stdout"
      when: not external_url_present

    - name: Note --web.external-url already configured
      ansible.builtin.debug:
        msg: "--web.external-url already present in StatefulSet args, skipping patch"
      when: external_url_present

    # ========== VERIFY --web.enable-lifecycle IS PRESENT ==========
    - name: Check if --web.enable-lifecycle is set
      ansible.builtin.set_fact:
        lifecycle_present: "{{ '--web.enable-lifecycle' in current_args.stdout }}"

    - name: Warn if --web.enable-lifecycle not present
      ansible.builtin.debug:
        msg: >-
          WARNING: --web.enable-lifecycle is not set in the StatefulSet args.
          Remote config reload via /-/reload will not be available.
      when: not lifecycle_present

    # ========== WAIT FOR ROLLOUT ==========
    - name: Wait for Prometheus StatefulSet rollout to complete
      ansible.builtin.command:
        cmd: kubectl rollout status statefulset/prometheus -n {{ app_namespace }} --timeout=120s
      environment:
        KUBECONFIG: "{{ kubeconfig_path | default('/etc/rancher/k3s/k3s.yaml') }}"
      changed_when: false

    # ========== VERIFY PROMETHEUS IS ACCESSIBLE ==========
    - name: Verify Prometheus health endpoint is reachable
      ansible.builtin.uri:
        url: "{{ prometheus_url }}/-/healthy"
        method: GET
        return_content: false
      register: health_check
      retries: 10
      delay: 6
      until: health_check.status is defined and health_check.status == 200
      failed_when: false

    - name: Fail if Prometheus not accessible after rollout
      ansible.builtin.fail:
        msg: "Prometheus not accessible after rollout (last status: {{ health_check.status | default('unknown') }})"
      when: health_check.status is not defined or health_check.status != 200

    # ========== DISPLAY RESULT ==========
    - name: Display configuration result
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "Prometheus API Configuration Complete"
          - "=========================================="
          - "External URL: {{ prometheus_url }}"
          - "Lifecycle API: {{ 'Enabled' if lifecycle_present else 'Not enabled' }}"
          - "Authentication: None (Tailscale provides network-level access)"
          - "Health Check: {{ prometheus_url }}/-/healthy ({{ health_check.status }})"
          - "=========================================="
