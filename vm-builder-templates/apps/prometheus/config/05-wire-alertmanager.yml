---
# playbook_metadata:
#   id: "atomic/apps/prometheus/05-wire-alertmanager"
#   type: "atomic"
#
#   # ========== FILE LOCATION ==========
#   path_info:
#     file_path: "atomic/apps/prometheus/config/05-wire-alertmanager.yml"
#     category: "apps"
#     subsystem: "prometheus"
#
#   # ========== TRADITIONAL METADATA ==========
#   dependencies: ["prometheus_deployed", "alertmanager_deployed"]
#   provides: ["prometheus_alertmanager_wired"]
#   tags: ["prometheus", "alertmanager", "integration", "wiring", "phase4"]
#   estimated_duration: 60
#   parallel_safe: false
#   idempotent: true
#   description: >-
#     Configure Prometheus to send alerts to Alertmanager. Prometheus uses
#     a YAML config file (not an API) for alertmanager_config. This playbook
#     patches the Prometheus ConfigMap to add the alerting.alertmanagers
#     section pointing to the Alertmanager K8s service, then triggers a
#     config reload via the /-/reload endpoint.
#   requires_apps: ["prometheus", "alertmanager"]
#
#   # ========== BWS STATE INTERACTION ==========
#   bws_state: {}

- name: Wire Alertmanager into Prometheus
  hosts: "{{ target_hosts | default('localhost') }}"
  gather_facts: false
  become: false

  vars:
    prometheus_namespace: "observability"
    alertmanager_namespace: "alertmanager"
    # prometheus_url: from BWS _state via Phase 4 extra-vars
    alertmanager_internal_url: "{{ alertmanager_url }}"
    kubeconfig: "{{ kubeconfig_path | default('/etc/rancher/k3s/k3s.yaml') }}"

  tasks:
    # ========== CHECK IF PROMETHEUS IS DEPLOYED ==========

    # ========== SKIP IF ALERTMANAGER NOT INSTALLED ==========
    - name: Skip if alertmanager is not installed on this VM
      when: alertmanager_url is not defined
      block:
        - name: "alertmanager not installed — skipping prometheus <-> alertmanager wiring"
          ansible.builtin.debug:
            msg: "alertmanager is not installed on this VM (no alertmanager_url in BWS state) — skipping wiring"
        - name: End play gracefully
          ansible.builtin.meta: end_play

    - name: Check if Prometheus pod is running
      ansible.builtin.command:
        cmd: kubectl get pod -n {{ prometheus_namespace }} -l app=prometheus --no-headers
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: prometheus_pod_check
      changed_when: false
      failed_when: false

    - name: End play if Prometheus not deployed
      ansible.builtin.meta: end_play
      when: prometheus_pod_check.rc != 0 or prometheus_pod_check.stdout | length == 0

    # ========== CHECK IF ALERTMANAGER IS DEPLOYED ==========
    - name: Check if Alertmanager pod is running
      ansible.builtin.command:
        cmd: kubectl get pod -n {{ alertmanager_namespace }} -l app.kubernetes.io/name=alertmanager --no-headers
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: alertmanager_pod_check
      changed_when: false
      failed_when: false

    - name: End play if Alertmanager not deployed
      ansible.builtin.meta: end_play
      when: alertmanager_pod_check.rc != 0 or alertmanager_pod_check.stdout | length == 0

    # ========== GET CURRENT PROMETHEUS CONFIG ==========
    - name: Get current Prometheus ConfigMap
      ansible.builtin.command:
        cmd: >-
          kubectl get configmap prometheus-config -n {{ prometheus_namespace }}
          -o jsonpath='{.data.prometheus\.yml}'
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: current_config_raw
      changed_when: false
      failed_when: false

    - name: Parse current config
      ansible.builtin.set_fact:
        current_config: "{{ current_config_raw.stdout }}"

    # ========== CHECK IF ALERTMANAGER ALREADY CONFIGURED ==========
    - name: Check if alertmanager target already in config
      ansible.builtin.set_fact:
        alertmanager_already_configured: "{{ alertmanager_internal_url in current_config }}"

    - name: Note alertmanager already configured
      ansible.builtin.debug:
        msg: "Alertmanager target already present in Prometheus config - skipping patch"
      when: alertmanager_already_configured

    # ========== PATCH PROMETHEUS CONFIGMAP ==========
    # Prometheus alertmanager_config is set via the prometheus.yml config file,
    # not via API. We patch the ConfigMap and trigger a reload.
    - name: Patch Prometheus ConfigMap with alertmanager target
      when: not alertmanager_already_configured
      block:
        - name: Create patched config with alerting section
          ansible.builtin.command:
            cmd: >-
              kubectl patch configmap prometheus-config -n {{ prometheus_namespace }}
              --type=merge
              -p={
                "data": {
                  "alertmanager-targets.yml": "- targets:\n  - {{ alertmanager_internal_url }}\n"
                }
              }
          environment:
            KUBECONFIG: "{{ kubeconfig }}"
          register: configmap_patch
          changed_when: "'patched' in configmap_patch.stdout and '(no change)' not in configmap_patch.stdout"

        # Use kubectl exec to append alerting config if not already present.
        # This approach reads the existing config, adds the alerting block,
        # and writes it back via a ConfigMap patch.
        - name: Build alerting config block
          ansible.builtin.set_fact:
            alerting_block: |
              alerting:
                alertmanagers:
                  - static_configs:
                      - targets:
                          - {{ alertmanager_internal_url }}

        - name: Append alerting config to prometheus.yml in ConfigMap
          ansible.builtin.shell: |
            # Get current prometheus.yml from ConfigMap
            CURRENT=$(kubectl get configmap prometheus-config -n {{ prometheus_namespace }} \
              -o jsonpath='{.data.prometheus\.yml}')

            # Check if alerting section already exists
            if echo "$CURRENT" | grep -q "alertmanagers:"; then
              echo "ALREADY_CONFIGURED"
              exit 0
            fi

            # Append alerting block
            UPDATED=$(cat <<'YAMLEOF'
            {{ current_config }}

            {{ alerting_block }}
            YAMLEOF
            )

            # Create a temporary file with the updated config
            TMPFILE=$(mktemp)
            echo "$UPDATED" > "$TMPFILE"

            # Replace the ConfigMap data
            kubectl create configmap prometheus-config \
              -n {{ prometheus_namespace }} \
              --from-file=prometheus.yml="$TMPFILE" \
              --dry-run=client -o yaml | \
              kubectl apply -f -

            rm -f "$TMPFILE"
            echo "PATCHED"
          environment:
            KUBECONFIG: "{{ kubeconfig }}"
          register: config_patch_result
          changed_when: "'PATCHED' in config_patch_result.stdout"

    # ========== RELOAD PROMETHEUS CONFIG ==========
    - name: Check if Prometheus has lifecycle API enabled
      ansible.builtin.uri:
        url: "{{ prometheus_url }}/-/reload"
        method: POST
        status_code: [200, 204]
      register: reload_result
      failed_when: false
      when: not alertmanager_already_configured

    - name: Note if reload API not available
      ansible.builtin.debug:
        msg: >-
          Prometheus /-/reload returned {{ reload_result.status | default('unavailable') }}.
          If config reload failed, Prometheus will pick up the new config on next restart.
      when: >-
        not alertmanager_already_configured and
        (reload_result.status is not defined or reload_result.status not in [200, 204])

    # ========== DISPLAY RESULT ==========
    - name: Display wiring result
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "Prometheus <-> Alertmanager Wiring Complete"
          - "=========================================="
          - "Alertmanager Target: {{ alertmanager_internal_url }}"
          - "Config Method: ConfigMap patch + /-/reload"
          - "Status: {{ 'Already configured' if alertmanager_already_configured else 'Patched' }}"
          - "=========================================="
