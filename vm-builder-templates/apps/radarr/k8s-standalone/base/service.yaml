---
# Radarr Service
# NodePort for Tailscale access
apiVersion: v1
kind: Service
metadata:
  name: radarr
  namespace: media-stack
  labels:
    app: radarr
    app.kubernetes.io/name: radarr
    app.kubernetes.io/part-of: media-stack
spec:
  type: NodePort
  selector:
    app: radarr
  ports:
    - name: http
      port: 7878
      targetPort: 7878
      nodePort: 30878
      protocol: TCP
