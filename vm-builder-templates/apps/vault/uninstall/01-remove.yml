---
- name: Uninstall Vault
  hosts: "{{ target_hosts | default('localhost') }}"
  gather_facts: false
  become: false

  vars:
    app_name: vault
    app_namespace: "vault"
    delete_pvc: false
    inventory_secret_name: ""

  tasks:
    - name: Check namespace exists
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Namespace
        name: "{{ app_namespace }}"
      register: ns_check

    - name: Skip if namespace does not exist
      ansible.builtin.meta: end_play
      when: ns_check.resources | length == 0

    - name: Delete StatefulSet vault
      kubernetes.core.k8s:
        api_version: apps/v1
        kind: StatefulSet
        name: vault
        namespace: "{{ app_namespace }}"
        state: absent
        wait: true
        wait_timeout: 120

    - name: Delete Service vault
      kubernetes.core.k8s:
        api_version: v1
        kind: Service
        name: vault
        namespace: "{{ app_namespace }}"
        state: absent
        wait: true
        wait_timeout: 120

    - name: Delete ConfigMap vault-config
      kubernetes.core.k8s:
        api_version: v1
        kind: ConfigMap
        name: vault-config
        namespace: "{{ app_namespace }}"
        state: absent

    - name: Delete PVCs for vault
      when: delete_pvc | bool
      block:
        - name: Find PVCs in vault namespace
          kubernetes.core.k8s_info:
            api_version: v1
            kind: PersistentVolumeClaim
            namespace: "{{ app_namespace }}"
          register: app_pvcs

        - name: Remove PVCs
          kubernetes.core.k8s:
            api_version: v1
            kind: PersistentVolumeClaim
            name: "{{ item.metadata.name }}"
            namespace: "{{ app_namespace }}"
            state: absent
          loop: "{{ app_pvcs.resources }}"
          loop_control:
            label: "{{ item.metadata.name }}"

    # Clear unseal key + root token from BWS _state.vault
    - name: Clear Vault state from BWS inventory
      when: inventory_secret_name | length > 0
      block:
        - name: Read current BWS inventory
          ansible.builtin.command: >-
            bws secret list --output json
          register: bws_list
          changed_when: false

        - name: Get inventory secret ID
          ansible.builtin.set_fact:
            inventory_secret_id: >-
              {{ (bws_list.stdout | from_json |
                  selectattr('key', 'equalto', inventory_secret_name) |
                  first).id }}
          failed_when: false

        - name: Read and clear vault state
          when: inventory_secret_id is defined and inventory_secret_id | length > 0
          block:
            - name: Fetch current inventory
              ansible.builtin.command: >-
                bws secret get {{ inventory_secret_id }} --output json
              register: bws_get
              changed_when: false

            - name: Clear _state.vault from inventory
              ansible.builtin.set_fact:
                updated_inventory: >-
                  {{ (bws_get.stdout | from_json).value | from_json |
                     combine({'_state': (((bws_get.stdout | from_json).value | from_json)._state | default({})) |
                     dict2items | rejectattr('key', 'equalto', 'vault') | list | items2dict}) }}

            - name: Write cleared inventory back to BWS
              ansible.builtin.command: >-
                bws secret edit --value '{{ updated_inventory | to_json }}' {{ inventory_secret_id }}
              changed_when: true

    - name: Verify removal
      kubernetes.core.k8s_info:
        api_version: apps/v1
        kind: StatefulSet
        name: vault
        namespace: "{{ app_namespace }}"
      register: verify
      failed_when: verify.resources | length > 0
