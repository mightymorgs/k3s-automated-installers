---
apiVersion: v1
kind: Service
metadata:
  name: vault
  namespace: vault
  labels:
    app.kubernetes.io/name: vault
    app.kubernetes.io/component: secrets-management
    app.kubernetes.io/part-of: golden-master
spec:
  type: ClusterIP
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app.kubernetes.io/name: vault
    app.kubernetes.io/component: secrets-management
  ports:
  - name: api
    port: 8200
    targetPort: 8200
    protocol: TCP
  - name: cluster
    port: 8201
    targetPort: 8201
    protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: vault-ui
  namespace: vault
  labels:
    app.kubernetes.io/name: vault
    app.kubernetes.io/component: secrets-management
    app.kubernetes.io/part-of: golden-master
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: vault
    app.kubernetes.io/component: secrets-management
  ports:
  - name: http
    port: 8200
    targetPort: 8200
    protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: vault-nodeport
  namespace: vault
  labels:
    app.kubernetes.io/name: vault
    app.kubernetes.io/component: secrets-management
    app.kubernetes.io/part-of: golden-master
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: vault
    app.kubernetes.io/component: secrets-management
  ports:
  - name: api
    port: 8200
    targetPort: 8200
    nodePort: 30820
    protocol: TCP
