- name: Render Vault manifests from J2 templates
  hosts: localhost
  gather_facts: false

  vars:
    inventory_key: "{{ inventory_key }}"
    output_dir: "/tmp/vault"

  tasks:
    # ========================================
    # VALIDATE INPUT
    # ========================================
    - name: Verify INVENTORY_KEY is provided
      ansible.builtin.assert:
        that:
          - inventory_key | length > 0
        fail_msg: "INVENTORY_KEY environment variable must be set"

    - name: Verify BWS_ACCESS_TOKEN is set
      ansible.builtin.assert:
        that:
          - lookup('env', 'BWS_ACCESS_TOKEN') | length > 0
        fail_msg: "BWS_ACCESS_TOKEN environment variable must be set"

    # ========================================
    # FETCH VM INVENTORY
    # ========================================
    - name: Fetch VM inventory from BWS
      ansible.builtin.command:
        cmd: bws secret get {{ inventory_key }} --output json
      environment:
        BWS_ACCESS_TOKEN: "{{ lookup('env', 'BWS_ACCESS_TOKEN') }}"
      register: bws_inventory
      no_log: true
      changed_when: false

    - name: Parse inventory JSON
      ansible.builtin.set_fact:
        inventory: "{{ (bws_inventory.stdout | from_json).value | from_json }}"
      no_log: true

    # ========================================
    # CREATE OUTPUT DIRECTORY
    # ========================================
    - name: Create output directory
      ansible.builtin.file:
        path: "{{ output_dir }}"
        state: directory
        mode: '0755'

    # ========================================
    # RENDER VAULT MANIFESTS
    # ========================================
    - name: Render Vault StatefulSet
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../../../../../templates/k8s/platform/vault/statefulset.yaml.j2"
        dest: "{{ output_dir }}/statefulset.yaml"
        mode: '0644'
      vars:
        vault_version: "{{ inventory.platform_versions.vault | default('1.18') }}"
        vault_replicas: "{{ inventory.vault.replicas | default(1) }}"
        vault_storage_size: "{{ inventory.vault.storage_size | default('10Gi') }}"
        vault_storage_class: "{{ inventory.vault.storage_class | default('longhorn') }}"
        app_namespace: "{{ inventory.vault.namespace | default('vault') }}"
        vault_memory_requests: "{{ inventory.vault.memory_requests | default('256Mi') }}"
        vault_memory_limits: "{{ inventory.vault.memory_limits | default('512Mi') }}"
        vault_cpu_requests: "{{ inventory.vault.cpu_requests | default('250m') }}"
        vault_cpu_limits: "{{ inventory.vault.cpu_limits | default('500m') }}"
        vault_api_port: "{{ inventory.vault.api_port | default(8200) }}"
        vault_cluster_port: "{{ inventory.vault.cluster_port | default(8201) }}"

    - name: Render Vault Service
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../../../../../templates/k8s/platform/vault/service.yaml.j2"
        dest: "{{ output_dir }}/service.yaml"
        mode: '0644'
      vars:
        app_namespace: "{{ inventory.vault.namespace | default('vault') }}"
        vault_api_port: "{{ inventory.vault.api_port | default(8200) }}"
        vault_cluster_port: "{{ inventory.vault.cluster_port | default(8201) }}"
        vault_nodeport: "{{ inventory.vault.nodeport | default(30820) }}"
        vault_enable_nodeport: "{{ inventory.vault.enable_nodeport | default(true) }}"

    - name: Render Vault ConfigMap
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../../../../../templates/k8s/platform/vault/config.yaml.j2"
        dest: "{{ output_dir }}/config.yaml"
        mode: '0644'
      vars:
        app_namespace: "{{ inventory.vault.namespace | default('vault') }}"
        vault_ui_enabled: "{{ inventory.vault.ui_enabled | default(true) }}"
        vault_api_port: "{{ inventory.vault.api_port | default(8200) }}"
        vault_cluster_port: "{{ inventory.vault.cluster_port | default(8201) }}"
        vault_storage_backend: "{{ inventory.vault.storage_backend | default('file') }}"
        vault_storage_path: "{{ inventory.vault.storage_path | default('/vault/data') }}"
        vault_tls_disable: "{{ inventory.vault.tls_disable | default(1) }}"
        vault_listener_address: "{{ inventory.vault.listener_address | default('0.0.0.0:8200') }}"
        vault_disable_mlock: "{{ inventory.vault.disable_mlock | default(true) }}"

    # ========================================
    # SUMMARY
    # ========================================
    - name: Display render summary
      ansible.builtin.debug:
        msg:
          - "Vault manifests rendered successfully"
          - "Output directory: {{ output_dir }}"
          - "Files created:"
          - "  - statefulset.yaml"
          - "  - service.yaml"
          - "  - config.yaml"
          - ""
          - "Vault version: {{ inventory.platform_versions.vault | default('1.18') }}"
          - "Namespace: {{ inventory.vault.namespace | default('vault') }}"
