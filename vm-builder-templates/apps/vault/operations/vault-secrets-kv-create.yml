- name: Vault - Create KV Secrets Engine
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    inventory_secret_name: "{{ lookup('env', 'VM_INVENTORY_SECRET') }}"
    vault_base_url: "{{ vault_addr }}"
    vault_api_base: "{{ vault_base_url }}/v1"
    endpoint_mounts: "/sys/mounts"

    # KV secrets engine configuration
    # Required: mount_path - where to mount the secrets engine
    mount_path: "{{ mount_path_input | default('secret') }}"
    kv_version: "{{ kv_version_input | default('2') }}"
    description: "{{ description_input | default('KV secrets engine for application secrets') }}"
    max_versions: "{{ max_versions_input | default(10) }}"

  tasks:
    # ===== STEP 1: Validate Required Inputs =====
    - name: Validate required inputs
      ansible.builtin.assert:
        that:
          - mount_path is defined and mount_path | length > 0
          - kv_version in ['1', '2', 1, 2]
        fail_msg: "Required: mount_path (string), kv_version (1 or 2)"
        success_msg: "All required inputs validated"

    # ===== STEP 2: Validate Environment =====
    - name: Validate BWS_ACCESS_TOKEN is set
      ansible.builtin.assert:
        that:
          - lookup('env', 'BWS_ACCESS_TOKEN') | length > 0
        fail_msg: "BWS_ACCESS_TOKEN environment variable must be set"
        success_msg: "BWS access configured"

    - name: Validate VM_INVENTORY_SECRET is set
      ansible.builtin.assert:
        that:
          - inventory_secret_name | length > 0
        fail_msg: "VM_INVENTORY_SECRET environment variable must be set"
        success_msg: "Inventory secret name configured"

    # ===== STEP 3: Read BWS Inventory and Vault Token =====
    - name: Fetch VM inventory from BWS
      ansible.builtin.shell: |
        bws secret get "{{ inventory_secret_name }}" --output json
      environment:
        BWS_ACCESS_TOKEN: "{{ lookup('env', 'BWS_ACCESS_TOKEN') }}"
      register: bws_result
      changed_when: false
      no_log: true

    - name: Parse inventory JSON
      ansible.builtin.set_fact:
        inventory: "{{ (bws_result.stdout | from_json).value | from_json }}"
      no_log: true

    - name: Extract Vault root token
      ansible.builtin.set_fact:
        vault_token: "{{ inventory._state.apps.vault.root_token }}"
      no_log: true

    - name: Validate Vault token is available
      ansible.builtin.assert:
        that:
          - vault_token | length > 0
        fail_msg: "Vault root token not found in BWS _state. Run vault-sys-init.yml first."
        success_msg: "Vault root token retrieved from BWS _state"

    # ===== STEP 4: Check if Secrets Engine Already Exists (Idempotency) =====
    - name: List existing secrets engines
      ansible.builtin.uri:
        url: "{{ vault_api_base }}{{ endpoint_mounts }}"
        method: GET
        headers:
          X-Vault-Token: "{{ vault_token }}"
        status_code: [200]
        validate_certs: false
      register: existing_mounts
      no_log: false

    - name: Check if mount path already exists
      ansible.builtin.set_fact:
        mount_exists: "{{ (mount_path + '/') in (existing_mounts.json | default({}) | dict2items | map(attribute='key') | list) }}"

    - name: Display mount status
      ansible.builtin.debug:
        msg: "KV secrets engine at '{{ mount_path }}': {{ 'Exists' if mount_exists else 'Not mounted' }}"

    - name: Skip if secrets engine already exists
      ansible.builtin.debug:
        msg: "KV secrets engine already exists at '{{ mount_path }}' - skipping creation"
      when: mount_exists

    # ===== STEP 5: Determine KV Engine Type =====
    - name: Set engine type based on version
      ansible.builtin.set_fact:
        engine_type: "{{ 'kv-v2' if (kv_version | string) == '2' else 'kv' }}"
        kv_options: "{{ {'version': kv_version | string} if (kv_version | string) == '2' else {} }}"

    # ===== STEP 6: Create KV Secrets Engine =====
    - name: Enable KV secrets engine
      ansible.builtin.uri:
        url: "{{ vault_api_base }}{{ endpoint_mounts }}/{{ mount_path }}"
        method: POST
        headers:
          X-Vault-Token: "{{ vault_token }}"
          Content-Type: "application/json"
        body_format: json
        body:
          type: "kv"
          description: "{{ description }}"
          options:
            version: "{{ kv_version | string }}"
          config:
            max_versions: "{{ max_versions | int }}"
        status_code: [200, 204]
        validate_certs: false
      register: mount_result
      when: not mount_exists
      no_log: false

    - name: Secrets engine created
      ansible.builtin.debug:
        msg: "KV v{{ kv_version }} secrets engine created at '{{ mount_path }}'"
      when: mount_result is not skipped

    # ===== STEP 7: Write Secrets Engine Configuration to BWS._state =====
    - name: Update BWS inventory with secrets engine status
      ansible.builtin.shell: |
        # Get current inventory
        CURRENT=$(bws secret get "{{ inventory_secret_name }}" --output json | jq -r '.value')

        # Get current timestamp
        TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

        # Update _state.apps.vault.secrets_engines.{mount_path}
        UPDATED=$(echo "$CURRENT" | jq \
          --arg path "{{ mount_path }}" \
          --argjson enabled true \
          --arg type "kv-v{{ kv_version }}" \
          --argjson max_versions {{ max_versions | int }} \
          --arg description "{{ description }}" \
          --arg timestamp "$TIMESTAMP" \
          '
          if ._state == null then ._state = {} else . end |
          if ._state.apps == null then ._state.apps = {} else . end |
          if ._state.apps.vault == null then ._state.apps.vault = {} else . end |
          if ._state.apps.vault.secrets_engines == null then ._state.apps.vault.secrets_engines = {} else . end |
          ._state.apps.vault.secrets_engines[$path] = {
            "enabled": $enabled,
            "type": $type,
            "max_versions": $max_versions,
            "description": $description,
            "created_timestamp": $timestamp
          }
        ')

        # Write back to BWS
        bws secret edit "{{ inventory_secret_name }}" --value "$UPDATED"
      environment:
        BWS_ACCESS_TOKEN: "{{ lookup('env', 'BWS_ACCESS_TOKEN') }}"
      register: bws_update_result
      changed_when: true
      no_log: true
      when: not mount_exists

    # ===== STEP 8: Output Result =====
    - name: Display KV secrets engine creation result
      ansible.builtin.debug:
        msg:
          status: "{{ 'exists' if mount_exists else 'created' }}"
          mount_path: "{{ mount_path }}"
          kv_version: "{{ kv_version }}"
          type: "kv-v{{ kv_version }}"
          max_versions: "{{ max_versions }}"
          message: >-
            {{
              'KV secrets engine already exists at ' ~ mount_path if mount_exists
              else 'KV v' ~ kv_version ~ ' secrets engine created at ' ~ mount_path ~ '. Configuration stored in BWS _state.'
            }}
