- name: Vault - Create ACL Policy
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    inventory_secret_name: "{{ lookup('env', 'VM_INVENTORY_SECRET') }}"
    vault_base_url: "{{ vault_addr }}"
    vault_api_base: "{{ vault_base_url }}/v1"
    endpoint_policies: "/sys/policies/acl"

    # Policy configuration
    # Required: policy_name - name of the policy
    # Required: policy_rules - HCL policy document

    # Example policy_rules (HCL format):
    # policy_rules: |
    #   path "secret/data/myapp/*" {
    #     capabilities = ["read", "list"]
    #   }
    #   path "secret/metadata/myapp/*" {
    #     capabilities = ["read", "list"]
    #   }

  tasks:
    # ===== STEP 1: Validate Required Inputs =====
    - name: Validate required inputs
      ansible.builtin.assert:
        that:
          - policy_name is defined and policy_name | length > 0
          - policy_rules is defined and policy_rules | length > 0
        fail_msg: >-
          Required inputs: policy_name (string), policy_rules (HCL policy document).
          Example: -e "policy_name=myapp-read" -e "policy_rules='path \"secret/data/myapp/*\" { capabilities = [\"read\"] }'"
        success_msg: "All required inputs validated: policy_name={{ policy_name }}"

    # ===== STEP 2: Validate Environment =====
    - name: Validate BWS_ACCESS_TOKEN is set
      ansible.builtin.assert:
        that:
          - lookup('env', 'BWS_ACCESS_TOKEN') | length > 0
        fail_msg: "BWS_ACCESS_TOKEN environment variable must be set"
        success_msg: "BWS access configured"

    - name: Validate VM_INVENTORY_SECRET is set
      ansible.builtin.assert:
        that:
          - inventory_secret_name | length > 0
        fail_msg: "VM_INVENTORY_SECRET environment variable must be set"
        success_msg: "Inventory secret name configured"

    # ===== STEP 3: Read BWS Inventory and Vault Token =====
    - name: Fetch VM inventory from BWS
      ansible.builtin.shell: |
        bws secret get "{{ inventory_secret_name }}" --output json
      environment:
        BWS_ACCESS_TOKEN: "{{ lookup('env', 'BWS_ACCESS_TOKEN') }}"
      register: bws_result
      changed_when: false
      no_log: true

    - name: Parse inventory JSON
      ansible.builtin.set_fact:
        inventory: "{{ (bws_result.stdout | from_json).value | from_json }}"
      no_log: true

    - name: Extract Vault root token
      ansible.builtin.set_fact:
        vault_token: "{{ inventory._state.apps.vault.root_token }}"
      no_log: true

    - name: Validate Vault token is available
      ansible.builtin.assert:
        that:
          - vault_token | length > 0
        fail_msg: "Vault root token not found in BWS _state. Run vault-sys-init.yml first."
        success_msg: "Vault root token retrieved from BWS _state"

    # ===== STEP 4: Check if Policy Already Exists (for reporting) =====
    - name: Check if policy already exists
      ansible.builtin.uri:
        url: "{{ vault_api_base }}{{ endpoint_policies }}/{{ policy_name }}"
        method: GET
        headers:
          X-Vault-Token: "{{ vault_token }}"
        status_code: [200, 404]
        validate_certs: false
      register: existing_policy
      failed_when: false
      no_log: false

    - name: Determine if this is create or update
      ansible.builtin.set_fact:
        policy_exists: "{{ existing_policy.status == 200 }}"

    - name: Display policy status
      ansible.builtin.debug:
        msg: "Policy '{{ policy_name }}': {{ 'Exists (will update)' if policy_exists else 'Does not exist (will create)' }}"

    # ===== STEP 5: Create or Update Policy =====
    - name: Create or update ACL policy
      ansible.builtin.uri:
        url: "{{ vault_api_base }}{{ endpoint_policies }}/{{ policy_name }}"
        method: PUT
        headers:
          X-Vault-Token: "{{ vault_token }}"
          Content-Type: "application/json"
        body_format: json
        body:
          policy: "{{ policy_rules }}"
        status_code: [200, 204]
        validate_certs: false
      register: policy_result
      no_log: false

    - name: Policy operation completed
      ansible.builtin.debug:
        msg: "Policy '{{ policy_name }}' {{ 'updated' if policy_exists else 'created' }} successfully"

    # ===== STEP 6: Verify Policy Was Created =====
    - name: Verify policy exists after creation
      ansible.builtin.uri:
        url: "{{ vault_api_base }}{{ endpoint_policies }}/{{ policy_name }}"
        method: GET
        headers:
          X-Vault-Token: "{{ vault_token }}"
        status_code: [200]
        validate_certs: false
      register: verify_policy
      no_log: false

    - name: Assert policy verification succeeded
      ansible.builtin.assert:
        that:
          - verify_policy.status == 200
        fail_msg: "Failed to verify policy '{{ policy_name }}' after creation"
        success_msg: "Policy '{{ policy_name }}' verified successfully"

    # ===== STEP 7: Write Policy Status to BWS._state =====
    - name: Update BWS inventory with policy status
      ansible.builtin.shell: |
        # Get current inventory
        CURRENT=$(bws secret get "{{ inventory_secret_name }}" --output json | jq -r '.value')

        # Get current timestamp
        TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

        # Update _state.apps.vault.policies.{policy_name}
        UPDATED=$(echo "$CURRENT" | jq \
          --arg name "{{ policy_name }}" \
          --argjson created true \
          --arg timestamp "$TIMESTAMP" \
          --argjson was_update {{ policy_exists | lower }} \
          '
          if ._state == null then ._state = {} else . end |
          if ._state.apps == null then ._state.apps = {} else . end |
          if ._state.apps.vault == null then ._state.apps.vault = {} else . end |
          if ._state.apps.vault.policies == null then ._state.apps.vault.policies = {} else . end |
          ._state.apps.vault.policies[$name] = {
            "created": $created,
            "updated_timestamp": $timestamp,
            "was_update": $was_update
          }
        ')

        # Write back to BWS
        bws secret edit "{{ inventory_secret_name }}" --value "$UPDATED"
      environment:
        BWS_ACCESS_TOKEN: "{{ lookup('env', 'BWS_ACCESS_TOKEN') }}"
      register: bws_update_result
      changed_when: true
      no_log: true

    # ===== STEP 8: Output Result =====
    - name: Display policy creation result
      ansible.builtin.debug:
        msg:
          status: "{{ 'updated' if policy_exists else 'created' }}"
          policy_name: "{{ policy_name }}"
          message: >-
            Policy '{{ policy_name }}' {{ 'updated' if policy_exists else 'created' }} successfully.
            Status recorded in BWS _state.
          example_usage: >-
            To use this policy with Kubernetes auth, create a role with:
            vault write auth/kubernetes/role/{{ policy_name }}-role
              bound_service_account_names=<sa-name>
              bound_service_account_namespaces=<namespace>
              policies={{ policy_name }}
              ttl=1h
