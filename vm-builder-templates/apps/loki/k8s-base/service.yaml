---
apiVersion: v1
kind: Service
metadata:
  name: loki
  namespace: observability
  labels:
    app: loki
spec:
  type: ClusterIP
  ports:
    - port: 3100
      targetPort: 3100
      protocol: TCP
      name: http
  selector:
    app: loki
---
apiVersion: v1
kind: Service
metadata:
  name: loki-nodeport
  namespace: observability
  labels:
    app: loki
spec:
  type: NodePort
  ports:
    - port: 3100
      targetPort: 3100
      nodePort: 30310
      protocol: TCP
      name: http
  selector:
    app: loki
