- name: Deploy Plex
  hosts: "{{ target_hosts | default('localhost') }}"
  gather_facts: true
  become: false

  vars:
    app_name: plex
    app_namespace: "plex"
    templates_dir: "{{ playbook_dir }}/../templates"
    render_dir: "/tmp/plex-manifests"
    kubectl_action: "{{ 'replace --force' if install_mode | default('rebuild') == 'full' else 'apply' }}"
    container_port: 32400
    health_path: "/web/index.html"

    # Global timeout constants
    app_start_timeout_seconds: 600
    retry_interval_seconds: 10
    health_probe_timeout_seconds: 5

  tasks:
    - name: Verify kubectl is available
      ansible.builtin.command: kubectl version --client
      register: kubectl_check
      changed_when: false

    - name: Verify K3s cluster is accessible
      ansible.builtin.command: kubectl get nodes
      register: nodes_check
      changed_when: false
      retries: 5
      delay: 10
      until: nodes_check.rc == 0

    - name: Create render directory
      ansible.builtin.file:
        path: "{{ render_dir }}"
        state: directory
        mode: '0755'

    - name: Render ConfigMap template
      ansible.builtin.template:
        src: "{{ templates_dir }}/configmap.yaml.j2"
        dest: "{{ render_dir }}/configmap.yaml"
        mode: '0644'

    - name: Render StatefulSet template
      ansible.builtin.template:
        src: "{{ templates_dir }}/statefulset.yaml.j2"
        dest: "{{ render_dir }}/statefulset.yaml"
        mode: '0644'

    - name: Render Service template
      ansible.builtin.template:
        src: "{{ templates_dir }}/service.yaml.j2"
        dest: "{{ render_dir }}/service.yaml"
        mode: '0644'

    - name: Ensure namespace exists
      ansible.builtin.shell: |
        kubectl create namespace {{ app_namespace }} --dry-run=client -o yaml | kubectl apply -f -
      register: ns_apply
      changed_when: "'created' in ns_apply.stdout or 'configured' in ns_apply.stdout"

    # Split-apply: protected kinds always use kubectl apply (never replace --force).
    # Prevents namespace cascade deletion and secret rotation on rebuild.
    - name: Apply protected resources (Namespace, Secret, PVC, PushSecret)
      ansible.builtin.shell: |
        for f in {{ render_dir }}/*.yaml; do
          kind=$(grep -m1 '^kind:' "$f" 2>/dev/null | awk '{print $2}')
          case "$kind" in
            Namespace|Secret|PersistentVolumeClaim|PushSecret|ClusterRole|ClusterRoleBinding)
              kubectl apply -f "$f" 2>&1 && echo "[APPLIED] $f"
              ;;
          esac
        done
      register: protected_apply
      changed_when: "'created' in protected_apply.stdout or 'configured' in protected_apply.stdout"

    - name: Apply workload resources
      ansible.builtin.shell: |
        for f in {{ render_dir }}/*.yaml; do
          kind=$(grep -m1 '^kind:' "$f" 2>/dev/null | awk '{print $2}')
          case "$kind" in
            Namespace|Secret|PersistentVolumeClaim|PushSecret|ClusterRole|ClusterRoleBinding)
              ;;  # already applied above
            *)
              kubectl {{ kubectl_action }} -f "$f" 2>&1 && echo "[APPLIED] $f"
              ;;
          esac
        done
      register: workload_apply
      changed_when: "'created' in workload_apply.stdout or 'configured' in workload_apply.stdout"

    - name: Wait for pod to be ready
      ansible.builtin.command: >-
        kubectl -n {{ app_namespace }} wait
        --for=condition=ready pod
        -l app={{ app_name }}
        --timeout=600s
      register: pod_wait
      changed_when: false
      retries: 3
      delay: 10
      until: pod_wait.rc == 0

    # ========== CREDENTIAL EXTRACTION (Pattern B) ==========
    - name: Get pod name
      ansible.builtin.shell: >-
        kubectl -n {{ app_namespace }} get pod
        -l app.kubernetes.io/name={{ app_name }}
        -o jsonpath='{.items[0].metadata.name}' 2>/dev/null ||
        kubectl -n {{ app_namespace }} get pod
        -l app={{ app_name }}
        -o jsonpath='{.items[0].metadata.name}'
      register: app_pod
      changed_when: false

    - name: Wait for Plex Preferences.xml to be generated
      ansible.builtin.shell: >-
        kubectl -n {{ app_namespace }} exec {{ app_pod.stdout }} --
        test -f "/config/Library/Application Support/Plex Media Server/Preferences.xml"
      register: prefs_check
      retries: 12
      delay: 10
      until: prefs_check.rc == 0
      changed_when: false
      failed_when: false

    - name: Extract X-Plex-Token from Preferences.xml
      ansible.builtin.shell: >-
        kubectl -n {{ app_namespace }} exec {{ app_pod.stdout }} --
        sed -n 's/.*PlexOnlineToken="\([^"]*\)".*/\1/p'
        "/config/Library/Application Support/Plex Media Server/Preferences.xml"
      register: api_key_raw
      changed_when: false
      no_log: true
      when: prefs_check.rc == 0

    - name: Create plex-credentials K8s Secret
      ansible.builtin.shell: >-
        kubectl create secret generic plex-credentials
        --from-literal=api_key={{ api_key_raw.stdout }}
        -n {{ app_namespace }}
        --dry-run=client -o yaml | kubectl apply -f -
      register: secret_create
      changed_when: "'created' in secret_create.stdout or 'configured' in secret_create.stdout"
      no_log: true
      when: prefs_check.rc == 0 and api_key_raw.stdout | default('') | length > 0

    - name: Render PushSecret template
      ansible.builtin.template:
        src: "{{ templates_dir }}/pushsecret.yaml.j2"
        dest: "{{ render_dir }}/pushsecret.yaml"
        mode: '0644'

    - name: Apply PushSecret
      ansible.builtin.command:
        cmd: kubectl apply -f {{ render_dir }}/pushsecret.yaml
      register: pushsecret_apply
      changed_when: "'created' in pushsecret_apply.stdout or 'configured' in pushsecret_apply.stdout"

    - name: Get Tailscale IP for access URL
      ansible.builtin.command: tailscale ip -4
      register: tailscale_ip
      changed_when: false
      failed_when: false

    - name: Display deployment status
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "Plex Deployed Successfully"
          - "=========================================="
          - "Namespace: {{ app_namespace }}"
          - "Image: {{ image | default('plexinc/pms-docker:latest') }}"
          - "Access URL: http://{{ tailscale_ip.stdout | default(ansible_hostname) }}:{{ nodeport | default(32400) }}/web"
          - "API Key: {{ 'extracted' if api_key_raw.stdout | default('') | length > 0 else 'not yet available (claim token may be needed)' }}"
          - "=========================================="

    - name: Clean up render directory
      ansible.builtin.file:
        path: "{{ render_dir }}"
        state: absent
