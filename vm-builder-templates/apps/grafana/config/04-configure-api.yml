#   description: >-
#     Enable anonymous access for Grafana in Tailscale mode.
#     Patches the Grafana deployment with GF_AUTH_ANONYMOUS_ENABLED=true
#     so users on the tailnet can access dashboards without logging in.
#     Tailscale provides the authentication layer.
#   requires_apps: ["grafana"]
