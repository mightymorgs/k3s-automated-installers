---
# playbook_metadata:
#   id: "atomic/apps/grafana/07-wire-alertmanager"
#   type: "atomic"
#
#   # ========== FILE LOCATION ==========
#   path_info:
#     file_path: "atomic/apps/grafana/config/07-wire-alertmanager.yml"
#     category: "apps"
#     subsystem: "grafana"
#
#   # ========== TRADITIONAL METADATA ==========
#   dependencies: ["grafana_deployed", "alertmanager_deployed"]
#   provides: ["grafana_alertmanager_wired"]
#   tags: ["grafana", "alertmanager", "integration", "wiring", "phase4"]
#   estimated_duration: 30
#   parallel_safe: false
#   idempotent: true
#   description: >-
#     Add Alertmanager as a datasource in Grafana via the HTTP API.
#     Configures the Prometheus implementation type so Grafana can query
#     Alertmanager's API for alert status and silences. Idempotent: checks
#     for existing datasource before creating.
#   requires_apps: ["grafana", "alertmanager"]
#
#   # ========== BWS STATE INTERACTION ==========
#   bws_state:
#     reads:
#       - path: "_state.apps.grafana.admin_password"

- name: Wire Alertmanager into Grafana
  hosts: "{{ target_hosts | default('localhost') }}"
  gather_facts: false
  become: false

  vars:
    grafana_namespace: "grafana"
    app_namespace: "{{ grafana_namespace }}"
    # grafana_url: from BWS _state via Phase 4 extra-vars
    grafana_user: "admin"
    # alertmanager_url: from BWS _state via Phase 4 extra-vars
    alertmanager_internal_url: "{{ alertmanager_url }}"
  tasks:
    # ========== VALIDATE REQUIRED VARS ==========
    - name: Fail if Grafana admin password not provided
      ansible.builtin.fail:
        msg: >-
          grafana_admin_password must be provided via extra-vars or
          GRAFANA_ADMIN_PASSWORD environment variable
      when: grafana_admin_password is not defined or grafana_admin_password | length == 0
    # ========== VERIFY GRAFANA API ==========

    # ========== SKIP IF ALERTMANAGER NOT INSTALLED ==========
    - name: Skip if alertmanager is not installed on this VM
      when: alertmanager_url is not defined
      block:
        - name: "alertmanager not installed — skipping grafana <-> alertmanager wiring"
          ansible.builtin.debug:
            msg: "alertmanager is not installed on this VM (no alertmanager_url in BWS state) — skipping wiring"
        - name: End play gracefully
          ansible.builtin.meta: end_play

    - name: Verify Grafana API is accessible
      ansible.builtin.uri:
        url: "{{ grafana_url }}/api/health"
        method: GET
        return_content: false
      register: grafana_health
      retries: 5
      delay: 10
      until: grafana_health.status is defined and grafana_health.status == 200
      failed_when: false

    - name: End play if Grafana API not accessible
      ansible.builtin.meta: end_play
      when: grafana_health.status is not defined or grafana_health.status != 200

    # ========== CHECK IF DATASOURCE ALREADY EXISTS ==========
    - name: Get existing datasources
      ansible.builtin.uri:
        url: "{{ grafana_url }}/api/datasources"
        method: GET
        user: "{{ grafana_user }}"
        password: "{{ grafana_admin_password }}"
        force_basic_auth: true
      register: existing_datasources
      changed_when: false

    - name: Check if Alertmanager datasource already exists
      ansible.builtin.set_fact:
        alertmanager_ds_exists: >-
          {{ (existing_datasources.json | selectattr('type', 'equalto', 'alertmanager') | list | length) > 0 }}

    # ========== ADD ALERTMANAGER DATASOURCE ==========
    - name: Add Alertmanager as datasource in Grafana
      ansible.builtin.uri:
        url: "{{ grafana_url }}/api/datasources"
        method: POST
        user: "{{ grafana_user }}"
        password: "{{ grafana_admin_password }}"
        force_basic_auth: true
        body_format: json
        body:
          name: "Alertmanager"
          type: "alertmanager"
          url: "{{ alertmanager_internal_url }}"
          access: "proxy"
          isDefault: false
          jsonData:
            implementation: "prometheus"
            handleGrafanaManagedAlerts: false
        status_code: [200, 409]
      register: add_alertmanager
      changed_when: add_alertmanager.status == 200
      when: not alertmanager_ds_exists

    - name: Alertmanager datasource already configured
      ansible.builtin.debug:
        msg: "Alertmanager datasource already exists in Grafana - skipping"
      when: alertmanager_ds_exists

    # ========== DISPLAY RESULT ==========
    - name: Display wiring result
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "Grafana <-> Alertmanager Wiring Complete"
          - "=========================================="
          - "Datasource: Alertmanager ({{ 'Added' if not alertmanager_ds_exists else 'Already configured' }})"
          - "Implementation: prometheus"
          - "Internal URL: {{ alertmanager_internal_url }}"
          - "Access Mode: proxy (server-side)"
          - "=========================================="
