#   id: "atomic/apps/grafana/24-dashboard-prowlarr"
#   type: "atomic"
#
#   # ========== FILE LOCATION ==========
#   path_info:
#     file_path: "atomic/apps/grafana/config/24-dashboard-prowlarr.yml"
#     category: "apps"
#     subsystem: "grafana"
#
#   # ========== TRADITIONAL METADATA ==========
#   dependencies: ["grafana_deployed", "prowlarr_deployed", "prometheus_deployed", "grafana_prometheus_wired"]
#   provides: ["grafana_dashboard_prowlarr"]
#   tags: ["grafana", "prowlarr", "dashboard", "monitoring", "media", "phase4"]
#   estimated_duration: 30
#   parallel_safe: true
#   idempotent: true
#   description: >-
#     Import Prowlarr dashboard into Grafana via the HTTP API.
#     No Grafana.com dashboard exists for Prowlarr; uses a minimal inline
#     dashboard JSON with placeholder panels. Replace with the Exportarr
#     community dashboard JSON when available.
#     Idempotent: uses overwrite=true so re-runs update the existing dashboard.
#   requires_apps: ["grafana", "prowlarr", "prometheus"]
#
#   # ========== BWS STATE INTERACTION ==========
#   bws_state:
#     reads:
#       - path: "_state.apps.grafana.admin_password"

- name: Import Prowlarr Dashboard into Grafana
  hosts: "{{ target_hosts | default('localhost') }}"
  gather_facts: false
  become: false

  vars:
    grafana_namespace: "grafana"
    app_namespace: "{{ grafana_namespace }}"
    # grafana_url: from BWS _state via Phase 4 extra-vars
    grafana_user: "admin"
    dashboard_name: "Prowlarr Overview"
    dashboard_uid: "prowlarr-overview"

  tasks:
    # ========== VALIDATE REQUIRED VARS ==========
    - name: Fail if Grafana admin password not provided
      ansible.builtin.fail:
        msg: >-
          grafana_admin_password must be provided via extra-vars or
          GRAFANA_ADMIN_PASSWORD environment variable
      when: grafana_admin_password is not defined or grafana_admin_password | length == 0
    # ========== VERIFY GRAFANA API ==========
    - name: Verify Grafana API is accessible
      ansible.builtin.uri:
        url: "{{ grafana_url }}/api/health"
        method: GET
        return_content: false
      register: grafana_health
      retries: 5
      delay: 10
      until: grafana_health.status is defined and grafana_health.status == 200
      failed_when: false

    - name: End play if Grafana API not accessible
      ansible.builtin.meta: end_play
      when: grafana_health.status is not defined or grafana_health.status != 200

    # ========== IMPORT DASHBOARD ==========
    # NOTE: No Grafana.com dashboard exists for Prowlarr. This uses a minimal
    # placeholder dashboard. Replace the dashboard JSON below with the Exportarr
    # community dashboard (from exportarr examples/grafana/) when available.
    - name: "Import {{ dashboard_name }} dashboard (inline JSON)"
      ansible.builtin.uri:
        url: "{{ grafana_url }}/api/dashboards/db"
        method: POST
        user: "{{ grafana_user }}"
        password: "{{ grafana_admin_password }}"
        force_basic_auth: true
        body_format: json
        body:
          dashboard:
            uid: "{{ dashboard_uid }}"
            title: "{{ dashboard_name }}"
            tags:
              - "prowlarr"
              - "media"
              - "auto-imported"
            timezone: "browser"
            schemaVersion: 39
            version: 0
            panels:
              - id: 1
                title: "Prowlarr - Placeholder"
                type: "text"
                gridPos:
                  h: 4
                  w: 24
                  x: 0
                  y: 0
                options:
                  mode: "markdown"
                  content: >-
                    ## Prowlarr Dashboard Placeholder

                    This is a placeholder dashboard. Replace with the Exportarr
                    community dashboard JSON (from exportarr examples/grafana/)
                    or create custom panels using Prometheus metrics from the
                    Prowlarr exporter.
          folderId: 0
          overwrite: true
        status_code: [200]
      register: import_result

    # ========== DISPLAY RESULT ==========
    - name: Display import result
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "Grafana Dashboard Import Complete"
          - "=========================================="
          - "Dashboard: {{ dashboard_name }}"
          - "UID: {{ dashboard_uid }}"
          - "Source: Inline JSON (placeholder)"
          - "Status: {{ import_result.status }}"
          - "NOTE: Replace with Exportarr community dashboard JSON when available"
          - "=========================================="
