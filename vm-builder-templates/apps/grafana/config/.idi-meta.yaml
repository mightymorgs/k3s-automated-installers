schema_version: '1.0'
repo_id: vm-builder-templates
files:
  01-configure-datasources.yml:
    summary: Configure Grafana datasources by reading BWS._state for Loki and Prometheus
      URLs. Wires Grafana to available datasources via API (no kubectl). Updates BWS._state
      with wiring status.
    source: inferred
    confidence: medium
    calls_api:
    - '{{ grafana_url }}/api/datasources'
    - '{{ loki_url }}'
    - '{{ grafana_url }}/api/datasources'
    - '{{ prometheus_url }}'
    references_services:
    - loki
    - prometheus
  04-configure-api.yml:
    summary: Enable anonymous access for Grafana in Tailscale mode. Patches the Grafana
      deployment with GF_AUTH_ANONYMOUS_ENABLED=true so users on the tailnet can access
      dashboards without logging in. Tailscale provides the authentication layer.
    source: inferred
    confidence: medium
    calls_api:
    - '{{ grafana_url }}/api/health'
  04-configure-datasources.yml:
    summary: Configure Grafana datasources via API
    source: inferred
    confidence: medium
    calls_api:
    - '{{ grafana_url }}/api/datasources'
    - http://prometheus.prometheus:9090
    - '{{ grafana_url }}/api/datasources'
    - http://loki.loki:3100
    - '{{ grafana_url }}/api/datasources'
    - http://alertmanager.alertmanager:9093
    - '{{ grafana_url }}/api/datasources'
    - http://elasticsearch.elastic:9200
  05-wire-prometheus.yml:
    summary: 'Add Prometheus as the default datasource in Grafana via the HTTP API.
      Uses Grafana basic auth (admin user) and internal K8s DNS for the Prometheus
      URL. Idempotent: 409 means datasource already exists.'
    source: inferred
    confidence: medium
    calls_api:
    - '{{ grafana_url }}/api/health'
    - '{{ grafana_url }}/api/datasources'
    - '{{ grafana_url }}/api/datasources'
    - '{{ prometheus_internal_url }}'
    requires_apps:
    - prometheus
    references_services:
    - prometheus
  06-wire-loki.yml:
    summary: 'Add Loki as a datasource in Grafana via the HTTP API. Uses Grafana basic
      auth (admin user) and internal K8s DNS for the Loki URL. Idempotent: checks
      for existing datasource before creating.'
    source: inferred
    confidence: medium
    calls_api:
    - '{{ grafana_url }}/api/health'
    - '{{ grafana_url }}/api/datasources'
    - '{{ grafana_url }}/api/datasources'
    - '{{ loki_internal_url }}'
    requires_apps:
    - loki
    references_services:
    - loki
  07-wire-alertmanager.yml:
    summary: 'Add Alertmanager as a datasource in Grafana via the HTTP API. Configures
      the Prometheus implementation type so Grafana can query Alertmanager''s API
      for alert status and silences. Idempotent: checks for existing datasource before
      creating.'
    source: inferred
    confidence: medium
    calls_api:
    - '{{ grafana_url }}/api/health'
    - '{{ grafana_url }}/api/datasources'
    - '{{ grafana_url }}/api/datasources'
    - '{{ alertmanager_internal_url }}'
    requires_apps:
    - alertmanager
    references_services:
    - alertmanager
  08-wire-elastic.yml:
    summary: 'Add Elasticsearch as a datasource in Grafana via the HTTP API. Uses
      internal K8s DNS for the Elasticsearch URL. Configures the logs-* index pattern
      with @timestamp as the time field. Idempotent: checks for existing datasource
      before creating.'
    source: inferred
    confidence: medium
    calls_api:
    - '{{ grafana_url }}/api/health'
    - '{{ grafana_url }}/api/datasources'
    - '{{ grafana_url }}/api/datasources'
    - '{{ elastic_internal_url }}'
    requires_apps:
    - elastic
    references_services:
    - elastic
  09-wire-alertmanager-unified.yml:
    summary: 'Configure Grafana unified alerting to send alerts to Alertmanager. This
      is the push direction (Grafana -> Alertmanager). The existing 07-wire-alertmanager.yml
      adds Alertmanager as a datasource (pull). This playbook enables unified alerting
      via environment variables on the Grafana deployment, disables legacy alerting,
      and configures the external Alertmanager URL. Idempotent: checks current env
      vars before patching.'
    source: inferred
    confidence: medium
    calls_api:
    - '{{ grafana_url }}/api/health'
    - '{{ grafana_url }}/api/health'
    requires_apps:
    - alertmanager
    references_services:
    - alertmanager
  10-enable-metrics.yml:
    summary: Enable Prometheus metrics scraping for Grafana. Sets the GF_METRICS_ENABLED=true
      environment variable to activate the built-in /metrics endpoint on port 3000,
      then adds pod-level Prometheus scrape annotations so Prometheus auto-discovers
      and scrapes the metrics endpoint via its kubernetes-pods scrape config.
    source: inferred
    confidence: medium
    requires_apps:
    - prometheus
  11-dashboard-traefik.yml:
    summary: 'Import Traefik v3 Overview dashboard (Grafana.com #17346) into Grafana
      via the HTTP API. Uses basic auth and the /api/dashboards/import endpoint. Idempotent:
      uses overwrite=true so re-runs update the existing dashboard.'
    source: inferred
    confidence: medium
    calls_api:
    - '{{ grafana_url }}/api/health'
    - '{{ grafana_url }}/api/dashboards/import'
    requires_apps:
    - prometheus
    - traefik
