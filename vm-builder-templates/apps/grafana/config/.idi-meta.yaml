  23-dashboard-jellyfin.yml:
    summary: 'Import Jellyfin Overview dashboard into Grafana via the HTTP API. No
      Grafana.com dashboard exists for Jellyfin; uses a minimal inline dashboard JSON
      with placeholder panels. Replace with a community dashboard JSON (e.g. rebelcore/jellyfin_grafana)
      when available. Idempotent: uses overwrite=true so re-runs update the existing
      dashboard.'
    source: inferred
    confidence: medium
    calls_api:
    - '{{ grafana_url }}/api/health'
    - '{{ grafana_url }}/api/dashboards/db'
    requires_apps:
