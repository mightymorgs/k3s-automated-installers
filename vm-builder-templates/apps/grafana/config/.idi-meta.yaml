  25-datasource-neo4j.yml:
    summary: Install the Neo4j community datasource plugin in Grafana and add Neo4j
      as a datasource via the Grafana HTTP API. Requires a Grafana pod restart to
      load the plugin after installation. Uses internal K8s DNS bolt:// protocol for
      Neo4j connectivity.
    source: inferred
    confidence: medium
    calls_api:
    - '{{ grafana_url }}/api/health'
    - '{{ grafana_url }}/api/plugins'
    - '{{ grafana_url }}/api/health'
    - '{{ grafana_url }}/api/datasources'
    - '{{ grafana_url }}/api/datasources'
    - '{{ neo4j_bolt_url }}'
    requires_apps:
    - neo4j
    references_services:
    - neo4j-bolt
  26-datasource-langfuse.yml:
    summary: Install the Grafana Infinity datasource plugin and add Langfuse as a
      datasource for querying Langfuse metrics via its HTTP API. Requires a Grafana
      pod restart to load the plugin. Uses internal K8s DNS for Langfuse connectivity.
    source: inferred
    confidence: medium
    calls_api:
    - '{{ grafana_url }}/api/health'
    - '{{ grafana_url }}/api/plugins'
    - '{{ grafana_url }}/api/health'
    - '{{ grafana_url }}/api/datasources'
    - '{{ grafana_url }}/api/datasources'
    - '{{ langfuse_internal_url }}'
    requires_apps:
    - langfuse
    references_services:
    - langfuse
