- name: Deploy Grafana
  hosts: "{{ target_hosts | default('localhost') }}"
  gather_facts: true
  become: false

  vars:
    app_name: grafana
    app_namespace: "grafana"
    templates_dir: "{{ playbook_dir }}/../templates"
    render_dir: "/tmp/grafana-manifests"
    kubectl_action: "{{ 'replace --force' if install_mode | default('rebuild') == 'full' else 'apply' }}"
    container_port: 3000
    health_path: "/api/health"
    admin_password: "{{ lookup('password', '/dev/null length=32 chars=ascii_letters,digits') }}"
    app_start_timeout_seconds: 600
    retry_interval_seconds: 10
    health_probe_timeout_seconds: 5

  tasks:
    # ========== 1. VERIFY PREREQUISITES ==========
    - name: Verify kubectl is available
      ansible.builtin.command: kubectl version --client
      register: kubectl_check
      changed_when: false

    - name: Verify K3s cluster is accessible
      ansible.builtin.command: kubectl get nodes
      register: nodes_check
      changed_when: false
      retries: 5
      delay: "{{ retry_interval_seconds }}"
      until: nodes_check.rc == 0

    # ========== 2. CREATE NAMESPACE ==========
    - name: Ensure namespace exists
      ansible.builtin.shell: |
        kubectl create namespace {{ app_namespace }} --dry-run=client -o yaml | kubectl apply -f -
      register: ns_apply
      changed_when: "'created' in ns_apply.stdout or 'configured' in ns_apply.stdout"

    - name: Label namespace
      ansible.builtin.command: >-
        kubectl label namespace {{ app_namespace }}
        app.kubernetes.io/name=grafana
        app.kubernetes.io/part-of=golden-master
        --overwrite
      changed_when: false

    # ========== 3. RENDER J2 TEMPLATES ==========
    - name: Create render directory
      ansible.builtin.file:
        path: "{{ render_dir }}"
        state: directory
        mode: '0755'

    - name: Render configmap template
      ansible.builtin.template:
        src: "{{ templates_dir }}/configmap.yaml.j2"
        dest: "{{ render_dir }}/configmap.yaml"
        mode: '0644'

    - name: Check if grafana secrets already exist
      ansible.builtin.command: >-
        kubectl get secret {{ secret_name | default('grafana-secrets') }}
        -n {{ app_namespace }} -o jsonpath='{.data.GF_SECURITY_ADMIN_PASSWORD}'
      register: existing_secret
      changed_when: false
      failed_when: false

    - name: Preserve existing admin password
      ansible.builtin.set_fact:
        admin_password: "{{ existing_secret.stdout | b64decode }}"
      when: existing_secret.rc == 0 and existing_secret.stdout != '' and (existing_secret.stdout | b64decode | length) > 0
      no_log: true

    - name: Guard against empty admin password
      ansible.builtin.fail:
        msg: >-
          Refusing to deploy — admin_password is empty.
          Neither preservation from existing K8s Secret nor generation produced a value.
      when: admin_password | default('') | length == 0

    - name: Render secrets template
      ansible.builtin.template:
        src: "{{ templates_dir }}/secrets.yaml.j2"
        dest: "{{ render_dir }}/secrets.yaml"
        mode: '0644'

    - name: Render StatefulSet template
      ansible.builtin.template:
        src: "{{ templates_dir }}/statefulset.yaml.j2"
        dest: "{{ render_dir }}/statefulset.yaml"
        mode: '0644'

    - name: Render Service template
      ansible.builtin.template:
        src: "{{ templates_dir }}/service.yaml.j2"
        dest: "{{ render_dir }}/service.yaml"
        mode: '0644'

    - name: Render PushSecret template
      ansible.builtin.template:
        src: "{{ templates_dir }}/pushsecret.yaml.j2"
        dest: "{{ render_dir }}/pushsecret.yaml"
        mode: '0644'

    # ========== 4. APPLY RENDERED MANIFESTS ==========
    # Secrets must always use 'apply' — never 'replace --force' — to avoid
    # rotating credentials while Grafana still has the old password from its PVC.
    - name: Apply secrets (never replace --force)
      ansible.builtin.command:
        cmd: kubectl apply -f {{ render_dir }}/secrets.yaml
      register: secrets_apply
      changed_when: "'created' in secrets_apply.stdout or 'configured' in secrets_apply.stdout"

    - name: Apply PushSecret (always idempotent)
      ansible.builtin.command:
        cmd: kubectl apply -f {{ render_dir }}/pushsecret.yaml
      register: pushsecret_apply
      changed_when: "'created' in pushsecret_apply.stdout or 'configured' in pushsecret_apply.stdout"

    - name: Apply workload manifests
      ansible.builtin.command:
        cmd: >-
          kubectl {{ kubectl_action }}
          -f {{ render_dir }}/configmap.yaml
          -f {{ render_dir }}/statefulset.yaml
          -f {{ render_dir }}/service.yaml
      register: workload_apply
      changed_when: "'created' in workload_apply.stdout or 'configured' in workload_apply.stdout"

    - name: Display applied resources
      ansible.builtin.debug:
        msg: "{{ workload_apply.stdout_lines }}"

    # ========== 5. WAIT FOR POD READY ==========
    - name: Wait for StatefulSet to create pod
      ansible.builtin.command: >-
        kubectl -n {{ app_namespace }} get pod -l app={{ app_name }} --no-headers
      register: pod_exists
      changed_when: false
      retries: "{{ (app_start_timeout_seconds / retry_interval_seconds) | int }}"
      delay: "{{ retry_interval_seconds }}"
      until: pod_exists.rc == 0 and pod_exists.stdout | length > 0

    - name: Wait for Grafana pod to be ready
      ansible.builtin.command: >-
        kubectl -n {{ app_namespace }} wait
        --for=condition=ready pod
        -l app={{ app_name }}
        --timeout={{ app_start_timeout_seconds }}s
      register: pod_wait
      changed_when: false
      retries: 3
      delay: "{{ retry_interval_seconds }}"
      until: pod_wait.rc == 0

    # ========== 6. HEALTH CHECK ==========
    # API key creation moved to Phase 4 config playbook.
    # Install only verifies Grafana is responsive.
    - name: Wait for Grafana to be responsive
      ansible.builtin.uri:
        url: "http://localhost:{{ nodeport | default(30030) }}/api/health"
        method: GET
        status_code: 200
      register: grafana_health
      retries: 30
      delay: "{{ retry_interval_seconds }}"
      until: grafana_health.status == 200

    # ========== 7. DISPLAY STATUS ==========
    - name: Get Tailscale IP for access URL
      ansible.builtin.command: tailscale ip -4
      register: tailscale_ip
      changed_when: false
      failed_when: false

    - name: Display deployment status
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "Grafana Deployed Successfully"
          - "=========================================="
          - "Namespace: {{ app_namespace }}"
          - "Image: {{ image | default('grafana/grafana:latest') }}"
          - "Access URL: http://{{ tailscale_ip.stdout | default(ansible_hostname) }}:{{ nodeport | default(30030) }}"
          - "=========================================="

    # ========== 8. BWS STATE ==========
    # Credentials (admin_password) are extracted from K8s secret grafana-secrets
    # and written to BWS by the Phase 3 workflow's generic writeback step.
    # No manual writeback needed here.

    # ========== 9. CLEANUP ==========
    - name: Clean up render directory
      ansible.builtin.file:
        path: "{{ render_dir }}"
        state: absent
