  name: kibana
  namespace: kibana
  labels:
    app.kubernetes.io/name: kibana
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: kibana
  ports:
    - port: 5601
      targetPort: http
      protocol: TCP
      name: http
      nodePort: 30560
