---
# playbook_metadata:
#   id: "atomic/apps/teleport/04-configure-api"
#   type: "atomic"
#
#   # ========== FILE LOCATION ==========
#   path_info:
#     file_path: "atomic/apps/teleport/config/04-configure-api.yml"
#     category: "apps"
#     subsystem: "teleport"
#
#   # ========== TRADITIONAL METADATA ==========
#   batch_id: "20260221_api_config_auth"
#   dependencies: ["teleport_deployed"]
#   provides: ["teleport_api_configured"]
#   tags: ["teleport", "api", "configuration", "zero-touch"]
#   estimated_duration: 120
#   parallel_safe: false
#   idempotent: true
#   description: >-
#     Configure Teleport for Tailscale Ingress mode. Sets the public
#     address to the Tailscale hostname so Teleport issues correct
#     redirect URLs and trusts the proxy path. Also ensures
#     TELEPORT_AUTH_TYPE=local so the built-in auth system remains
#     active — Teleport is an access platform and cannot have auth
#     disabled. This playbook makes Teleport ACCESSIBLE via the
#     Tailscale network, not auth-bypassed.
#   requires_apps: ["teleport"]
#
#   # ========== BWS STATE INTERACTION (v3.2) ==========
#   bws_state:
#     writes:
#       - path: "_state.apps.teleport.configured"
#         example: true

- name: Configure Teleport for Tailscale Ingress
  hosts: "{{ target_hosts | default('localhost') }}"
  gather_facts: false
  become: false

  vars:
    teleport_namespace: "teleport"
    teleport_web_port: 3080
    # teleport_url: from BWS _state via Phase 4 extra-vars (e.g. http://100.x.x.x:30444)
    # Extract host:port from teleport_url for public_addr
    teleport_public_addr: "{{ teleport_url | regex_replace('^https?://', '') }}"

  tasks:
    # ========== 1. CHECK IF TELEPORT IS DEPLOYED ==========
    - name: Check if Teleport pod is running
      ansible.builtin.command:
        cmd: kubectl get pod -n {{ teleport_namespace }} -l app=teleport --no-headers
      environment:
        KUBECONFIG: "{{ kubeconfig_path | default('/etc/rancher/k3s/k3s.yaml') }}"
      register: teleport_pod_check
      changed_when: false
      failed_when: false

    - name: Skip if Teleport not deployed
      ansible.builtin.debug:
        msg: "Teleport pod not found in namespace {{ teleport_namespace }} - skipping API configuration"
      when: teleport_pod_check.rc != 0 or teleport_pod_check.stdout | length == 0

    - name: End play if Teleport not available
      ansible.builtin.meta: end_play
      when: teleport_pod_check.rc != 0 or teleport_pod_check.stdout | length == 0

    # ========== GET POD NAME DYNAMICALLY ==========
    - name: Get Teleport pod name
      ansible.builtin.shell: |
        kubectl get pods -n {{ teleport_namespace }} \
          -l app.kubernetes.io/name=teleport \
          -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || \
        kubectl get pods -n {{ teleport_namespace }} \
          -l app=teleport \
          -o jsonpath='{.items[0].metadata.name}'
      register: app_pod
      changed_when: false
      environment:
        KUBECONFIG: "{{ kubeconfig_path | default('/etc/rancher/k3s/k3s.yaml') }}"

    # ========== 2. SET PUBLIC ADDRESS FOR TAILSCALE ACCESS ==========
    # TELEPORT_PUBLIC_ADDR tells Teleport its externally reachable address.
    # This is used in redirect URLs, certificate SANs, and proxy routing.
    # Without it, Teleport defaults to the internal cluster address which
    # is unreachable from the Tailscale network.
    - name: Set TELEPORT_PUBLIC_ADDR for Tailscale access
      ansible.builtin.command:
        cmd: >-
          kubectl set env statefulset/teleport -n {{ teleport_namespace }}
          TELEPORT_PUBLIC_ADDR={{ teleport_public_addr }}
      environment:
        KUBECONFIG: "{{ kubeconfig_path | default('/etc/rancher/k3s/k3s.yaml') }}"
      register: public_addr_result
      changed_when: "'updated' in public_addr_result.stdout"

    # ========== 3. ENSURE LOCAL AUTH IS ACTIVE ==========
    # TELEPORT_AUTH_TYPE=local ensures Teleport uses its own built-in
    # authentication system. Unlike other apps where Tailscale replaces
    # auth, Teleport IS an access platform — disabling its auth would
    # defeat its purpose. This explicitly sets local auth so it is not
    # overridden by any SSO connector auto-detection.
    - name: Set TELEPORT_AUTH_TYPE to local
      ansible.builtin.command:
        cmd: >-
          kubectl set env statefulset/teleport -n {{ teleport_namespace }}
          TELEPORT_AUTH_TYPE=local
      environment:
        KUBECONFIG: "{{ kubeconfig_path | default('/etc/rancher/k3s/k3s.yaml') }}"
      register: auth_type_result
      changed_when: "'updated' in auth_type_result.stdout"

    # ========== 4. CONFIGURE CLUSTER NETWORKING VIA TCTL ==========
    # Update the cluster networking config to set the public address on
    # the proxy service. This is the canonical way to set the public
    # address in Teleport — environment variables seed the initial config,
    # and tctl updates the runtime config stored in the backend.
    - name: Update cluster networking config with public address
      ansible.builtin.shell: |
        kubectl exec -n {{ teleport_namespace }} {{ app_pod.stdout }} -- \
          tctl edit cluster_networking_config --set-public-addr={{ teleport_public_addr }} 2>/dev/null || \
        kubectl exec -n {{ teleport_namespace }} {{ app_pod.stdout }} -- \
          sh -c 'cat <<EOCONFIG | tctl create --force -f -
        kind: cluster_networking_config
        version: v2
        metadata:
          name: cluster-networking-config
        spec:
          proxy_listener_mode: multiplex
        EOCONFIG'
      environment:
        KUBECONFIG: "{{ kubeconfig_path | default('/etc/rancher/k3s/k3s.yaml') }}"
      register: tctl_networking_result
      changed_when: true
      failed_when: false

    # ========== 5. WAIT FOR STATEFULSET ROLLOUT ==========
    # The env var changes trigger a rolling restart of the StatefulSet.
    # Teleport needs time to re-initialize its auth backend after restart.
    - name: Wait for Teleport StatefulSet rollout to complete
      ansible.builtin.command:
        cmd: >-
          kubectl rollout status statefulset/teleport
          -n {{ teleport_namespace }}
          --timeout=180s
      environment:
        KUBECONFIG: "{{ kubeconfig_path | default('/etc/rancher/k3s/k3s.yaml') }}"
      register: rollout_result
      changed_when: false

    # ========== 6. VERIFY TELEPORT WEB UI IS ACCESSIBLE ==========
    # Teleport serves its web UI on port 3080 (HTTP) or 443 (HTTPS).
    # The nodeport (30444) maps to the service port. We check the
    # Tailscale-accessible URL to confirm end-to-end connectivity.
    # Teleport returns 200 on the /webapi/ping endpoint when healthy.
    - name: Verify Teleport web UI is accessible via Tailscale
      ansible.builtin.uri:
        url: "{{ teleport_url }}/webapi/ping"
        method: GET
        status_code: [200]
        validate_certs: false
        return_content: false
      register: health_check
      retries: 10
      delay: 6
      until: health_check.status is defined and health_check.status == 200
      failed_when: false

    - name: Fail if Teleport not accessible after rollout
      ansible.builtin.fail:
        msg: "Teleport web UI not accessible after rollout (last status: {{ health_check.status | default('unknown') }})"
      when: health_check.status is not defined or health_check.status != 200

    # ========== 7. DISPLAY RESULT ==========
    - name: Display configuration result
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "Teleport API Configuration Complete"
          - "=========================================="
          - "Public Address: {{ teleport_public_addr }}"
          - "Auth Type: local (Teleport manages its own auth)"
          - "Auth Layer: Tailscale (network access) + Teleport (app login)"
          - "TELEPORT_PUBLIC_ADDR: {{ 'set' if public_addr_result.changed else 'already configured' }}"
          - "TELEPORT_AUTH_TYPE: {{ 'set' if auth_type_result.changed else 'already configured' }}"
          - "Cluster Networking: {{ 'updated' if tctl_networking_result.rc == 0 else 'skipped (non-fatal)' }}"
          - "Rollout: {{ 'successful' if rollout_result.rc == 0 else 'failed' }}"
          - "Health Check: {{ teleport_url }}/webapi/ping ({{ health_check.status | default('unknown') }})"
          - "Note: Teleport is an access platform - auth cannot and should not be disabled"
          - "=========================================="
