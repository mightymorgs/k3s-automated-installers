---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: teleport
  namespace: teleport

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - configmap.yaml
  - statefulset.yaml
  - service.yaml

labels:
  - pairs:
      app.kubernetes.io/managed-by: kustomize
      app.kubernetes.io/part-of: golden-master
      app.kubernetes.io/component: zero-trust-access
