apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: awx

resources:
  - namespace.yaml
  # AWX Operator from upstream
  - https://raw.githubusercontent.com/ansible/awx-operator/2.19.1/config/default/kustomization.yaml

# Images override for specific version
images:
  - name: quay.io/ansible/awx-operator
    newTag: 2.19.1

commonLabels:
  app.kubernetes.io/part-of: awx
  platform.austerit.com/component: automation

commonAnnotations:
  platform.austerit.com/managed-by: kustomize
  platform.austerit.com/version: "2.19.1"
