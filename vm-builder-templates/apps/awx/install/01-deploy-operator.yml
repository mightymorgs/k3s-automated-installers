- name: Deploy AWX Operator and Instance
  hosts: "{{ target_hosts | default('k3s_masters') }}"
  gather_facts: true
  become: false
  vars:
    app_name: "awx"
    app_namespace: "awx"
    awx_operator_version: 2.19.1
    awx_operator_url: github.com/ansible/awx-operator/config/default?ref={{ awx_operator_version }}
    awx_manifests_dir: "{{ playbook_dir }}/../k8s-base"
    kubeconfig_path: /etc/rancher/k3s/k3s.yaml
    bws_awx_admin_password_key: awx/admin_password
    retry_interval_seconds: 10
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  tasks:
    - name: Display AWX installation information
      ansible.builtin.debug:
        msg:
          - ==========================================
          - Installing AWX Automation Platform
          - ==========================================
          - 'AWX Operator Version: {{ awx_operator_version }}'
          - 'Namespace: {{ app_namespace }}'
          - 'Operator URL: {{ awx_operator_url }}'
          - ''
          - 'AWX Components:'
          - '  - awx-operator (lifecycle management)'
          - '  - awx-web (Web UI + REST API)'
          - '  - awx-task (job execution engine)'
          - '  - awx-postgres (database)'
          - '  - awx-redis (cache + task queue)'
          - ''
          - 'Storage: Longhorn (PostgreSQL + Projects)'
          - ==========================================
    - name: Ensure namespace exists
      ansible.builtin.shell: |
        kubectl create namespace {{ app_namespace }} --dry-run=client -o yaml | kubectl apply -f -
      register: ns_apply
      changed_when: "'created' in ns_apply.stdout or 'configured' in ns_apply.stdout"

    - name: Label namespace
      ansible.builtin.command: >-
        kubectl label namespace {{ app_namespace }}
        app.kubernetes.io/name={{ app_name }}
        app.kubernetes.io/part-of=golden-master
        --overwrite
      changed_when: false

    - name: Create AWX operator install info ConfigMap
      kubernetes.core.k8s:
        state: present
        src: '{{ awx_manifests_dir }}/awx-operator.yaml'
      register: operator_info
    - name: Deploy AWX Operator via kustomize
      kubernetes.core.k8s:
        state: present
        definition: "{{ lookup('kubernetes.core.kustomize', dir=awx_operator_url) }}"
        namespace: '{{ app_namespace }}'
        wait: false
      register: operator_deploy
    - name: Display operator deployment status
      ansible.builtin.debug:
        msg: AWX Operator deployment initiated
    - name: Wait for AWX Operator CRD to be established
      kubernetes.core.k8s_info:
        api_version: apiextensions.k8s.io/v1
        kind: CustomResourceDefinition
        name: awxs.awx.ansible.com
      register: crd_check
      until: >
        crd_check.resources | length > 0 and
        crd_check.resources[0].status.conditions |
        selectattr('type', 'equalto', 'Established') |
        selectattr('status', 'equalto', 'True') |
        list | length > 0
      retries: 60
      delay: 5
    - name: Display CRD status
      ansible.builtin.debug:
        msg: AWX CRD (awxs.awx.ansible.com) established successfully
    - name: Wait for AWX Operator deployment to be ready
      kubernetes.core.k8s_info:
        api_version: apps/v1
        kind: Deployment
        name: awx-operator-controller-manager
        namespace: '{{ app_namespace }}'
        wait: true
        wait_condition:
          type: Available
          status: 'True'
        wait_timeout: 300
      register: operator_ready
    - name: Display operator ready status
      ansible.builtin.debug:
        msg:
          - AWX Operator is ready
          - 'Deployment: awx-operator-controller-manager'
          - >-
            Replicas:
            {{ operator_ready.resources[0].status.readyReplicas | default(0) }}/{{
              operator_ready.resources[0].spec.replicas
            }}
    - name: Deploy AWX instance custom resource
      kubernetes.core.k8s:
        state: present
        src: '{{ awx_manifests_dir }}/awx-instance.yaml'
        namespace: '{{ app_namespace }}'
      register: awx_instance_deploy
    - name: Display AWX instance deployment status
      ansible.builtin.debug:
        msg:
          - AWX instance custom resource created
          - Operator will now provision AWX components
          - This may take 5-10 minutes...
    - name: Wait for AWX custom resource to report ready status
      kubernetes.core.k8s_info:
        api_version: awx.ansible.com/v1beta1
        kind: AWX
        name: awx
        namespace: '{{ app_namespace }}'
      register: awx_status
      until: >
        awx_status.resources | length > 0 and
        awx_status.resources[0].status is defined and
        awx_status.resources[0].status.conditions is defined and
        awx_status.resources[0].status.conditions |
        selectattr('type', 'equalto', 'Running') |
        selectattr('status', 'equalto', 'True') |
        list | length > 0
      retries: 120
      delay: 10
      failed_when: false
    - name: Display AWX deployment progress
      ansible.builtin.debug:
        msg:
          - >-
            AWX Status:
            {{
              awx_status.resources[0].status.conditions | default([])
              | selectattr('type', 'equalto', 'Running')
              | map(attribute='reason')
              | first
              | default('Deploying')
            }}
          - "Version: {{ awx_status.resources[0].status.version | default('deploying...') }}"
      when: awx_status.resources | length > 0
    - name: Wait for AWX web deployment to be ready
      kubernetes.core.k8s_info:
        api_version: apps/v1
        kind: Deployment
        namespace: '{{ app_namespace }}'
        name: awx-web
        kubeconfig: '{{ kubeconfig_path }}'
      register: awx_web_ready
      until:
        - awx_web_ready.resources | default([]) | length > 0
        - (awx_web_ready.resources[0].status.readyReplicas | default(0)) > 0
      retries: 60
      delay: 10
      failed_when: false
    - name: Wait for AWX task deployment to be ready
      kubernetes.core.k8s_info:
        api_version: apps/v1
        kind: Deployment
        namespace: '{{ app_namespace }}'
        name: awx-task
        kubeconfig: '{{ kubeconfig_path }}'
      register: awx_task_ready
      until:
        - awx_task_ready.resources | default([]) | length > 0
        - (awx_task_ready.resources[0].status.readyReplicas | default(0)) > 0
      retries: 60
      delay: 10
      failed_when: false
    - name: Wait for AWX PostgreSQL to be ready
      kubernetes.core.k8s_info:
        api_version: apps/v1
        kind: StatefulSet
        namespace: '{{ app_namespace }}'
        name: awx-postgres-15
        kubeconfig: '{{ kubeconfig_path }}'
      register: awx_postgres_ready
      until:
        - awx_postgres_ready.resources | default([]) | length > 0
        - (awx_postgres_ready.resources[0].status.readyReplicas | default(0)) > 0
      retries: 60
      delay: 10
      failed_when: false
    - name: Display AWX component status
      ansible.builtin.debug:
        msg:
          - 'AWX Components Status:'
          - "  - awx-web: {{ 'Available' if (awx_web_ready.resources | default([]) | length > 0) else 'Pending' }}"
          - "  - awx-task: {{ 'Available' if (awx_task_ready.resources | default([]) | length > 0) else 'Pending' }}"
          - "  - postgres: {{ 'Ready' if (awx_postgres_ready.resources | default([]) | length > 0) else 'Pending' }}"
    - name: Retrieve AWX admin password from Secret
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Secret
        name: awx-admin-password
        namespace: '{{ app_namespace }}'
      register: admin_secret
      until: admin_secret.resources | length > 0
      retries: 60
      delay: 10
    - name: Extract and decode admin password
      ansible.builtin.set_fact:
        awx_admin_password: '{{ admin_secret.resources[0].data.password | b64decode }}'
      no_log: true
    - name: Display admin password (for immediate use)
      ansible.builtin.debug:
        msg:
          - ==========================================
          - AWX Admin Credentials
          - ==========================================
          - 'Username: admin'
          - 'Password: {{ awx_admin_password }}'
          - ==========================================
          - 'IMPORTANT: Store this password securely!'
          - It will be saved to Bitwarden Secrets Manager
          - ==========================================
    - name: Check if BWS CLI is available
      ansible.builtin.command: which bws
      register: bws_check
      failed_when: false
      changed_when: false
    - name: Store admin password in Bitwarden Secrets Manager
      ansible.builtin.shell:
        cmd: |
          bws secret create {{ bws_awx_admin_password_key }} "{{ awx_admin_password }}" || \
          bws secret edit {{ bws_awx_admin_password_key }} --value "{{ awx_admin_password }}"
      environment:
        BWS_ACCESS_TOKEN: "{{ lookup('env', 'BWS_ACCESS_TOKEN') }}"
      register: bws_store
      failed_when: false
      changed_when: bws_store.rc == 0
      no_log: true
      when: bws_check.rc == 0
    - name: Display BWS storage status
      ansible.builtin.debug:
        msg: >-
          {{
            'Admin password stored in BWS: ' + bws_awx_admin_password_key
            if bws_store is succeeded
            else 'WARNING: Could not store password in BWS - store manually'
          }}
      when: bws_check.rc == 0

    - name: Render and apply PushSecret
      block:
        - name: Render PushSecret template
          ansible.builtin.template:
            src: "{{ playbook_dir }}/../templates/pushsecret.yaml.j2"
            dest: "/tmp/awx-pushsecret.yaml"
            mode: '0644'
        - name: Apply PushSecret
          ansible.builtin.command:
            cmd: kubectl apply -f /tmp/awx-pushsecret.yaml
          register: pushsecret_apply
          changed_when: "'created' in pushsecret_apply.stdout or 'configured' in pushsecret_apply.stdout"

        - name: Clean up PushSecret manifest
          ansible.builtin.file:
            path: "/tmp/awx-pushsecret.yaml"
            state: absent

    - name: Get AWX service details
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Service
        name: awx-service
        namespace: '{{ app_namespace }}'
      register: awx_svc
    - name: Get node information
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Node
      register: nodes_info
    - name: Extract node IP
      ansible.builtin.set_fact:
        node_ip: >-
          {{
            nodes_info.resources[0].status.addresses
            | selectattr('type', 'equalto', 'InternalIP')
            | map(attribute='address')
            | first
          }}
    - name: Get all AWX pods
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Pod
        namespace: '{{ app_namespace }}'
        label_selectors: [app.kubernetes.io/part-of=awx]
      register: awx_pods
    - name: Display final deployment summary
      ansible.builtin.debug:
        msg:
          - ==========================================
          - AWX Installation Complete!
          - ==========================================
          - ''
          - 'Namespace: {{ app_namespace }}'
          - 'Pods: {{ awx_pods.resources | length }} pod(s) running'
          - "{{ awx_pods.resources | map(attribute='metadata.name') | map('regex_replace', '^(.*)$', '  - \\1') | list | join('\n') }}"
          - ''
          - 'Service: awx-service.{{ app_namespace }}.svc.cluster.local:80'
          - 'Login: admin / {{ awx_admin_password }}'
          - 'Password stored in BWS: {{ bws_awx_admin_password_key }}'
          - ''
          - ==========================================
