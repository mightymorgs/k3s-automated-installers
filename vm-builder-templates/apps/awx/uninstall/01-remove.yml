---
- name: Uninstall AWX
  hosts: "{{ target_hosts | default('localhost') }}"
  gather_facts: false
  become: false

  vars:
    app_name: awx
    app_namespace: "awx"
    delete_pvc: false

  tasks:
    - name: Check namespace exists
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Namespace
        name: "{{ app_namespace }}"
      register: ns_check

    - name: Skip if namespace does not exist
      ansible.builtin.meta: end_play
      when: ns_check.resources | length == 0

    # Delete AWX CR first (operator manages sub-resources)
    - name: Delete AWX instance
      kubernetes.core.k8s:
        api_version: awx.ansible.com/v1beta1
        kind: AWX
        name: awx
        namespace: "{{ app_namespace }}"
        state: absent
        wait: true
        wait_timeout: 300
      failed_when: false

    - name: Wait for AWX operator to clean up resources
      ansible.builtin.pause:
        seconds: 30

    - name: Delete NodePort Service awx-nodeport
      kubernetes.core.k8s:
        api_version: v1
        kind: Service
        name: awx-nodeport
        namespace: "{{ app_namespace }}"
        state: absent

    # Clean up any remaining resources the operator left behind
    - name: Delete remaining Deployments in awx namespace
      kubernetes.core.k8s_info:
        api_version: apps/v1
        kind: Deployment
        namespace: "{{ app_namespace }}"
      register: awx_deployments

    - name: Remove remaining Deployments
      kubernetes.core.k8s:
        api_version: apps/v1
        kind: Deployment
        name: "{{ item.metadata.name }}"
        namespace: "{{ app_namespace }}"
        state: absent
        wait: true
        wait_timeout: 120
      loop: "{{ awx_deployments.resources }}"
      loop_control:
        label: "{{ item.metadata.name }}"

    - name: Delete remaining StatefulSets in awx namespace
      kubernetes.core.k8s_info:
        api_version: apps/v1
        kind: StatefulSet
        namespace: "{{ app_namespace }}"
      register: awx_sts

    - name: Remove remaining StatefulSets
      kubernetes.core.k8s:
        api_version: apps/v1
        kind: StatefulSet
        name: "{{ item.metadata.name }}"
        namespace: "{{ app_namespace }}"
        state: absent
        wait: true
        wait_timeout: 120
      loop: "{{ awx_sts.resources }}"
      loop_control:
        label: "{{ item.metadata.name }}"

    - name: Delete PVCs for awx
      when: delete_pvc | bool
      block:
        - name: Find all PVCs in awx namespace
          kubernetes.core.k8s_info:
            api_version: v1
            kind: PersistentVolumeClaim
            namespace: "{{ app_namespace }}"
          register: app_pvcs

        - name: Remove PVCs
          kubernetes.core.k8s:
            api_version: v1
            kind: PersistentVolumeClaim
            name: "{{ item.metadata.name }}"
            namespace: "{{ app_namespace }}"
            state: absent
          loop: "{{ app_pvcs.resources }}"
          loop_control:
            label: "{{ item.metadata.name }}"
