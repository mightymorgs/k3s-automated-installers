- name: AWX - Create Credential
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    inventory_secret_name: "{{ lookup('env', 'VM_INVENTORY_SECRET') }}"
    awx_base_url: "{{ awx_url }}"
    awx_api_base: "{{ awx_base_url }}/api/v2"

    # Required fields
    # credential_name: Name of the credential (required)
    # credential_type_id: ID of the credential type (required)
    #   Common types: 1=Machine, 2=SCM, 14=Vault, etc.

    # Optional fields
    credential_description: "{{ credential_description_input | default('') }}"
    organization_id: "{{ organization_id_input | default(omit) }}"
    credential_inputs: "{{ credential_inputs_input | default({}) }}"

    # For Machine credentials (type 1), inputs typically include:
    #   username: SSH username
    #   password: SSH password (optional if using key)
    #   ssh_key_data: Private SSH key
    #   become_method: sudo, su, etc.
    #   become_username: Privilege escalation user
    #   become_password: Privilege escalation password

    # For SCM credentials (type 2), inputs typically include:
    #   username: SCM username
    #   password: SCM password or token
    #   ssh_key_data: Private SSH key for git+ssh

  tasks:
    # ===== STEP 1: Validate Required Inputs =====
    - name: Validate required inputs are provided
      ansible.builtin.assert:
        that:
          - credential_name is defined and credential_name | length > 0
          - credential_type_id is defined
        fail_msg: >-
          Required inputs missing: credential_name and credential_type_id are required.
          Common credential_type_id values: 1=Machine, 2=SCM, 14=Vault
        success_msg: "All required inputs validated: credential_name={{ credential_name }}"

    # ===== STEP 2: Validate Environment =====
    - name: Validate BWS_ACCESS_TOKEN is set
      ansible.builtin.assert:
        that:
          - lookup('env', 'BWS_ACCESS_TOKEN') | length > 0
        fail_msg: "BWS_ACCESS_TOKEN environment variable must be set"
        success_msg: "BWS access configured"

    - name: Validate VM_INVENTORY_SECRET is set
      ansible.builtin.assert:
        that:
          - inventory_secret_name | length > 0
        fail_msg: "VM_INVENTORY_SECRET environment variable must be set"
        success_msg: "Inventory secret name configured"

    # ===== STEP 3: Read BWS Inventory and AWX Token =====
    - name: Fetch VM inventory from BWS
      ansible.builtin.shell: |
        bws secret get "{{ inventory_secret_name }}" --output json
      environment:
        BWS_ACCESS_TOKEN: "{{ lookup('env', 'BWS_ACCESS_TOKEN') }}"
      register: bws_result
      changed_when: false
      no_log: true

    - name: Parse inventory JSON
      ansible.builtin.set_fact:
        inventory: "{{ (bws_result.stdout | from_json).value | from_json }}"
      no_log: true

    - name: Extract AWX token
      ansible.builtin.set_fact:
        awx_token: "{{ inventory._state.apps.awx.token }}"
      no_log: true

    - name: Validate AWX token is available
      ansible.builtin.assert:
        that:
          - awx_token | length > 0
        fail_msg: "AWX token not found in BWS _state. Ensure AWX is configured."
        success_msg: "AWX token retrieved from BWS _state"

    # ===== STEP 4: Get Credential Type Name =====
    - name: Look up credential type name
      ansible.builtin.uri:
        url: "{{ awx_api_base }}/credential_types/{{ credential_type_id }}/"
        method: GET
        headers:
          Authorization: "Bearer {{ awx_token }}"
          Content-Type: "application/json"
        status_code: [200]
        validate_certs: false
      register: credential_type_info
      no_log: false

    - name: Set credential type name
      ansible.builtin.set_fact:
        credential_type_name: "{{ credential_type_info.json.name }}"

    # ===== STEP 5: Check for Existing Credential (Idempotency) =====
    - name: Check if credential already exists by name
      ansible.builtin.uri:
        url: "{{ awx_api_base }}/credentials/?name={{ credential_name | urlencode }}"
        method: GET
        headers:
          Authorization: "Bearer {{ awx_token }}"
          Content-Type: "application/json"
        status_code: [200]
        validate_certs: false
      register: existing_credential
      no_log: false

    - name: Set credential exists flag
      ansible.builtin.set_fact:
        credential_exists: "{{ existing_credential.json.count > 0 }}"
        existing_credential_id: "{{ existing_credential.json.results[0].id | default(0) }}"

    - name: Skip creation if credential exists
      ansible.builtin.debug:
        msg: >-
          Credential '{{ credential_name }}' already exists with ID: {{ existing_credential_id }}
      when: credential_exists

    # ===== STEP 6: Create Credential =====
    - name: Build credential payload
      ansible.builtin.set_fact:
        credential_payload:
          name: "{{ credential_name }}"
          description: "{{ credential_description }}"
          credential_type: "{{ credential_type_id }}"
          inputs: "{{ credential_inputs }}"
      when: not credential_exists
      no_log: true

    - name: Add organization if provided
      ansible.builtin.set_fact:
        credential_payload: "{{ credential_payload | combine({'organization': organization_id}) }}"
      when:
        - not credential_exists
        - organization_id is defined
      no_log: true

    - name: Create AWX credential
      ansible.builtin.uri:
        url: "{{ awx_api_base }}/credentials/"
        method: POST
        headers:
          Authorization: "Bearer {{ awx_token }}"
          Content-Type: "application/json"
        body_format: json
        body: "{{ credential_payload }}"
        status_code: [201]
        validate_certs: false
      register: create_result
      when: not credential_exists
      no_log: true

    - name: Set created credential ID
      ansible.builtin.set_fact:
        created_credential_id: "{{ create_result.json.id }}"
      when: not credential_exists

    # ===== STEP 7: Write Result to BWS._state =====
    - name: Update BWS inventory with credential info
      ansible.builtin.shell: |
        # Get current inventory
        CURRENT=$(bws secret get "{{ inventory_secret_name }}" --output json | jq -r '.value')

        # Get current timestamp
        TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

        # Merge credential info into _state.apps.awx.credentials
        UPDATED=$(echo "$CURRENT" | jq \
          --arg name "{{ credential_name }}" \
          --argjson id {{ created_credential_id | default(existing_credential_id) }} \
          --arg status "{{ 'created' if not credential_exists else 'existing' }}" \
          --arg cred_type "{{ credential_type_name }}" \
          --argjson type_id {{ credential_type_id }} \
          --arg timestamp "$TIMESTAMP" \
          '
          if ._state.apps.awx == null then ._state.apps.awx = {} else . end |
          if ._state.apps.awx.credentials == null then ._state.apps.awx.credentials = {} else . end |
          ._state.apps.awx.credentials[$name] = {
            "id": $id,
            "status": $status,
            "credential_type": $cred_type,
            "credential_type_id": $type_id,
            "created_at": $timestamp
          }
        ')

        # Write back to BWS
        bws secret edit "{{ inventory_secret_name }}" --value "$UPDATED"
      environment:
        BWS_ACCESS_TOKEN: "{{ lookup('env', 'BWS_ACCESS_TOKEN') }}"
      register: bws_update_result
      changed_when: true
      no_log: true

    # ===== STEP 8: Output Result =====
    - name: Display credential creation result
      ansible.builtin.debug:
        msg:
          status: "{{ 'existing' if credential_exists else 'created' }}"
          credential_name: "{{ credential_name }}"
          credential_id: "{{ existing_credential_id if credential_exists else created_credential_id }}"
          credential_type: "{{ credential_type_name }}"
          credential_type_id: "{{ credential_type_id }}"
