#     K8s secret, Phase 4 provides argocd_admin_password as extra-var).
#
#   # ========== BWS STATE INTERACTION (v3.2) ==========
#   bws_state:
#     reads:
#       - path: "_state.apps.argocd.admin_password"
#         purpose: "ArgoCD initial admin password (extracted by Phase 3)"

- name: Get ArgoCD Admin Password
  hosts: "{{ target_hosts | default('k3s_servers') }}"
  gather_facts: false
  become: true

  tasks:
    - name: Fail if ArgoCD admin password not available
      ansible.builtin.fail:
        msg: "argocd_admin_password not in Phase 4 extra-vars. Check Phase 3 credential extraction."
      when: argocd_admin_password is not defined or argocd_admin_password | length == 0

    - name: Set ArgoCD password from BWS
      ansible.builtin.set_fact:
        argocd_password: "{{ argocd_admin_password }}"
      no_log: true

    - name: Display access information
      ansible.builtin.debug:
        msg:
          - "========== ArgoCD Access Information =========="
          - "Username: admin"
          - "Password: [Retrieved from BWS extra-var - stored in argocd_password fact]"
