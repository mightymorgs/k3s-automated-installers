#   description: >-
#     Enable anonymous read-only access for ArgoCD in Tailscale mode.
#     Patches argocd-cm ConfigMap to enable anonymous users and
#     argocd-rbac-cm to grant read-only role. Tailscale provides
#     the authentication layer.
