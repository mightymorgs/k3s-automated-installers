---
apiVersion: v1
kind: Service
metadata:
  name: argocd
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: argocd
  ports:
    - port: 443
      targetPort: http
      protocol: TCP
      name: http
      nodePort: 30444
