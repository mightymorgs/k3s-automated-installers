- name: Deploy ArgoCD
  hosts: "{{ target_hosts | default('localhost') }}"
  gather_facts: true
  become: false

  vars:
    app_name: argocd
    app_namespace: "argocd"
    argocd_version: "v2.13.3"
    argocd_manifest_url: "https://raw.githubusercontent.com/argoproj/argo-cd/{{ argocd_version }}/manifests/install.yaml"
    manifest_path: "/tmp/argocd-install.yaml"
    nodeport: "{{ argocd_nodeport | default(30280) }}"

  tasks:
    - name: Verify kubectl is available
      ansible.builtin.command: kubectl version --client
      register: kubectl_check
      changed_when: false

    - name: Verify K3s cluster is accessible
      ansible.builtin.command: kubectl get nodes
      register: nodes_check
      changed_when: false
      retries: 5
      delay: 10
      until: nodes_check.rc == 0

    - name: Create argocd namespace
      ansible.builtin.shell: |
        kubectl create namespace {{ app_namespace }} --dry-run=client -o yaml | kubectl apply -f -
      register: ns_apply
      changed_when: "'created' in ns_apply.stdout or 'configured' in ns_apply.stdout"

    - name: Label namespace
      ansible.builtin.command: >-
        kubectl label namespace {{ app_namespace }}
        app.kubernetes.io/name={{ app_name }}
        app.kubernetes.io/part-of=golden-master
        --overwrite
      changed_when: false

    - name: Download official ArgoCD manifest
      ansible.builtin.get_url:
        url: "{{ argocd_manifest_url }}"
        dest: "{{ manifest_path }}"
        mode: '0644'
        force: true

    - name: Apply ArgoCD manifest
      ansible.builtin.command:
        cmd: kubectl apply -n {{ app_namespace }} -f {{ manifest_path }}
      register: manifests_apply
      changed_when: "'created' in manifests_apply.stdout or 'configured' in manifests_apply.stdout"

    - name: Display applied resources
      ansible.builtin.debug:
        msg: "{{ manifests_apply.stdout_lines | default([]) }}"

    - name: Wait for argocd-server deployment to be available
      ansible.builtin.command: >-
        kubectl -n {{ app_namespace }} rollout status
        deployment/argocd-server
        --timeout=300s
      register: server_wait
      changed_when: false
      retries: 3
      delay: 10
      until: server_wait.rc == 0

    - name: Patch argocd-server service to NodePort
      ansible.builtin.command: >-
        kubectl -n {{ app_namespace }} patch svc argocd-server
        -p '{"spec": {"type": "NodePort", "ports": [{"name": "https", "port": 443, "targetPort": 8080, "nodePort": {{ nodeport }}}]}}'
      register: svc_patch
      changed_when: "'patched' in svc_patch.stdout"
      retries: 3
      delay: 5
      until: svc_patch.rc == 0

    - name: Get Tailscale IP for access URL
      ansible.builtin.command: tailscale ip -4
      register: tailscale_ip
      changed_when: false
      failed_when: false

    - name: Get initial admin password
      ansible.builtin.shell: >-
        kubectl -n {{ app_namespace }} get secret argocd-initial-admin-secret
        -o jsonpath='{.data.password}' | base64 -d
      register: admin_password
      changed_when: false
      failed_when: false
      no_log: true

    - name: Render and apply PushSecret
      block:
        - name: Render PushSecret template
          ansible.builtin.template:
            src: "{{ playbook_dir }}/../templates/pushsecret.yaml.j2"
            dest: "/tmp/argocd-pushsecret.yaml"
            mode: '0644'

        - name: Apply PushSecret
          ansible.builtin.command:
            cmd: kubectl apply -f /tmp/argocd-pushsecret.yaml
          register: pushsecret_apply
          changed_when: "'created' in pushsecret_apply.stdout or 'configured' in pushsecret_apply.stdout"

        - name: Clean up PushSecret manifest
          ansible.builtin.file:
            path: "/tmp/argocd-pushsecret.yaml"
            state: absent

    - name: Clean up downloaded manifest
      ansible.builtin.file:
        path: "{{ manifest_path }}"
        state: absent

    - name: Display deployment status
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "ArgoCD Deployed Successfully"
          - "=========================================="
          - "Namespace: {{ app_namespace }}"
          - "Version: {{ argocd_version }}"
          - "Access URL: https://{{ tailscale_ip.stdout | default(ansible_hostname) }}:{{ nodeport }}"
          - "Username: admin"
          - "Password: (stored in argocd-initial-admin-secret)"
          - "=========================================="
