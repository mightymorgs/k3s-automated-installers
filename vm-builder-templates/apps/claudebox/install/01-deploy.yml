- name: Deploy Claudebox
  hosts: "{{ target_hosts | default('localhost') }}"
  gather_facts: false
  become: false

  vars:
    app_name: claudebox
    app_namespace: "ai-tools"
    claudebox_image: "node:20-slim"
    storage_size: "20Gi"
    templates_dir: "{{ playbook_dir }}/../templates"
    render_dir: "/tmp/claudebox-manifests"
    kubectl_action: "{{ 'replace --force' if install_mode | default('rebuild') == 'full' else 'apply' }}"

  tasks:
    # ========== 1. VERIFY PREREQUISITES ==========
    - name: Verify kubectl is available
      ansible.builtin.command: kubectl version --client
      register: kubectl_check
      changed_when: false

    - name: Verify K3s cluster is accessible
      ansible.builtin.command: kubectl get nodes
      register: nodes_check
      changed_when: false
      retries: 5
      delay: 10
      until: nodes_check.rc == 0

    # ========== 2. CREATE NAMESPACE ==========
    - name: Ensure ai-tools namespace exists
      ansible.builtin.shell: |
        kubectl create namespace {{ app_namespace }} --dry-run=client -o yaml | kubectl apply -f -
      register: ns_apply
      changed_when: "'created' in ns_apply.stdout or 'configured' in ns_apply.stdout"

    - name: Label namespace
      ansible.builtin.command: >-
        kubectl label namespace {{ app_namespace }}
        app.kubernetes.io/name={{ app_name }}
        app.kubernetes.io/part-of=golden-master
        --overwrite
      changed_when: false

    # ========== 3. CREATE SERVICEACCOUNT & RBAC ==========
    - name: Create Claudebox ServiceAccount
      ansible.builtin.shell: |
        kubectl apply -f - <<'EOF'
        apiVersion: v1
        kind: ServiceAccount
        metadata:
          name: claudebox
          namespace: {{ app_namespace }}
        EOF
      changed_when: false

    - name: Create Claudebox ClusterRole
      ansible.builtin.shell: |
        kubectl apply -f - <<'EOF'
        apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRole
        metadata:
          name: claudebox-reader
        rules:
          - apiGroups: [""]
            resources: ["pods", "services", "configmaps", "secrets"]
            verbs: ["get", "list", "watch"]
          - apiGroups: ["apps"]
            resources: ["deployments", "statefulsets"]
            verbs: ["get", "list", "watch"]
        EOF
      changed_when: false

    - name: Create Claudebox ClusterRoleBinding
      ansible.builtin.shell: |
        kubectl apply -f - <<'EOF'
        apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRoleBinding
        metadata:
          name: claudebox-reader
        roleRef:
          apiGroup: rbac.authorization.k8s.io
          kind: ClusterRole
          name: claudebox-reader
        subjects:
          - kind: ServiceAccount
            name: claudebox
            namespace: {{ app_namespace }}
        EOF
      changed_when: false

    # ========== 4. RENDER J2 TEMPLATES ==========
    - name: Create render directory
      ansible.builtin.file:
        path: "{{ render_dir }}"
        state: directory
        mode: '0755'

    - name: Render PVC template
      ansible.builtin.template:
        src: "{{ templates_dir }}/pvc.yaml.j2"
        dest: "{{ render_dir }}/pvc.yaml"
        mode: '0644'

    - name: Render Service template
      ansible.builtin.template:
        src: "{{ templates_dir }}/service.yaml.j2"
        dest: "{{ render_dir }}/service.yaml"
        mode: '0644'

    - name: Render Deployment template
      ansible.builtin.template:
        src: "{{ templates_dir }}/deployment.yaml.j2"
        dest: "{{ render_dir }}/deployment.yaml"
        mode: '0644'

    # ========== 5. CLEAN UP OLD RESOURCES ==========
    - name: Remove old claudebox-nodeport service if exists
      ansible.builtin.command: >-
        kubectl delete svc claudebox-nodeport -n {{ app_namespace }}
      register: old_svc_delete
      changed_when: "'deleted' in old_svc_delete.stdout"
      failed_when: false

    # ========== 6. APPLY RENDERED MANIFESTS ==========
    # PVCs must always use 'apply' — replace --force triggers delete which
    # blocks on pvc-protection finalizer while pods are mounted
    - name: Apply PVC (never replace --force)
      ansible.builtin.command: kubectl apply -f {{ render_dir }}/pvc.yaml
      register: pvc_apply
      changed_when: "'created' in pvc_apply.stdout or 'configured' in pvc_apply.stdout"

    - name: Wait for PVC to be bound
      ansible.builtin.command: >-
        kubectl get pvc {{ pvc_name | default('claudebox-workspace') }}
        -n {{ app_namespace }} -o jsonpath='{.status.phase}'
      register: pvc_status
      changed_when: false
      retries: 30
      delay: 10
      until: pvc_status.stdout == 'Bound'

    - name: Apply Service
      ansible.builtin.command: kubectl {{ kubectl_action }} -f {{ render_dir }}/service.yaml
      register: svc_apply
      changed_when: "'created' in svc_apply.stdout or 'configured' in svc_apply.stdout"

    - name: Apply Deployment
      ansible.builtin.command: kubectl {{ kubectl_action }} -f {{ render_dir }}/deployment.yaml
      register: deploy_apply
      changed_when: "'created' in deploy_apply.stdout or 'configured' in deploy_apply.stdout"

    # ========== 7. WAIT FOR ROLLOUT ==========
    - name: Wait for Claudebox deployment to be ready
      ansible.builtin.command: >-
        kubectl rollout status deployment/claudebox
        -n {{ app_namespace }} --timeout=300s
      register: rollout_status
      changed_when: false
      retries: 3
      delay: 10
      until: rollout_status.rc == 0

    # ========== 8. DISPLAY STATUS ==========
    - name: Display deployment status
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "Claudebox Deployment Complete"
          - "=========================================="
          - "Namespace: {{ app_namespace }}"
          - "Image: {{ claudebox_image }}"
          - "Service: NodePort (30800)"
          - "PVC: claudebox-workspace ({{ storage_size }})"
          - "=========================================="

    # ========== 9. WRITE TO BWS._state ==========
    - name: Write Claudebox state to BWS
      ansible.builtin.debug:
        msg: "TODO: Call generic BWS writeback playbook with Claudebox state"
      # This will be implemented when generic writeback playbook exists
      # vars:
      #   app_name: "claudebox"
      #   app_state:
      #     status: "ready"
      #     url: "http://claudebox.ai-tools.svc:8080"
      #     nodeport: 30800
      #     mcp_servers: ["vault-mcp", "awx-mcp", "k8s-rag-mcp"]

    # ========== 10. CLEANUP ==========
    - name: Clean up render directory
      ansible.builtin.file:
        path: "{{ render_dir }}"
        state: absent
