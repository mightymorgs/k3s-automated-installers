      Accessible via NodePort 30900.
    source: inferred
    confidence: medium
    uses_files:
    - '{{ templates_dir }}/secrets.yaml.j2'
    - '{{ templates_dir }}/postgres.yaml.j2'
    - '{{ templates_dir }}/redis.yaml.j2'
    - '{{ templates_dir }}/server.yaml.j2'
    - '{{ templates_dir }}/worker.yaml.j2'
    - '{{ templates_dir }}/blueprints-configmap.yaml.j2'
    - '{{ templates_dir }}/forwardauth-middleware.yaml.j2'
    - '{{ templates_dir }}/ingressroute.yaml.j2'
  02-verify.yml:
    summary: Verify Authentik deployment is healthy
    source: inferred
    confidence: medium
