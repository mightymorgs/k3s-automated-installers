---
# Authentik IngressRoute (no ForwardAuth on this route)
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: authentik
  namespace: media-stack
  labels:
    app: authentik
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`auth.example.local`)
      kind: Rule
      services:
        - name: authentik
          port: 9000
