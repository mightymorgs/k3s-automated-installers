---
# Authentik Worker Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: authentik-worker
  namespace: media-stack
  labels:
    app: authentik
    app.kubernetes.io/name: authentik
    app.kubernetes.io/component: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: authentik
      component: worker
  template:
    metadata:
      labels:
        app: authentik
        component: worker
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
          command:
            - sh
            - -c
            - |
              until nc -z authentik-postgres 5432; do
                echo "Waiting for Postgres..."
                sleep 2
              done
              echo "Postgres is ready"
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
        - name: wait-for-redis
          image: busybox:1.36
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
          command:
            - sh
            - -c
            - |
              until nc -z authentik-redis 6379; do
                echo "Waiting for Redis..."
                sleep 2
              done
              echo "Redis is ready"
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
      containers:
        - name: authentik
          image: ghcr.io/goauthentik/server:2025.2.1
          imagePullPolicy: Always
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
          args: ["worker"]
          env:
            - name: AUTHENTIK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: authentik-secret
                  key: secret-key
            - name: AUTHENTIK_POSTGRESQL__HOST
              value: postgres
            - name: AUTHENTIK_POSTGRESQL__NAME
              value: authentik
            - name: AUTHENTIK_POSTGRESQL__USER
              value: authentik
            - name: AUTHENTIK_POSTGRESQL__PASSWORD
              value: "authentik-staging-password"
            - name: AUTHENTIK_REDIS__HOST
              value: redis
            - name: AUTHENTIK_ERROR_REPORTING__ENABLED
              value: "false"
            - name: AUTHENTIK_LOG_LEVEL
              value: "info"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
