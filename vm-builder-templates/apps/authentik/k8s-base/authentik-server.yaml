---
# Authentik Server StatefulSet
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: authentik-server
  namespace: media-stack
  labels:
    app: authentik
    app.kubernetes.io/name: authentik
    app.kubernetes.io/component: server
spec:
  serviceName: authentik
  replicas: 1
  selector:
    matchLabels:
      app: authentik
      component: server
  template:
    metadata:
      labels:
        app: authentik
        component: server
    spec:
      securityContext:
        fsGroup: 1000
        runAsUser: 1000
        runAsGroup: 1000
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
          command:
            - sh
            - -c
            - |
              until nc -z authentik-postgres 5432; do
                echo "Waiting for Postgres..."
                sleep 2
              done
              echo "Postgres is ready"
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
        - name: wait-for-redis
          image: busybox:1.36
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
          command:
            - sh
            - -c
            - |
              until nc -z authentik-redis 6379; do
                echo "Waiting for Redis..."
                sleep 2
              done
              echo "Redis is ready"
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
      containers:
        - name: authentik
          image: ghcr.io/goauthentik/server:2025.2.1
          imagePullPolicy: Always
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
          args: ["server"]
          env:
            - name: AUTHENTIK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: authentik-secret
                  key: secret-key
            - name: AUTHENTIK_POSTGRESQL__HOST
              value: postgres
            - name: AUTHENTIK_POSTGRESQL__NAME
              value: authentik
            - name: AUTHENTIK_POSTGRESQL__USER
              value: authentik
            - name: AUTHENTIK_POSTGRESQL__PASSWORD
              value: "authentik-staging-password"
            - name: AUTHENTIK_REDIS__HOST
              value: redis
            - name: AUTHENTIK_BOOTSTRAP_PASSWORD
              value: "admin-staging-password"  # Initial admin password
            - name: AUTHENTIK_BOOTSTRAP_EMAIL
              value: "admin@example.local"
            - name: AUTHENTIK_ERROR_REPORTING__ENABLED
              value: "false"
            - name: AUTHENTIK_LOG_LEVEL
              value: "info"
            # Public access configuration (required for Cloudflare Tunnel)
            - name: AUTHENTIK_HOST
              value: "https://auth.example.local"
            - name: AUTHENTIK_HOST_BROWSER
              value: "https://auth.example.local"
            # Blueprint context variables
            - name: DOMAIN
              value: "example.local"
          ports:
            - name: http
              containerPort: 9000
              protocol: TCP
            - name: https
              containerPort: 9443
              protocol: TCP
            - name: metrics
              containerPort: 9300
              protocol: TCP
          volumeMounts:
            - name: media
              mountPath: /media
            - name: custom-templates
              mountPath: /templates
            - name: blueprints
              mountPath: /blueprints/custom
              readOnly: true
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /-/health/live/
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /-/health/ready/
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: custom-templates
          emptyDir: {}
        - name: blueprints
          configMap:
            name: authentik-blueprints
  volumeClaimTemplates:
    - metadata:
        name: media
        labels:
          app: authentik
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: longhorn
        resources:
          requests:
            storage: 5Gi

---
# Authentik Service
# NOTE: Using LoadBalancer temporarily until IngressRoute CRD issues resolved
apiVersion: v1
kind: Service
metadata:
  name: authentik
  namespace: media-stack
  labels:
    app: authentik
spec:
  type: LoadBalancer
  selector:
    app: authentik
    component: server
  ports:
    - name: http
      port: 9000
      targetPort: 9000
      protocol: TCP
    - name: https
      port: 9443
      targetPort: 9443
      protocol: TCP
