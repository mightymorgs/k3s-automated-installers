---
# Authentik Blueprints ConfigMap
# Pre-configures ForwardAuth for media stack applications
# Blueprints auto-apply on Authentik startup (no manual configuration needed)
apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-blueprints
  namespace: media-stack
  labels:
    app.kubernetes.io/part-of: media-automation
data:
  # Media Stack ForwardAuth Blueprint
  media-stack-forwardauth.yaml: |
    # yaml-language-server: $schema=https://goauthentik.io/blueprints/schema.json
    version: 1

    metadata:
      name: "Media Stack - ForwardAuth Configuration"
      labels:
        blueprints.goauthentik.io/instantiate: "true"
        blueprints.goauthentik.io/description: "Pre-configured ForwardAuth for Sonarr, SABnzbd, Prowlarr"

    context:
      # Default values (can be overridden via env vars)
      domain: "example.local"

    entries:
      #########################################################################
      # ForwardAuth Proxy Providers (one per application)
      #########################################################################

      # Sonarr ForwardAuth Provider
      - model: authentik_providers_proxy.proxyprovider
        id: sonarr-provider
        identifiers:
          name: "sonarr-forwardauth"
        attrs:
          name: "Sonarr ForwardAuth"
          mode: "forward_single"
          external_host: !Format ["http://sonarr.%s", !Context domain]
          internal_host: "http://sonarr.media-stack.svc.cluster.local:8989"
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-invalidation-flow]]
          skip_path_regex: "^/(api|ping|outpost\\.goauthentik\\.io)/.*$"
          access_token_validity: "hours=168"  # 1 week

      # SABnzbd ForwardAuth Provider
      - model: authentik_providers_proxy.proxyprovider
        id: sabnzbd-provider
        identifiers:
          name: "sabnzbd-forwardauth"
        attrs:
          name: "SABnzbd ForwardAuth"
          mode: "forward_single"
          external_host: !Format ["http://nzb.%s", !Context domain]
          internal_host: "http://sabnzbd.media-stack.svc.cluster.local:8080"
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-invalidation-flow]]
          skip_path_regex: "^/(api|outpost\\.goauthentik\\.io)/.*$"
          access_token_validity: "hours=168"

      # Prowlarr ForwardAuth Provider
      - model: authentik_providers_proxy.proxyprovider
        id: prowlarr-provider
        identifiers:
          name: "prowlarr-forwardauth"
        attrs:
          name: "Prowlarr ForwardAuth"
          mode: "forward_single"
          external_host: !Format ["http://prowl.%s", !Context domain]
          internal_host: "http://prowlarr.media-stack.svc.cluster.local:9696"
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-invalidation-flow]]
          skip_path_regex: "^/(api|ping|outpost\\.goauthentik\\.io)/.*$"
          access_token_validity: "hours=168"

      #########################################################################
      # Applications (visible in Authentik UI)
      #########################################################################

      # Sonarr Application
      - model: authentik_core.application
        identifiers:
          slug: "sonarr"
        attrs:
          name: "Sonarr"
          slug: "sonarr"
          group: "Media Management"
          provider: !KeyOf sonarr-provider
          policy_engine_mode: "any"
          meta_icon: "https://raw.githubusercontent.com/walkxcode/dashboard-icons/main/png/sonarr.png"
          meta_description: "TV Series PVR for Usenet and BitTorrent"
          meta_launch_url: !Format ["http://sonarr.%s", !Context domain]

      # SABnzbd Application
      - model: authentik_core.application
        identifiers:
          slug: "sabnzbd"
        attrs:
          name: "SABnzbd"
          slug: "sabnzbd"
          group: "Download Clients"
          provider: !KeyOf sabnzbd-provider
          policy_engine_mode: "any"
          meta_icon: "https://raw.githubusercontent.com/walkxcode/dashboard-icons/main/png/sabnzbd.png"
          meta_description: "Usenet download client"
          meta_launch_url: !Format ["http://nzb.%s", !Context domain]

      # Prowlarr Application
      - model: authentik_core.application
        identifiers:
          slug: "prowlarr"
        attrs:
          name: "Prowlarr"
          slug: "prowlarr"
          group: "Media Management"
          provider: !KeyOf prowlarr-provider
          policy_engine_mode: "any"
          meta_icon: "https://raw.githubusercontent.com/walkxcode/dashboard-icons/main/png/prowlarr.png"
          meta_description: "Indexer manager for *arr stack"
          meta_launch_url: !Format ["http://prowl.%s", !Context domain]

      #########################################################################
      # Assign Providers to Embedded Outpost
      #########################################################################

      # Embedded Outpost Assignment
      # Note: Embedded outpost runs inside authentik-server pod
      - model: authentik_outposts.outpost
        identifiers:
          name: "authentik Embedded Outpost"
        attrs:
          type: "proxy"
          providers:
            - !KeyOf sonarr-provider
            - !KeyOf sabnzbd-provider
            - !KeyOf prowlarr-provider

      #########################################################################
      # User Groups (Optional - for access control)
      #########################################################################

      # Media Admins Group
      - model: authentik_core.group
        id: media-admins
        identifiers:
          name: "media-admins"
        attrs:
          name: "Media Administrators"
          is_superuser: false
          attributes:
            description: "Full administrative access to media stack"

      # Media Users Group
      - model: authentik_core.group
        id: media-users
        identifiers:
          name: "media-users"
        attrs:
          name: "Media Users"
          is_superuser: false
          attributes:
            description: "Standard media stack access"
