#   path_info:
#     file_path: "atomic/apps/authentik/config/01-create-oauth-apps.yml"
#     category: "platform"
#     subsystem: "authentik"
#
#   # ========== TRADITIONAL METADATA ==========
#   batch_id: "20260123_v32_bws_state_migration"
#   dependencies: ["authentik_deployed"]
#   provides: ["oauth_apps_created"]
#   tags: ["authentik", "oauth", "sso", "phase5", "golden-master"]
