schema_version: '1.0'
repo_id: vm-builder-templates
files:
  04-configure-api.yml:
    summary: "Verify Longhorn UI accessibility for Tailscale Ingress mode. Longhorn\
      \ UI has no built-in authentication \u2014 auth is handled at the ingress/network\
      \ level (Tailscale). This playbook ensures the UI pod is running, the manager\
      \ backend is reachable, and the dashboard is accessible via the Tailscale network."
    source: inferred
    confidence: medium
    calls_api:
    - '{{ longhorn_url }}'
  05-enable-metrics.yml:
    summary: Add Prometheus scrape annotations to the Longhorn manager deployment.
      Longhorn manager natively exposes metrics on port 9500 at /metrics. This playbook
      adds pod-level annotations so Prometheus auto-discovers and scrapes the metrics
      endpoint via its kubernetes-pods scrape config.
    source: inferred
    confidence: medium
    requires_apps:
    - prometheus
depends_on_apps:
- prometheus
