---
# playbook_metadata:
#   id: "atomic/apps/elastic/05-deploy-exporter"
#   type: "atomic"
#
#   # ========== FILE LOCATION ==========
#   path_info:
#     file_path: "atomic/apps/elastic/config/05-deploy-exporter.yml"
#     category: "apps"
#     subsystem: "elastic"
#
#   # ========== TRADITIONAL METADATA ==========
#   dependencies: ["elastic_deployed", "prometheus_deployed"]
#   provides: ["elastic_exporter_deployed"]
#   tags: ["elastic", "elasticsearch", "prometheus", "exporter", "monitoring", "phase4"]
#   estimated_duration: 120
#   parallel_safe: false
#   idempotent: true
#   description: >-
#     Deploy Prometheus elasticsearch-exporter sidecar container to the
#     Elasticsearch StatefulSet. Connects to localhost:9200 (no auth required
#     when xpack security is disabled via 04-configure-api). Exposes metrics
#     on port 9114 and adds prometheus.io annotations for automatic discovery.
#   requires_apps: ["elastic", "prometheus"]

- name: Deploy Elasticsearch exporter sidecar
  hosts: "{{ target_hosts | default('localhost') }}"
  gather_facts: false
  become: false

  vars:
    elastic_namespace: "elastic"
    app_namespace: "{{ elastic_namespace }}"
    statefulset_name: elasticsearch
    exporter_image: "quay.io/prometheuscommunity/elasticsearch-exporter:v1.7.0"
    exporter_port: 9114
    sidecar_container_name: elasticsearch-exporter
    es_uri: "http://localhost:9200"
    kubeconfig: "{{ kubeconfig_path | default('/etc/rancher/k3s/k3s.yaml') }}"

  tasks:
    # ========== VALIDATE PREREQUISITES ==========
    - name: Check if Elasticsearch StatefulSet exists
      ansible.builtin.command:
        cmd: >-
          kubectl get statefulset {{ statefulset_name }}
          -n {{ app_namespace }} --no-headers
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: sts_check
      changed_when: false
      failed_when: false

    - name: Skip if StatefulSet not deployed
      ansible.builtin.debug:
        msg: "Elasticsearch StatefulSet not deployed - skipping exporter sidecar"
      when: sts_check.rc != 0 or sts_check.stdout | length == 0

    - name: End play if StatefulSet not available
      ansible.builtin.meta: end_play
      when: sts_check.rc != 0 or sts_check.stdout | length == 0

    # ========== CHECK IF SIDECAR ALREADY EXISTS ==========
    - name: Get current container names in StatefulSet
      ansible.builtin.command:
        cmd: >-
          kubectl get statefulset {{ statefulset_name }}
          -n {{ app_namespace }}
          -o jsonpath='{.spec.template.spec.containers[*].name}'
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: container_names
      changed_when: false

    - name: Set sidecar existence fact
      ansible.builtin.set_fact:
        sidecar_exists: "{{ sidecar_container_name in container_names.stdout.split() }}"

    # ========== PATCH STATEFULSET WITH EXPORTER SIDECAR ==========
    # The elasticsearch-exporter connects to Elasticsearch on localhost:9200.
    # With xpack security disabled (04-configure-api.yml), no basic auth is
    # needed. If security is re-enabled, add ES_USERNAME and ES_PASSWORD env
    # vars or use --es.uri=http://user:pass@localhost:9200.
    - name: Add elasticsearch-exporter sidecar container to StatefulSet
      ansible.builtin.command:
        cmd: >-
          kubectl patch statefulset {{ statefulset_name }}
          -n {{ app_namespace }} --type json
          -p '[{"op": "add", "path": "/spec/template/spec/containers/-", "value": {
            "name": "{{ sidecar_container_name }}",
            "image": "{{ exporter_image }}",
            "args": ["--es.uri={{ es_uri }}", "--es.all", "--es.indices", "--es.shards"],
            "ports": [{"containerPort": {{ exporter_port }}, "name": "metrics", "protocol": "TCP"}],
            "resources": {"requests": {"cpu": "10m", "memory": "32Mi"}, "limits": {"memory": "128Mi"}},
            "livenessProbe": {
              "httpGet": {"path": "/healthz", "port": {{ exporter_port }}},
              "initialDelaySeconds": 30,
              "periodSeconds": 10
            },
            "readinessProbe": {
              "httpGet": {"path": "/healthz", "port": {{ exporter_port }}},
              "initialDelaySeconds": 10,
              "periodSeconds": 10
            }
          }}]'
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: patch_result
      changed_when: "'patched' in patch_result.stdout"
      when: not sidecar_exists

    # ========== ADD PROMETHEUS ANNOTATIONS ==========
    - name: Add Prometheus scrape annotations
      ansible.builtin.command:
        cmd: >-
          kubectl patch statefulset {{ statefulset_name }}
          -n {{ app_namespace }} --type merge
          -p '{"spec": {"template": {"metadata": {"annotations": {
            "prometheus.io/scrape": "true",
            "prometheus.io/port": "{{ exporter_port }}",
            "prometheus.io/path": "/metrics"
          }}}}}'
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: annotation_result
      changed_when: "'patched' in annotation_result.stdout"

    # ========== WAIT FOR ROLLOUT ==========
    - name: Wait for StatefulSet rollout to complete
      ansible.builtin.command:
        cmd: >-
          kubectl rollout status statefulset/{{ statefulset_name }}
          -n {{ app_namespace }} --timeout=300s
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      changed_when: false
      when: not sidecar_exists

    # ========== VERIFY SIDECAR IS RUNNING ==========
    - name: Verify exporter container is present after rollout
      ansible.builtin.command:
        cmd: >-
          kubectl get statefulset {{ statefulset_name }}
          -n {{ app_namespace }}
          -o jsonpath='{.spec.template.spec.containers[*].name}'
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: verify_containers
      changed_when: false

    - name: Set verification fact
      ansible.builtin.set_fact:
        sidecar_verified: "{{ sidecar_container_name in verify_containers.stdout.split() }}"

    # ========== DISPLAY RESULT ==========
    - name: Display exporter deployment result
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "Elasticsearch Exporter Sidecar Deployment"
          - "=========================================="
          - "StatefulSet: {{ app_namespace }}/{{ statefulset_name }}"
          - "Exporter: {{ exporter_image }}"
          - "ES URI: {{ es_uri }}"
          - "Metrics Port: {{ exporter_port }}"
          - "Flags: --es.all --es.indices --es.shards"
          - "Sidecar: {{ 'deployed' if not sidecar_exists else 'already exists' }}"
          - "Verified: {{ sidecar_verified }}"
          - "Prometheus Annotations: scrape=true, port={{ exporter_port }}"
          - "=========================================="
