- name: Configure Elastic Credentials
  hosts: "{{ target_hosts | default('k3s_servers') }}"
  gather_facts: false
  become: true

  vars:
    elastic_namespace: "elastic"
    kubeconfig_path: /etc/rancher/k3s/k3s.yaml
    kubeconfig: "{{ kubeconfig_path | default('/etc/rancher/k3s/k3s.yaml') }}"

  tasks:
    # ========================================
    # CHECK IF ELASTICSEARCH IS DEPLOYED
    # ========================================
    - name: Check if Elasticsearch is deployed
      ansible.builtin.command:
        cmd: kubectl get pod -n {{ elastic_namespace }} -l "app.kubernetes.io/name=elasticsearch"
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      register: elasticsearch_check
      changed_when: false
      failed_when: false

    - name: Set Elasticsearch availability fact
      ansible.builtin.set_fact:
        elasticsearch_available: "{{ elasticsearch_check.rc == 0 and elasticsearch_check.stdout | length > 0 }}"

    - name: Skip if Elasticsearch not deployed
      ansible.builtin.debug:
        msg: "Elasticsearch not deployed - skipping configuration"
      when: not elasticsearch_available

    - name: End play if Elasticsearch not available
      ansible.builtin.meta: end_play
      when: not elasticsearch_available

    - name: Fail if elastic admin password not available from BWS
      ansible.builtin.fail:
        msg: "elastic_admin_password not in Phase 4 extra-vars. Check Phase 3 credential extraction."
      when: elastic_admin_password is not defined or elastic_admin_password | length == 0

    - name: Set elastic password from BWS
      ansible.builtin.set_fact:
        elastic_password: "{{ elastic_admin_password }}"
      no_log: true

    - name: Display access information
      ansible.builtin.debug:
        msg:
          - "========== Elasticsearch Access Information =========="
          - "Username: elastic"
          - "Password: [Retrieved - stored in elastic_password fact]"
          - ""
          - "Access Elasticsearch:"
          - "  kubectl port-forward -n {{ elastic_namespace }} svc/elasticsearch 9200:9200"
          - "  curl -u elastic:<password> https://localhost:9200"
          - ""
          - "Access Kibana:"
          - "  kubectl port-forward -n {{ elastic_namespace }} svc/kibana 5601:5601"
          - "  http://localhost:5601"
