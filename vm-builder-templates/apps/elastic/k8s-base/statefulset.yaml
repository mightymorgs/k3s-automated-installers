---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: elastic
  namespace: elastic
  labels:
    app.kubernetes.io/name: elastic
    app.kubernetes.io/component: server
spec:
  serviceName: elastic
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: elastic
  template:
    metadata:
      labels:
        app.kubernetes.io/name: elastic
        app.kubernetes.io/component: server
    spec:
      containers:
        - name: elastic
          image: docker.elastic.co/elasticsearch/elasticsearch:8.16.1
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
          ports:
            - containerPort: 9200
              name: http
          envFrom:
            - configMapRef:
                name: elastic-config
            - secretRef:
                name: elastic-secrets
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: longhorn
        resources:
          requests:
            storage: 10Gi
