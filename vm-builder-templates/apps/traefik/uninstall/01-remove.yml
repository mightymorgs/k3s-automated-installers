---
- name: Uninstall Traefik
  hosts: "{{ target_hosts | default('localhost') }}"
  gather_facts: false
  become: false

  vars:
    app_name: traefik
    app_namespace: "traefik"
    delete_pvc: false

  tasks:
    - name: Check namespace exists
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Namespace
        name: "{{ app_namespace }}"
      register: ns_check

    - name: Skip if namespace does not exist
      ansible.builtin.meta: end_play
      when: ns_check.resources | length == 0

    # Delete Traefik CRDs first
    - name: Delete IngressRoute dashboard
      kubernetes.core.k8s:
        api_version: traefik.io/v1alpha1
        kind: IngressRoute
        name: traefik-dashboard
        namespace: "{{ app_namespace }}"
        state: absent
      failed_when: false

    - name: Delete Middleware redirect-https
      kubernetes.core.k8s:
        api_version: traefik.io/v1alpha1
        kind: Middleware
        name: redirect-https
        namespace: "{{ app_namespace }}"
        state: absent
      failed_when: false

    - name: Delete ServersTransport insecure-skip-verify
      kubernetes.core.k8s:
        api_version: traefik.io/v1alpha1
        kind: ServersTransport
        name: insecure-skip-verify
        namespace: "{{ app_namespace }}"
        state: absent
      failed_when: false

    - name: Delete TLSOption modern
      kubernetes.core.k8s:
        api_version: traefik.io/v1alpha1
        kind: TLSOption
        name: modern
        namespace: "{{ app_namespace }}"
        state: absent
      failed_when: false

    - name: Delete Deployment traefik
      kubernetes.core.k8s:
        api_version: apps/v1
        kind: Deployment
        name: traefik
        namespace: "{{ app_namespace }}"
        state: absent
        wait: true
        wait_timeout: 120

    - name: Delete Service traefik
      kubernetes.core.k8s:
        api_version: v1
        kind: Service
        name: traefik
        namespace: "{{ app_namespace }}"
        state: absent
        wait: true
        wait_timeout: 120

    - name: Delete ServiceAccount traefik
      kubernetes.core.k8s:
        api_version: v1
        kind: ServiceAccount
        name: traefik
        namespace: "{{ app_namespace }}"
        state: absent

    - name: Delete ClusterRole traefik
      kubernetes.core.k8s:
        api_version: rbac.authorization.k8s.io/v1
        kind: ClusterRole
        name: traefik
        state: absent

    - name: Delete ClusterRoleBinding traefik
      kubernetes.core.k8s:
        api_version: rbac.authorization.k8s.io/v1
        kind: ClusterRoleBinding
        name: traefik
        state: absent

    - name: Verify removal
      kubernetes.core.k8s_info:
        api_version: apps/v1
        kind: Deployment
        name: traefik
        namespace: "{{ app_namespace }}"
      register: verify
      failed_when: verify.resources | length > 0
