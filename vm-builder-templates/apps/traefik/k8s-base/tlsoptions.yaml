---
# TLS Options for Traefik
# Defines secure TLS configurations

# Modern TLS Configuration (TLS 1.3 only)
apiVersion: traefik.io/v1alpha1
kind: TLSOption
metadata:
  name: modern
  namespace: kube-system
spec:
  minVersion: VersionTLS13
  sniStrict: true

---
# Intermediate TLS Configuration (TLS 1.2+)
# Compatible with older clients while maintaining security
apiVersion: traefik.io/v1alpha1
kind: TLSOption
metadata:
  name: intermediate
  namespace: kube-system
spec:
  minVersion: VersionTLS12
  cipherSuites:
    - TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256
    - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
    - TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384
    - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
    - TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305
    - TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305
  sniStrict: true

---
# Default TLS Options (applied when not specified)
apiVersion: traefik.io/v1alpha1
kind: TLSOption
metadata:
  name: default
  namespace: kube-system
spec:
  minVersion: VersionTLS12
  sniStrict: false
