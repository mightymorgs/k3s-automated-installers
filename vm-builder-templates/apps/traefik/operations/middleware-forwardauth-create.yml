- name: Traefik - Create ForwardAuth Middleware
  hosts: "{{ target_hosts | default('localhost') }}"
  gather_facts: false
  become: false

  vars:
    # Authentication URL (required if not using BWS)
    auth_url: "{{ auth_url | default(omit) }}"

    # Optional parameters with defaults
    middleware_name: "authentik-forwardauth"
    namespace: "authentik"
    trust_forward_header: "{{ trust_forward_header | default(true) }}"

    # Authentik standard response headers
    auth_response_headers: "{{ auth_response_headers | default([
      'X-authentik-username',
      'X-authentik-groups',
      'X-authentik-email',
      'X-authentik-name',
      'X-authentik-uid',
      'X-authentik-jwt',
      'X-authentik-meta-jwks',
      'X-authentik-meta-outpost',
      'X-authentik-meta-provider',
      'X-authentik-meta-app',
      'X-authentik-meta-version'
    ]) }}"

    # Optional request headers to forward
    auth_request_headers: "{{ auth_request_headers | default([]) }}"

    # BWS integration
    bws_access_token: "{{ lookup('env', 'BWS_ACCESS_TOKEN') | default('', true) }}"
    inventory_secret_name: "{{ bws_inventory_secret | default('', true) }}"

    # Kubeconfig
    k3s_kubeconfig: "/etc/rancher/k3s/k3s.yaml"

  tasks:
    # ========== 1. DETERMINE AUTH URL ==========
    - name: Check if auth_url is provided directly
      when: auth_url is defined and auth_url != omit and auth_url | length > 0
      ansible.builtin.set_fact:
        final_auth_url: "{{ auth_url }}"

    - name: Get auth URL from BWS if not provided
      when: >-
        (auth_url is not defined or auth_url == omit or auth_url | length == 0) and
        bws_access_token | length > 0 and
        inventory_secret_name | length > 0
      block:
        - name: Fetch inventory from BWS
          ansible.builtin.shell: |
            bws secret get {{ inventory_secret_name }} --output json
          environment:
            BWS_ACCESS_TOKEN: "{{ bws_access_token }}"
          register: inventory_raw
          changed_when: false
          no_log: true

        - name: Parse inventory
          ansible.builtin.set_fact:
            inventory: "{{ (inventory_raw.stdout | from_json).value | from_json }}"
          no_log: true

        - name: Extract ingress configuration
          ansible.builtin.set_fact:
            ingress_mode: "{{ inventory.ingress.mode }}"
            ingress_domain: "{{ inventory.ingress.domain | default('') }}"
            tailnet: "{{ inventory._state.tailscale.tailnet | default('') }}"

        - name: Construct auth URL for Cloudflare mode
          when: ingress_mode == 'cloudflare'
          ansible.builtin.set_fact:
            final_auth_url: "https://{{ ingress_domain }}/outpost.goauthentik.io/auth/traefik"

        - name: Construct auth URL for Tailscale mode
          when: ingress_mode == 'tailscale'
          ansible.builtin.set_fact:
            final_auth_url: "https://authentik.{{ vm_hostname }}.{{ tailnet }}/outpost.goauthentik.io/auth/traefik"

    # ========== 2. VALIDATE AUTH URL ==========
    - name: Validate auth_url is set
      ansible.builtin.assert:
        that:
          - final_auth_url is defined
          - final_auth_url | length > 0
        fail_msg: >-
          auth_url is required. Provide it directly or ensure BWS_ACCESS_TOKEN
          and BWS_INVENTORY_SECRET environment variables are set.

    - name: Display ForwardAuth configuration
      ansible.builtin.debug:
        msg:
          - "Middleware Name: {{ middleware_name }}"
          - "Namespace: {{ namespace }}"
          - "Auth URL: {{ final_auth_url }}"
          - "Trust Forward Headers: {{ trust_forward_header }}"

    # ========== 3. ENSURE NAMESPACE EXISTS ==========
    - name: Check if namespace exists
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k3s_kubeconfig }}"
        kind: Namespace
        name: "{{ namespace }}"
      register: namespace_check

    - name: Create namespace if it doesn't exist
      kubernetes.core.k8s:
        kubeconfig: "{{ k3s_kubeconfig }}"
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: "{{ namespace }}"
      when: namespace_check.resources | length == 0

    # ========== 4. CREATE FORWARDAUTH MIDDLEWARE CRD ==========
    - name: Create ForwardAuth middleware
      kubernetes.core.k8s:
        kubeconfig: "{{ k3s_kubeconfig }}"
        state: present
        definition:
          apiVersion: traefik.io/v1alpha1
          kind: Middleware
          metadata:
            name: "{{ middleware_name }}"
            namespace: "{{ namespace }}"
            labels:
              app.kubernetes.io/name: "{{ middleware_name }}"
              app.kubernetes.io/component: forwardauth-middleware
              app.kubernetes.io/managed-by: ansible
              generated-by: idi
          spec:
            forwardAuth:
              address: "{{ final_auth_url }}"
              trustForwardHeader: "{{ trust_forward_header }}"
              authResponseHeaders: "{{ auth_response_headers }}"
              authRequestHeaders: "{{ auth_request_headers if auth_request_headers | length > 0 else omit }}"
      register: middleware_result

    # ========== 5. UPDATE BWS STATE (if enabled) ==========
    - name: Update BWS state with middleware info
      when: >-
        bws_access_token | length > 0 and
        inventory_secret_name | length > 0 and
        inventory is defined
      block:
        - name: Build updated state
          ansible.builtin.set_fact:
            updated_state: >-
              {{
                inventory | combine({
                  '_state': inventory._state | default({}) | combine({
                    'sso': inventory._state.sso | default({}) | combine({
                      'forwardauth_middleware': middleware_name,
                      'forwardauth_namespace': namespace,
                      'forwardauth_auth_url': final_auth_url
                    }, recursive=True)
                  }, recursive=True)
                }, recursive=True)
              }}
          no_log: true

        - name: Write updated state to BWS
          ansible.builtin.shell: |
            echo '{{ updated_state | to_json }}' | \
              bws secret edit {{ inventory_secret_name }} --value -
          environment:
            BWS_ACCESS_TOKEN: "{{ bws_access_token }}"
          no_log: true
          changed_when: true

    # ========== 6. VERIFICATION ==========
    - name: Verify ForwardAuth middleware was created
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k3s_kubeconfig }}"
        kind: Middleware
        api_version: traefik.io/v1alpha1
        name: "{{ middleware_name }}"
        namespace: "{{ namespace }}"
      register: verification
      failed_when: verification.resources | length == 0

    - name: Display success message
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "ForwardAuth Middleware Created Successfully"
          - "=========================================="
          - "Name: {{ middleware_name }}"
          - "Namespace: {{ namespace }}"
          - "Auth URL: {{ final_auth_url }}"
          - "Trust Forward Headers: {{ trust_forward_header }}"
          - ""
          - "Response Headers Forwarded:"
          - "{{ auth_response_headers | to_nice_yaml }}"
          - ""
          - "Usage in IngressRoute:"
          - "  spec:"
          - "    routes:"
          - "      - middlewares:"
          - "          - name: {{ middleware_name }}"
          - "            namespace: {{ namespace }}"
          - "=========================================="
