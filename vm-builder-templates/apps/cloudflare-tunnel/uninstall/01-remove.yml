---
- name: Uninstall Cloudflare Tunnel
  hosts: "{{ target_hosts | default('localhost') }}"
  gather_facts: false
  become: false

  vars:
    app_name: cloudflare-tunnel
    app_namespace: "cloudflare"
  tasks:
    - name: Check namespace exists
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Namespace
        name: "{{ app_namespace }}"
      register: ns_check

    - name: Skip if namespace does not exist
      ansible.builtin.meta: end_play
      when: ns_check.resources | length == 0

    - name: Delete cloudflared Deployment
      kubernetes.core.k8s:
        api_version: apps/v1
        kind: Deployment
        name: cloudflared
        namespace: "{{ app_namespace }}"
        state: absent
        wait: true
        wait_timeout: 120

    - name: Delete tunnel Secret
      kubernetes.core.k8s:
        api_version: v1
        kind: Secret
        name: cloudflared-credentials
        namespace: "{{ app_namespace }}"
        state: absent
      failed_when: false
