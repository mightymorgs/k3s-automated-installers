- name: Verify External Secrets Operator
  hosts: "{{ target_hosts | default('localhost') }}"
  gather_facts: false
  become: false

  vars:
    app_name: "external-secrets"
    app_namespace: "external-secrets"
    health_probe_timeout_seconds: 5
    retry_interval_seconds: 10

  tasks:
    # ========== 1. CHECK DEPLOYMENT EXISTS ==========
    - name: Check ESO deployment exists
      ansible.builtin.command: kubectl -n {{ app_namespace }} get deployment external-secrets
      register: deploy_check
      changed_when: false

    # ========== 2. CHECK POD PHASE ==========
    - name: Check pod phase is Running
      ansible.builtin.command: >-
        kubectl -n {{ app_namespace }} get pods
        -l app.kubernetes.io/name=external-secrets
        -o jsonpath='{.items[0].status.phase}'
      register: pod_phase
      changed_when: false
      failed_when: pod_phase.rc != 0 or pod_phase.stdout != 'Running'
      retries: 6
      delay: "{{ retry_interval_seconds }}"
      until: pod_phase.rc == 0 and pod_phase.stdout == 'Running'

    # ========== 3. GET READY POD NAME ==========
    - name: Get ready pod name
      ansible.builtin.shell: >-
        kubectl -n {{ app_namespace }} get pods
        -l app.kubernetes.io/name=external-secrets
        -o jsonpath='{.items[?(@.status.containerStatuses[0].ready==true)].metadata.name}'
        | awk '{print $1}'
      register: app_pod
      changed_when: false
      retries: 3
      delay: "{{ retry_interval_seconds }}"
      until: app_pod.rc == 0 and app_pod.stdout != ''

    # ========== 4. CHECK WEBHOOK IS RUNNING ==========
    - name: Check ESO webhook is running
      ansible.builtin.command: >-
        kubectl -n {{ app_namespace }} get pods
        -l app.kubernetes.io/name=external-secrets-webhook
        -o jsonpath='{.items[0].status.phase}'
      register: webhook_phase
      changed_when: false
      failed_when: webhook_phase.stdout != 'Running'
      retries: 3
      delay: "{{ retry_interval_seconds }}"
      until: webhook_phase.stdout == 'Running'

    # ========== 5. CHECK CRDs ==========
    - name: Check CRDs are established
      ansible.builtin.command: kubectl get crd clustersecretstores.external-secrets.io
      register: crd_check
      changed_when: false

    # ========== 6. DISPLAY VERIFICATION SUMMARY ==========
    - name: Display verification summary
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "External Secrets Verification Summary"
          - "=========================================="
          - "Pod Phase:      {{ pod_phase.stdout | default('UNKNOWN') }} — {{ 'OK' if pod_phase.stdout == 'Running' else 'FAILED' }}"
          - "Ready Pod:      {{ app_pod.stdout | default('NONE') }} — {{ 'OK' if app_pod.stdout | default('') != '' else 'FAILED' }}"
          - "Webhook:        {{ webhook_phase.stdout | default('UNKNOWN') }} — {{ 'OK' if webhook_phase.stdout == 'Running' else 'FAILED' }}"
          - "CRDs:           Established"
          - "=========================================="
