- name: External Secrets - Create ExternalSecret
  hosts: "{{ target_hosts | default('localhost') }}"
  gather_facts: false
  connection: local

  vars:
    # Required parameters
    secret_name: "{{ secret_name }}"
    namespace: "{{ namespace }}"
    store_name: "{{ store_name }}"

    # Store reference configuration
    store_kind: "ClusterSecretStore"

    # Target Secret configuration
    target_secret_name: "{{ target_secret_name | default(omit) }}"
    target_creation_policy: "Owner"
    target_deletion_policy: "Retain"
    target_immutable: "{{ target_immutable | default(false) }}"

    # Sync configuration
    refresh_interval: "1h"

    # Secret data mappings
    # Example: [{"secretKey": "password", "remoteRef": {"key": "secret/app", "property": "password"}}]
    secret_data: "{{ secret_data | default([]) }}"

    # Bulk data fetch configuration
    # Example: {"extract": {"key": "secret/app"}}
    # Example: {"find": {"path": "secret/", "name": {"regexp": ".*-credentials"}}}
    data_from: "{{ data_from | default([]) }}"

    # Template configuration
    secret_template_type: "Opaque"
    secret_template_data: "{{ secret_template_data | default({}) }}"
    secret_template_labels: "{{ secret_template_labels | default({}) }}"
    secret_template_annotations: "{{ secret_template_annotations | default({}) }}"

    # App context for BWS state
    app_name: "{{ app_name | default(omit) }}"

    # Kubeconfig
    k3s_kubeconfig: "/etc/rancher/k3s/k3s.yaml"

  environment:
    KUBECONFIG: "{{ kubeconfig | default(k3s_kubeconfig) }}"

  tasks:
    # ===== INPUT VALIDATION =====
    - name: Validate required parameters
      ansible.builtin.assert:
        that:
          - secret_name is defined and secret_name | length > 0
          - namespace is defined and namespace | length > 0
          - store_name is defined and store_name | length > 0
        fail_msg: |
          Required parameters missing. Usage:
            ansible-playbook externalsecret-create.yml \
              -e secret_name=app-credentials \
              -e namespace=default \
              -e store_name=vault-backend

    - name: Validate store kind
      ansible.builtin.assert:
        that:
          - store_kind in ['SecretStore', 'ClusterSecretStore']
        fail_msg: "store_kind must be either 'SecretStore' or 'ClusterSecretStore'"

    - name: Validate at least one data source is provided
      ansible.builtin.assert:
        that:
          - (secret_data | length > 0) or (data_from | length > 0)
        fail_msg: |
          At least one of secret_data or data_from must be provided.

          Example with secret_data:
            -e secret_data='[{"secretKey": "password", "remoteRef": {"key": "secret/app", "property": "password"}}]'

          Example with data_from:
            -e data_from='[{"extract": {"key": "secret/app"}}]'

    - name: Validate creation policy
      ansible.builtin.assert:
        that:
          - target_creation_policy in ['Owner', 'Orphan', 'Merge', 'None']
        fail_msg: "target_creation_policy must be one of: Owner, Orphan, Merge, None"

    - name: Validate deletion policy
      ansible.builtin.assert:
        that:
          - target_deletion_policy in ['Retain', 'Delete', 'Merge']
        fail_msg: "target_deletion_policy must be one of: Retain, Delete, Merge"

    - name: Display playbook information
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "External Secrets - Create ExternalSecret"
          - "=========================================="
          - "ExternalSecret Name: {{ secret_name }}"
          - "Namespace: {{ namespace }}"
          - "Store: {{ store_name }} ({{ store_kind }})"
          - "Target Secret: {{ target_secret_name | default(secret_name) }}"
          - "Refresh Interval: {{ refresh_interval }}"
          - "Data Mappings: {{ secret_data | length }} keys"
          - "DataFrom Sources: {{ data_from | length }} sources"
          - "=========================================="

    # ===== ENSURE NAMESPACE EXISTS =====
    - name: Ensure namespace exists
      kubernetes.core.k8s:
        kubeconfig: "{{ k3s_kubeconfig }}"
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: "{{ namespace }}"

    # ===== VERIFY SECRETSTORE EXISTS =====
    - name: Check if SecretStore exists
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k3s_kubeconfig }}"
        api_version: external-secrets.io/v1beta1
        kind: "{{ store_kind }}"
        name: "{{ store_name }}"
        namespace: "{{ namespace if store_kind == 'SecretStore' else omit }}"
      register: store_check

    - name: Warn if store does not exist
      ansible.builtin.debug:
        msg: |
          WARNING: {{ store_kind }} '{{ store_name }}' not found.
          The ExternalSecret will be created but may not sync until the store exists.
      when: store_check.resources | length == 0

    # ===== BUILD EXTERNALSECRET SPEC =====
    - name: Build target configuration
      ansible.builtin.set_fact:
        target_config:
          creationPolicy: "{{ target_creation_policy }}"
          deletionPolicy: "{{ target_deletion_policy }}"
          immutable: "{{ target_immutable | bool }}"

    - name: Add target name if specified
      ansible.builtin.set_fact:
        target_config: "{{ target_config | combine({'name': target_secret_name}) }}"
      when: target_secret_name is defined and target_secret_name != omit

    - name: Build template configuration
      ansible.builtin.set_fact:
        template_config:
          type: "{{ secret_template_type }}"
      when: >-
        secret_template_type != 'Opaque' or
        secret_template_data | length > 0 or
        secret_template_labels | length > 0 or
        secret_template_annotations | length > 0

    - name: Add template data if specified
      ansible.builtin.set_fact:
        template_config: "{{ template_config | combine({'data': secret_template_data}) }}"
      when: template_config is defined and secret_template_data | length > 0

    - name: Add template metadata if specified
      ansible.builtin.set_fact:
        template_config: >-
          {{
            template_config | combine({
              'metadata': {
                'labels': secret_template_labels,
                'annotations': secret_template_annotations
              } | dict2items | rejectattr('value', 'equalto', {}) |
                  list | items2dict
            })
          }}
      when: >-
        template_config is defined and
        (secret_template_labels | length > 0 or secret_template_annotations | length > 0)

    - name: Add template to target if defined
      ansible.builtin.set_fact:
        target_config: "{{ target_config | combine({'template': template_config}) }}"
      when: template_config is defined

    # ===== CHECK FOR EXISTING EXTERNALSECRET =====
    - name: Check if ExternalSecret already exists
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k3s_kubeconfig }}"
        api_version: external-secrets.io/v1beta1
        kind: ExternalSecret
        name: "{{ secret_name }}"
        namespace: "{{ namespace }}"
      register: existing_es

    - name: Display existing ExternalSecret status
      ansible.builtin.debug:
        msg: "ExternalSecret {{ secret_name }} already exists - will be updated"
      when: existing_es.resources | length > 0

    # ===== BUILD FINAL SPEC =====
    - name: Build base ExternalSecret spec
      ansible.builtin.set_fact:
        es_spec:
          secretStoreRef:
            name: "{{ store_name }}"
            kind: "{{ store_kind }}"
          refreshInterval: "{{ refresh_interval }}"
          target: "{{ target_config }}"

    - name: Add data mappings to spec
      ansible.builtin.set_fact:
        es_spec: "{{ es_spec | combine({'data': secret_data}) }}"
      when: secret_data | length > 0

    - name: Add dataFrom to spec
      ansible.builtin.set_fact:
        es_spec: "{{ es_spec | combine({'dataFrom': data_from}) }}"
      when: data_from | length > 0

    # ===== CREATE/UPDATE EXTERNALSECRET =====
    - name: Create or update ExternalSecret
      kubernetes.core.k8s:
        kubeconfig: "{{ k3s_kubeconfig }}"
        state: present
        definition:
          apiVersion: external-secrets.io/v1beta1
          kind: ExternalSecret
          metadata:
            name: "{{ secret_name }}"
            namespace: "{{ namespace }}"
            labels:
              app.kubernetes.io/name: "{{ secret_name }}"
              app.kubernetes.io/component: externalsecret
              app.kubernetes.io/managed-by: ansible
              generated-by: idi
          spec: "{{ es_spec }}"
      register: es_result

    # ===== WAIT FOR EXTERNALSECRET TO SYNC =====
    - name: Wait for ExternalSecret to sync
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k3s_kubeconfig }}"
        api_version: external-secrets.io/v1beta1
        kind: ExternalSecret
        name: "{{ secret_name }}"
        namespace: "{{ namespace }}"
      register: es_status
      until: >-
        es_status.resources | length > 0 and
        es_status.resources[0].status is defined and
        es_status.resources[0].status.conditions is defined and
        (es_status.resources[0].status.conditions |
         selectattr('type', 'equalto', 'Ready') |
         selectattr('status', 'equalto', 'True') | list | length > 0)
      retries: 12
      delay: 5
      failed_when: false

    - name: Check ExternalSecret sync status
      ansible.builtin.set_fact:
        es_synced: >-
          {{
            es_status.resources | length > 0 and
            es_status.resources[0].status is defined and
            es_status.resources[0].status.conditions is defined and
            (es_status.resources[0].status.conditions |
             selectattr('type', 'equalto', 'Ready') |
             selectattr('status', 'equalto', 'True') | list | length > 0)
          }}
        es_message: >-
          {{
            (es_status.resources[0].status.conditions |
             selectattr('type', 'equalto', 'Ready') | list | first).message
            if es_status.resources | length > 0 and
               es_status.resources[0].status is defined and
               es_status.resources[0].status.conditions is defined
            else 'Status not available'
          }}
        es_refresh_time: >-
          {{
            es_status.resources[0].status.refreshTime | default('N/A')
            if es_status.resources | length > 0 and
               es_status.resources[0].status is defined
            else 'N/A'
          }}

    # ===== VERIFY TARGET SECRET CREATED =====
    - name: Check if target Secret was created
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k3s_kubeconfig }}"
        api_version: v1
        kind: Secret
        name: "{{ target_secret_name | default(secret_name) }}"
        namespace: "{{ namespace }}"
      register: target_secret_check
      when: es_synced

    - name: Set target secret status
      ansible.builtin.set_fact:
        target_secret_exists: "{{ target_secret_check.resources | default([]) | length > 0 }}"
        target_secret_keys: >-
          {{
            target_secret_check.resources[0].data.keys() | list
            if target_secret_check.resources | default([]) | length > 0
            else []
          }}
      when: es_synced

    # ===== OUTPUT RESULT =====
    - name: Display ExternalSecret creation result
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "ExternalSecret Operation Complete"
          - "=========================================="
          - "Name: {{ secret_name }}"
          - "Namespace: {{ namespace }}"
          - "Store: {{ store_name }} ({{ store_kind }})"
          - "Synced: {{ 'Yes' if es_synced else 'No' }}"
          - "Message: {{ es_message }}"
          - "Last Refresh: {{ es_refresh_time }}"
          - ""
          - "Target Secret:"
          - "  Name: {{ target_secret_name | default(secret_name) }}"
          - "  Exists: {{ target_secret_exists | default(false) }}"
          - "  Keys: {{ target_secret_keys | default([]) | join(', ') }}"
          - ""
          - "Action: {{ 'Updated' if existing_es.resources | length > 0 else 'Created' }}"
          - "=========================================="

    - name: Warn if ExternalSecret did not sync
      ansible.builtin.debug:
        msg: |
          WARNING: ExternalSecret did not sync successfully. Possible causes:
          - SecretStore/ClusterSecretStore is not ready
          - Remote secret path does not exist
          - Insufficient permissions to read secret
          - Network connectivity issues to secret backend

          Check with:
            kubectl describe externalsecret {{ secret_name }} -n {{ namespace }}
            kubectl get events -n {{ namespace }} --field-selector involvedObject.name={{ secret_name }}
      when: not es_synced

    - name: Set output facts for downstream playbooks
      ansible.builtin.set_fact:
        externalsecret_created:
          name: "{{ secret_name }}"
          namespace: "{{ namespace }}"
          store_name: "{{ store_name }}"
          store_kind: "{{ store_kind }}"
          target_secret: "{{ target_secret_name | default(secret_name) }}"
          synced: "{{ es_synced }}"
          target_exists: "{{ target_secret_exists | default(false) }}"
          secret_keys: "{{ target_secret_keys | default([]) }}"
          action: "{{ 'updated' if existing_es.resources | length > 0 else 'created' }}"
