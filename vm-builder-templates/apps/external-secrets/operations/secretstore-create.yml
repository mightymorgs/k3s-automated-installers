- name: External Secrets - Create SecretStore
  hosts: "{{ target_hosts | default('localhost') }}"
  gather_facts: false
  connection: local

  vars:
    # Required parameters
    store_name: "{{ store_name }}"
    namespace: "{{ namespace }}"
    provider_type: "vault"

    # Vault provider configuration
    vault_server: "{{ vault_url }}"
    vault_path: "secret"
    vault_version: "v2"
    vault_auth_method: "kubernetes"
    vault_role: "external-secrets"
    vault_k8s_mount_path: "kubernetes"
    service_account_name: "external-secrets"
    token_secret_name: "{{ token_secret_name | default(omit) }}"
    token_secret_key: "token"

    # AppRole auth configuration
    approle_role_id: "{{ approle_role_id | default(omit) }}"
    approle_secret_ref_name: "{{ approle_secret_ref_name | default(omit) }}"
    approle_path: "approle"

    # TLS configuration
    vault_ca_bundle: "{{ vault_ca_bundle | default(omit) }}"
    vault_ca_provider_type: "{{ vault_ca_provider_type | default(omit) }}"
    vault_ca_provider_name: "{{ vault_ca_provider_name | default(omit) }}"
    vault_ca_provider_key: "ca.crt"

    # Retry settings
    retry_max_retries: "{{ retry_max_retries | default(5) }}"
    retry_interval: "10s"

    # Kubeconfig
    k3s_kubeconfig: "/etc/rancher/k3s/k3s.yaml"

  environment:
    KUBECONFIG: "{{ kubeconfig | default(k3s_kubeconfig) }}"

  tasks:
    # ===== INPUT VALIDATION =====
    - name: Validate required parameters
      ansible.builtin.assert:
        that:
          - store_name is defined and store_name | length > 0
          - namespace is defined and namespace | length > 0
          - provider_type in ['vault', 'bws', 'aws', 'azure', 'gcp', 'kubernetes']
        fail_msg: |
          Required parameters missing or invalid. Usage:
            ansible-playbook secretstore-create.yml \
              -e store_name=vault-backend \
              -e namespace=default \
              -e provider_type=vault

    - name: Validate Vault auth method
      ansible.builtin.assert:
        that:
          - vault_auth_method in ['kubernetes', 'token', 'approle']
        fail_msg: "vault_auth_method must be one of: kubernetes, token, approle"
      when: provider_type == 'vault'

    - name: Validate token auth configuration
      ansible.builtin.assert:
        that:
          - token_secret_name is defined and token_secret_name != omit
        fail_msg: "token_secret_name is required when using token auth method"
      when: provider_type == 'vault' and vault_auth_method == 'token'

    - name: Validate AppRole auth configuration
      ansible.builtin.assert:
        that:
          - approle_role_id is defined and approle_role_id != omit
          - approle_secret_ref_name is defined and approle_secret_ref_name != omit
        fail_msg: "approle_role_id and approle_secret_ref_name are required for AppRole auth"
      when: provider_type == 'vault' and vault_auth_method == 'approle'

    - name: Display playbook information
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "External Secrets - Create SecretStore"
          - "=========================================="
          - "Store Name: {{ store_name }}"
          - "Namespace: {{ namespace }}"
          - "Provider: {{ provider_type }}"
          - "Vault Server: {{ vault_server }}"
          - "Vault Auth: {{ vault_auth_method }}"
          - "=========================================="

    # ===== ENSURE NAMESPACE EXISTS =====
    - name: Ensure namespace exists
      kubernetes.core.k8s:
        kubeconfig: "{{ k3s_kubeconfig }}"
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: "{{ namespace }}"

    # ===== BUILD PROVIDER CONFIGURATION =====
    - name: Build Vault Kubernetes auth configuration
      ansible.builtin.set_fact:
        vault_auth_config:
          kubernetes:
            mountPath: "{{ vault_k8s_mount_path }}"
            role: "{{ vault_role }}"
            serviceAccountRef:
              name: "{{ service_account_name }}"
      when: provider_type == 'vault' and vault_auth_method == 'kubernetes'

    - name: Build Vault token auth configuration
      ansible.builtin.set_fact:
        vault_auth_config:
          tokenSecretRef:
            name: "{{ token_secret_name }}"
            key: "{{ token_secret_key }}"
      when: provider_type == 'vault' and vault_auth_method == 'token'
      no_log: true

    - name: Build Vault AppRole auth configuration
      ansible.builtin.set_fact:
        vault_auth_config:
          appRole:
            path: "{{ approle_path }}"
            roleId: "{{ approle_role_id }}"
            secretRef:
              name: "{{ approle_secret_ref_name }}"
              key: secretId
      when: provider_type == 'vault' and vault_auth_method == 'approle'
      no_log: true

    - name: Build Vault CA configuration (bundle)
      ansible.builtin.set_fact:
        vault_ca_config:
          caBundle: "{{ vault_ca_bundle }}"
      when: provider_type == 'vault' and vault_ca_bundle is defined and vault_ca_bundle != omit

    - name: Build Vault CA configuration (provider)
      ansible.builtin.set_fact:
        vault_ca_config:
          caProvider:
            type: "{{ vault_ca_provider_type }}"
            name: "{{ vault_ca_provider_name }}"
            key: "{{ vault_ca_provider_key }}"
      when: >-
        provider_type == 'vault' and
        vault_ca_provider_type is defined and vault_ca_provider_type != omit and
        vault_ca_provider_name is defined and vault_ca_provider_name != omit

    - name: Set empty CA config if not specified
      ansible.builtin.set_fact:
        vault_ca_config: {}
      when: vault_ca_config is not defined

    - name: Build complete Vault provider configuration
      ansible.builtin.set_fact:
        provider_config:
          vault:
            server: "{{ vault_server }}"
            path: "{{ vault_path }}"
            version: "{{ vault_version }}"
            auth: "{{ vault_auth_config }}"
      when: provider_type == 'vault'

    - name: Merge CA configuration into provider
      ansible.builtin.set_fact:
        provider_config:
          vault: "{{ provider_config.vault | combine(vault_ca_config) }}"
      when: provider_type == 'vault' and vault_ca_config | length > 0

    # ===== CHECK FOR EXISTING SECRETSTORE =====
    - name: Check if SecretStore already exists
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k3s_kubeconfig }}"
        api_version: external-secrets.io/v1beta1
        kind: SecretStore
        name: "{{ store_name }}"
        namespace: "{{ namespace }}"
      register: existing_store

    - name: Display existing store status
      ansible.builtin.debug:
        msg: "SecretStore {{ store_name }} already exists - will be updated"
      when: existing_store.resources | length > 0

    # ===== CREATE/UPDATE SECRETSTORE =====
    - name: Create or update SecretStore
      kubernetes.core.k8s:
        kubeconfig: "{{ k3s_kubeconfig }}"
        state: present
        definition:
          apiVersion: external-secrets.io/v1beta1
          kind: SecretStore
          metadata:
            name: "{{ store_name }}"
            namespace: "{{ namespace }}"
            labels:
              app.kubernetes.io/name: "{{ store_name }}"
              app.kubernetes.io/component: secretstore
              app.kubernetes.io/managed-by: ansible
              generated-by: idi
          spec:
            provider: "{{ provider_config }}"
            retrySettings:
              maxRetries: "{{ retry_max_retries | int }}"
              retryInterval: "{{ retry_interval }}"
      register: store_result
      no_log: true

    # ===== WAIT FOR SECRETSTORE TO BE READY =====
    - name: Wait for SecretStore to be ready
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k3s_kubeconfig }}"
        api_version: external-secrets.io/v1beta1
        kind: SecretStore
        name: "{{ store_name }}"
        namespace: "{{ namespace }}"
      register: store_status
      until: >-
        store_status.resources | length > 0 and
        store_status.resources[0].status is defined and
        store_status.resources[0].status.conditions is defined and
        (store_status.resources[0].status.conditions |
         selectattr('type', 'equalto', 'Ready') |
         selectattr('status', 'equalto', 'True') | list | length > 0)
      retries: 12
      delay: 5
      failed_when: false

    - name: Check SecretStore readiness
      ansible.builtin.set_fact:
        store_ready: >-
          {{
            store_status.resources | length > 0 and
            store_status.resources[0].status is defined and
            store_status.resources[0].status.conditions is defined and
            (store_status.resources[0].status.conditions |
             selectattr('type', 'equalto', 'Ready') |
             selectattr('status', 'equalto', 'True') | list | length > 0)
          }}
        store_message: >-
          {{
            (store_status.resources[0].status.conditions |
             selectattr('type', 'equalto', 'Ready') | list | first).message
            if store_status.resources | length > 0 and
               store_status.resources[0].status is defined and
               store_status.resources[0].status.conditions is defined
            else 'Status not available'
          }}

    # ===== OUTPUT RESULT =====
    - name: Display SecretStore creation result
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "SecretStore Operation Complete"
          - "=========================================="
          - "Name: {{ store_name }}"
          - "Namespace: {{ namespace }}"
          - "Provider: {{ provider_type }}"
          - "Auth Method: {{ vault_auth_method if provider_type == 'vault' else 'N/A' }}"
          - "Status: {{ 'Ready' if store_ready else 'Not Ready' }}"
          - "Message: {{ store_message }}"
          - ""
          - "Action: {{ 'Updated' if existing_store.resources | length > 0 else 'Created' }}"
          - "=========================================="

    - name: Warn if SecretStore is not ready
      ansible.builtin.debug:
        msg: |
          WARNING: SecretStore is not ready. Possible causes:
          - Vault server is not accessible from the cluster
          - Kubernetes auth is not configured in Vault
          - ServiceAccount does not exist or lacks permissions
          - Vault role does not exist or is misconfigured

          Check with:
            kubectl describe secretstore {{ store_name }} -n {{ namespace }}
      when: not store_ready

    - name: Set output facts for downstream playbooks
      ansible.builtin.set_fact:
        secretstore_created:
          name: "{{ store_name }}"
          namespace: "{{ namespace }}"
          provider: "{{ provider_type }}"
          auth_method: "{{ vault_auth_method if provider_type == 'vault' else 'N/A' }}"
          ready: "{{ store_ready }}"
          action: "{{ 'updated' if existing_store.resources | length > 0 else 'created' }}"
