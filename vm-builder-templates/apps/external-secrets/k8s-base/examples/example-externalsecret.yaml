---
# Example ExternalSecret manifest demonstrating how to sync secrets from Vault to Kubernetes
# This example shows how applications can use ESO to fetch secrets from Vault
# and create native Kubernetes Secret resources

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  # Name of the ExternalSecret resource
  name: example-app-secrets
  # Namespace where the Kubernetes Secret will be created
  namespace: media-stack
  labels:
    app.kubernetes.io/name: example-app
    app.kubernetes.io/component: application
spec:
  # How often to sync from Vault (default: 1h)
  refreshInterval: 5m

  # Reference to the SecretStore to use
  # ClusterSecretStore can be used from any namespace
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore

  # The Kubernetes Secret that will be created/updated
  target:
    # Name of the resulting Kubernetes Secret
    name: example-app-secrets
    # Creation policy: Owner means ESO manages the Secret lifecycle
    creationPolicy: Owner
    # Template for the Secret (optional)
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: example-app
          managed-by: external-secrets

  # Data to fetch from Vault
  data:
    # Each entry maps a key in the Kubernetes Secret to a path in Vault

    # Simple key mapping: fetch a single value from Vault
    # Vault path: secret/data/example-app/database
    # Vault key: username
    # K8s Secret key: DB_USERNAME
    - secretKey: DB_USERNAME
      remoteRef:
        key: example-app/database
        property: username

    # Fetch another value from the same Vault secret
    - secretKey: DB_PASSWORD
      remoteRef:
        key: example-app/database
        property: password

    # Fetch from a different Vault secret path
    - secretKey: API_KEY
      remoteRef:
        key: example-app/api-credentials
        property: api_key

    # Fetch JWT token from another path
    - secretKey: JWT_SECRET
      remoteRef:
        key: example-app/jwt
        property: secret

---
# Example of how to use the created Secret in a Pod/Deployment

apiVersion: v1
kind: Pod
metadata:
  name: example-app
  namespace: media-stack
spec:
  containers:
  - name: app
    image: nginx:1.27-alpine
    securityContext:
      runAsNonRoot: true
      readOnlyRootFilesystem: true
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

    # Option 1: Use secrets as environment variables
    env:
    - name: DATABASE_USERNAME
      valueFrom:
        secretKeyRef:
          name: example-app-secrets
          key: DB_USERNAME
    - name: DATABASE_PASSWORD
      valueFrom:
        secretKeyRef:
          name: example-app-secrets
          key: DB_PASSWORD

    # Option 2: Mount secrets as files
    volumeMounts:
    - name: secrets
      mountPath: /secrets
      readOnly: true

  volumes:
  - name: secrets
    secret:
      secretName: example-app-secrets

---
# USAGE NOTES:
#
# 1. Before deploying this example, ensure secrets exist in Vault:
#
#    vault kv put secret/example-app/database \
#      username=dbuser \
#      password=supersecret
#
#    vault kv put secret/example-app/api-credentials \
#      api_key=abc123xyz
#
#    vault kv put secret/example-app/jwt \
#      secret=jwt-signing-key
#
# 2. Deploy the ExternalSecret:
#    kubectl apply -f example-externalsecret.yaml
#
# 3. Verify the Kubernetes Secret was created:
#    kubectl get secret example-app-secrets -n media-stack
#    kubectl get secret example-app-secrets -n media-stack -o yaml
#
# 4. Check ExternalSecret status:
#    kubectl describe externalsecret example-app-secrets -n media-stack
#
# 5. The Secret will be automatically updated when Vault values change
#    according to the refreshInterval (5m in this example)
