apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: neo4j
  namespace: neo4j
spec:
  serviceName: neo4j
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: neo4j
  template:
    metadata:
      labels:
        app.kubernetes.io/name: neo4j
    spec:
      containers:
        - name: neo4j
          image: neo4j:5.26.1-community
          ports:
            - name: http
              containerPort: 7474
              protocol: TCP
            - name: bolt
              containerPort: 7687
              protocol: TCP
          env:
            - name: NEO4J_AUTH
              valueFrom:
                secretKeyRef:
                  name: neo4j-auth
                  key: NEO4J_AUTH
                  optional: true
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: neo4j-auth
                  key: NEO4J_PASSWORD
                  optional: true
            - name: NEO4J_PLUGINS
              value: '["apoc"]'
            - name: NEO4J_dbms_memory_heap_initial__size
              value: "512m"
            - name: NEO4J_dbms_memory_heap_max__size
              value: "2G"
            - name: NEO4J_dbms_memory_pagecache_size
              value: "1G"
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "4Gi"
              cpu: "2000m"
          volumeMounts:
            - name: data
              mountPath: /data
            - name: logs
              mountPath: /logs
            - name: schemas
              mountPath: /var/lib/neo4j/import/schemas
              readOnly: true
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - |
                  if [ -n "$NEO4J_PASSWORD" ]; then
                    cypher-shell -u neo4j -p "$NEO4J_PASSWORD" "RETURN 1"
                  else
                    cypher-shell -u neo4j -p neo4j "RETURN 1"
                  fi
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - |
                  if [ -n "$NEO4J_PASSWORD" ]; then
                    cypher-shell -u neo4j -p "$NEO4J_PASSWORD" "RETURN 1"
                  else
                    cypher-shell -u neo4j -p neo4j "RETURN 1"
                  fi
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: schemas
          configMap:
            name: neo4j-schemas
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: longhorn
        resources:
          requests:
            storage: 10Gi
    - metadata:
        name: logs
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: longhorn
        resources:
          requests:
            storage: 2Gi
