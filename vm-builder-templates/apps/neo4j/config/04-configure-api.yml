---
# playbook_metadata:
#   id: "atomic/apps/neo4j/04-configure-api"
#   type: "atomic"
#
#   # ========== FILE LOCATION ==========
#   path_info:
#     file_path: "atomic/apps/neo4j/config/04-configure-api.yml"
#     category: "apps"
#     subsystem: "neo4j"
#
#   # ========== TRADITIONAL METADATA ==========
#   batch_id: "20260221_api_config_auth"
#   dependencies: ["neo4j_deployed"]
#   provides: ["neo4j_api_configured"]
#   tags: ["neo4j", "api", "configuration", "zero-touch"]
#   estimated_duration: 90
#   parallel_safe: false
#   idempotent: true
#   description: >-
#     Disable Neo4j built-in authentication for Tailscale Ingress mode.
#     Sets NEO4J_AUTH=none and NEO4J_dbms_security_auth__enabled=false
#     on the StatefulSet so Neo4j Browser and Bolt do not require login.
#     Tailscale provides the authentication layer.
#   requires_apps: ["neo4j"]
#
#   # ========== BWS STATE INTERACTION (v3.2) ==========
#   bws_state:
#     writes:
#       - path: "_state.apps.neo4j.configured"
#         example: true

- name: Configure Neo4j auth-disabled access for Tailscale Ingress
  hosts: "{{ target_hosts | default('localhost') }}"
  gather_facts: false
  become: false

  vars:
    neo4j_namespace: "neo4j"
    app_namespace: "{{ neo4j_namespace }}"
    # neo4j_url: from BWS _state via Phase 4 extra-vars

  tasks:
    # ========== 1. CHECK IF NEO4J IS DEPLOYED ==========
    - name: Check if Neo4j pod is running
      ansible.builtin.command:
        cmd: kubectl get pod -n {{ app_namespace }} -l app=neo4j --no-headers
      environment:
        KUBECONFIG: "{{ kubeconfig_path | default('/etc/rancher/k3s/k3s.yaml') }}"
      register: neo4j_pod_check
      changed_when: false
      failed_when: false

    - name: Skip if Neo4j not deployed
      ansible.builtin.debug:
        msg: "Neo4j not deployed - skipping API configuration"
      when: neo4j_pod_check.rc != 0 or neo4j_pod_check.stdout | length == 0

    - name: End play if Neo4j not available
      ansible.builtin.meta: end_play
      when: neo4j_pod_check.rc != 0 or neo4j_pod_check.stdout | length == 0

    # ========== 2. DISABLE AUTHENTICATION VIA ENVIRONMENT VARIABLES ==========
    # When Tailscale is the auth layer, Neo4j's built-in authentication is
    # redundant. Setting NEO4J_AUTH=none disables the initial password
    # requirement, and NEO4J_dbms_security_auth__enabled=false explicitly
    # turns off the auth subsystem so Browser and Bolt accept unauthenticated
    # connections from tailnet users.
    - name: Disable Neo4j authentication via environment variables
      ansible.builtin.command:
        cmd: >-
          kubectl set env statefulset/neo4j -n {{ app_namespace }}
          NEO4J_AUTH=none
          NEO4J_dbms_security_auth__enabled=false
      environment:
        KUBECONFIG: "{{ kubeconfig_path | default('/etc/rancher/k3s/k3s.yaml') }}"
      register: env_patch_result
      changed_when: "'updated' in env_patch_result.stdout"

    # ========== 3. RESTART STATEFULSET ==========
    # StatefulSet pods do not automatically restart on env var changes.
    # An explicit rollout restart is required to pick up the new config.
    - name: Restart Neo4j StatefulSet to apply auth changes
      ansible.builtin.command:
        cmd: kubectl rollout restart statefulset/neo4j -n {{ app_namespace }}
      environment:
        KUBECONFIG: "{{ kubeconfig_path | default('/etc/rancher/k3s/k3s.yaml') }}"
      changed_when: true

    # ========== 4. WAIT FOR ROLLOUT ==========
    - name: Wait for Neo4j rollout to complete
      ansible.builtin.command:
        cmd: kubectl rollout status statefulset/neo4j -n {{ app_namespace }} --timeout=180s
      environment:
        KUBECONFIG: "{{ kubeconfig_path | default('/etc/rancher/k3s/k3s.yaml') }}"
      changed_when: false

    # ========== 5. WAIT FOR POD TO BE READY ==========
    - name: Wait for Neo4j pod to be ready
      ansible.builtin.command:
        cmd: >-
          kubectl wait pod -n {{ app_namespace }} -l app=neo4j
          --for=condition=Ready --timeout=120s
      environment:
        KUBECONFIG: "{{ kubeconfig_path | default('/etc/rancher/k3s/k3s.yaml') }}"
      changed_when: false

    # ========== 6. VERIFY NEO4J BROWSER IS ACCESSIBLE ==========
    - name: Verify Neo4j Browser is reachable via HTTP
      ansible.builtin.uri:
        url: "{{ neo4j_url }}"
        method: GET
        return_content: false
      register: health_check
      retries: 10
      delay: 6
      until: health_check.status is defined and health_check.status == 200
      failed_when: false

    - name: Fail if Neo4j Browser not accessible after rollout
      ansible.builtin.fail:
        msg: "Neo4j Browser not accessible after rollout (last status: {{ health_check.status | default('unknown') }})"
      when: health_check.status is not defined or health_check.status != 200

    # ========== 7. DISPLAY RESULT ==========
    - name: Display configuration result
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "Neo4j API Configuration Complete"
          - "=========================================="
          - "NEO4J_AUTH: none"
          - "NEO4J_dbms_security_auth__enabled: false"
          - "Auth Layer: Tailscale (built-in login disabled)"
          - "Browser: {{ neo4j_url }} ({{ health_check.status }})"
          - "Bolt: bolt://{{ neo4j_service_name }}.{{ neo4j_namespace }}:7687"
          - "=========================================="
