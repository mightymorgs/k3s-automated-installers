  04-configure-api.yml:
    summary: Disable Neo4j built-in authentication for Tailscale Ingress mode. Sets
      NEO4J_AUTH=none and NEO4J_dbms_security_auth__enabled=false on the StatefulSet
      so Neo4j Browser and Bolt do not require login. Tailscale provides the authentication
      layer.
