- name: Neo4j - Create Index
  hosts: "{{ target_hosts | default('localhost') }}"
  connection: local
  gather_facts: false

  vars:
    inventory_secret_name: "{{ lookup('env', 'VM_INVENTORY_SECRET') }}"
    neo4j_base_url: "{{ neo4j_url }}"
    neo4j_admin_user: "{{ neo4j_admin_user_input | default('neo4j') }}"

    # Index configuration (required)
    # index_name: Unique name for the index (required)
    # label: Node label to index (required)
    # property: Property to index (required for single-property indexes)
    # properties: List of properties (required for composite indexes)

    # Optional configuration
    index_type: "{{ index_type_input | default('range') }}"  # range, text, fulltext, composite
    database: "{{ database_input | default('neo4j') }}"
    wait_for_online: "{{ wait_for_online_input | default(true) }}"
    wait_timeout_seconds: "{{ wait_timeout_seconds_input | default(120) }}"
    wait_delay_seconds: "{{ wait_delay_seconds_input | default(5) }}"

  tasks:
    # ===== STEP 1: Validate Required Inputs =====
    - name: Validate required inputs for single-property index
      ansible.builtin.assert:
        that:
          - index_name is defined and index_name | length > 0
          - label is defined and label | length > 0
          - (property is defined and property | length > 0) or (properties is defined and properties | length > 0)
        fail_msg: >-
          Required inputs: index_name (string), label (string), property (string) OR properties (list).
          Example single: -e "index_name=idx_user_email" -e "label=User" -e "property=email"
          Example composite: -e "index_name=idx_user_name" -e "label=User" -e "properties=['firstName','lastName']" -e "index_type=composite"
        success_msg: "All required inputs validated"

    - name: Validate index type
      ansible.builtin.assert:
        that:
          - index_type in ['range', 'text', 'fulltext', 'composite']
        fail_msg: "Invalid index_type '{{ index_type }}'. Must be one of: range, text, fulltext, composite"
        success_msg: "Index type '{{ index_type }}' is valid"

    - name: Validate composite index has properties list
      ansible.builtin.assert:
        that:
          - properties is defined and properties | length >= 2
        fail_msg: "Composite index requires 'properties' list with at least 2 properties"
      when: index_type == 'composite'

    # ===== STEP 2: Validate Environment =====
    - name: Validate BWS_ACCESS_TOKEN is set
      ansible.builtin.assert:
        that:
          - lookup('env', 'BWS_ACCESS_TOKEN') | length > 0
        fail_msg: "BWS_ACCESS_TOKEN environment variable must be set"
        success_msg: "BWS access configured"

    - name: Validate VM_INVENTORY_SECRET is set
      ansible.builtin.assert:
        that:
          - inventory_secret_name | length > 0
        fail_msg: "VM_INVENTORY_SECRET environment variable must be set"
        success_msg: "Inventory secret name configured"

    # ===== STEP 3: Read BWS Inventory and Neo4j Credentials =====
    - name: Fetch VM inventory from BWS
      ansible.builtin.shell: |
        bws secret get "{{ inventory_secret_name }}" --output json
      environment:
        BWS_ACCESS_TOKEN: "{{ lookup('env', 'BWS_ACCESS_TOKEN') }}"
      register: bws_result
      changed_when: false
      no_log: true

    - name: Parse inventory JSON
      ansible.builtin.set_fact:
        inventory: "{{ (bws_result.stdout | from_json).value | from_json }}"
      no_log: true

    - name: Extract Neo4j credentials
      ansible.builtin.set_fact:
        neo4j_admin_password: "{{ inventory._state.apps.neo4j.password }}"
        neo4j_url: "{{ inventory._state.apps.neo4j.url | default(neo4j_base_url) }}"
      no_log: true

    - name: Validate Neo4j credentials are available
      ansible.builtin.assert:
        that:
          - neo4j_admin_password | length > 0
        fail_msg: "Neo4j admin password not found in BWS _state. Deploy Neo4j first."
        success_msg: "Neo4j credentials retrieved from BWS _state"

    # ===== STEP 4: Check if Index Already Exists =====
    - name: Check if index already exists
      ansible.builtin.uri:
        url: "{{ neo4j_url }}/db/{{ database }}/tx/commit"
        method: POST
        user: "{{ neo4j_admin_user }}"
        password: "{{ neo4j_admin_password }}"
        force_basic_auth: true
        headers:
          Content-Type: "application/json"
          Accept: "application/json"
        body_format: json
        body:
          statements:
            - statement: "SHOW INDEXES YIELD name, state, type WHERE name = $indexName RETURN name, state, type"
              parameters:
                indexName: "{{ index_name }}"
        status_code: [200]
        validate_certs: false
      register: check_index_result
      no_log: false

    - name: Determine if index exists
      ansible.builtin.set_fact:
        index_exists: "{{ check_index_result.json.results[0].data | length > 0 }}"
        existing_state: >-
          {{
            check_index_result.json.results[0].data[0].row[1]
            if check_index_result.json.results[0].data | length > 0
            else 'unknown'
          }}
        existing_type: >-
          {{
            check_index_result.json.results[0].data[0].row[2]
            if check_index_result.json.results[0].data | length > 0
            else 'unknown'
          }}

    - name: Display index status
      ansible.builtin.debug:
        msg: >-
          Index '{{ index_name }}':
          {{ 'Already exists (state: ' + existing_state + ', type: ' + existing_type + ')' if index_exists else 'Does not exist (will create)' }}

    # ===== STEP 5: Build and Execute CREATE INDEX Statement =====
    - name: Build range index Cypher statement
      ansible.builtin.set_fact:
        create_index_cypher: "CREATE INDEX {{ index_name }} IF NOT EXISTS FOR (n:{{ label }}) ON (n.{{ property }})"
      when:
        - not index_exists
        - index_type == 'range'

    - name: Build text index Cypher statement
      ansible.builtin.set_fact:
        create_index_cypher: "CREATE TEXT INDEX {{ index_name }} IF NOT EXISTS FOR (n:{{ label }}) ON (n.{{ property }})"
      when:
        - not index_exists
        - index_type == 'text'

    - name: Build fulltext index Cypher statement
      ansible.builtin.set_fact:
        create_index_cypher: "CREATE FULLTEXT INDEX {{ index_name }} IF NOT EXISTS FOR (n:{{ label }}) ON EACH [n.{{ property }}]"
      when:
        - not index_exists
        - index_type == 'fulltext'

    - name: Build composite index Cypher statement
      ansible.builtin.set_fact:
        create_index_cypher: >-
          CREATE INDEX {{ index_name }} IF NOT EXISTS FOR (n:{{ label }})
          ON ({{ properties | map('regex_replace', '^(.*)$', 'n.\1') | join(', ') }})
      when:
        - not index_exists
        - index_type == 'composite'

    - name: Display Cypher statement
      ansible.builtin.debug:
        msg: "Executing: {{ create_index_cypher }}"
      when: not index_exists

    - name: Create index in Neo4j
      ansible.builtin.uri:
        url: "{{ neo4j_url }}/db/{{ database }}/tx/commit"
        method: POST
        user: "{{ neo4j_admin_user }}"
        password: "{{ neo4j_admin_password }}"
        force_basic_auth: true
        headers:
          Content-Type: "application/json"
          Accept: "application/json"
        body_format: json
        body:
          statements:
            - statement: "{{ create_index_cypher }}"
        status_code: [200]
        validate_certs: false
      register: create_index_result
      when: not index_exists
      no_log: false

    - name: Check for Neo4j errors in create response
      ansible.builtin.assert:
        that:
          - create_index_result.json.errors | length == 0
        fail_msg: "Failed to create index: {{ create_index_result.json.errors | map(attribute='message') | join(', ') }}"
        success_msg: "Index '{{ index_name }}' create command executed successfully"
      when: not index_exists

    # ===== STEP 6: Wait for Index to be ONLINE =====
    - name: Wait for index to be ONLINE
      ansible.builtin.uri:
        url: "{{ neo4j_url }}/db/{{ database }}/tx/commit"
        method: POST
        user: "{{ neo4j_admin_user }}"
        password: "{{ neo4j_admin_password }}"
        force_basic_auth: true
        headers:
          Content-Type: "application/json"
          Accept: "application/json"
        body_format: json
        body:
          statements:
            - statement: "SHOW INDEXES YIELD name, state WHERE name = $indexName RETURN state"
              parameters:
                indexName: "{{ index_name }}"
        status_code: [200]
        validate_certs: false
      register: index_status_result
      until: >-
        index_status_result.json.results[0].data | length > 0 and
        index_status_result.json.results[0].data[0].row[0] == 'ONLINE'
      retries: "{{ (wait_timeout_seconds | int / wait_delay_seconds | int) | int }}"
      delay: "{{ wait_delay_seconds | int }}"
      when:
        - wait_for_online | bool
        - not index_exists
      no_log: false

    - name: Record final index state
      ansible.builtin.set_fact:
        final_state: >-
          {{
            index_status_result.json.results[0].data[0].row[0]
            if index_status_result is not skipped and index_status_result.json.results[0].data | length > 0
            else (existing_state if index_exists else 'unknown')
          }}

    # ===== STEP 7: Write Index Status to BWS._state =====
    - name: Update BWS inventory with index status
      ansible.builtin.shell: |
        # Get current inventory
        CURRENT=$(bws secret get "{{ inventory_secret_name }}" --output json | jq -r '.value')

        # Get current timestamp
        TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

        # Update _state.apps.neo4j.indexes.{index_name}
        UPDATED=$(echo "$CURRENT" | jq \
          --arg name "{{ index_name }}" \
          --argjson created true \
          --arg timestamp "$TIMESTAMP" \
          --arg state "{{ final_state }}" \
          --arg index_type "{{ index_type }}" \
          --arg label "{{ label }}" \
          --arg property "{{ property | default('') }}" \
          --argjson properties '{{ properties | default([]) | to_json }}' \
          --arg database "{{ database }}" \
          --argjson was_existing {{ index_exists | lower }} \
          '
          if ._state == null then ._state = {} else . end |
          if ._state.apps == null then ._state.apps = {} else . end |
          if ._state.apps.neo4j == null then ._state.apps.neo4j = {} else . end |
          if ._state.apps.neo4j.indexes == null then ._state.apps.neo4j.indexes = {} else . end |
          ._state.apps.neo4j.indexes[$name] = {
            "created": $created,
            "created_timestamp": $timestamp,
            "state": $state,
            "type": $index_type,
            "label": $label,
            "property": (if $property == "" then null else $property end),
            "properties": (if ($properties | length) > 0 then $properties else null end),
            "database": $database,
            "was_existing": $was_existing
          }
        ')

        # Write back to BWS
        bws secret edit "{{ inventory_secret_name }}" --value "$UPDATED"
      environment:
        BWS_ACCESS_TOKEN: "{{ lookup('env', 'BWS_ACCESS_TOKEN') }}"
      register: bws_update_result
      changed_when: true
      no_log: true

    # ===== STEP 8: Output Result =====
    - name: Display index creation result
      ansible.builtin.debug:
        msg:
          status: "{{ 'existing' if index_exists else 'created' }}"
          index_name: "{{ index_name }}"
          index_type: "{{ index_type }}"
          label: "{{ label }}"
          property: "N/A (composite)"
          properties: "{{ properties | default([]) }}"
          database: "{{ database }}"
          state: "{{ final_state }}"
          message: >-
            Index '{{ index_name }}' {{ 'already existed' if index_exists else 'created successfully' }}.
            Current state: {{ final_state }}.
            Status recorded in BWS _state.
