- name: Deploy Tailscale Kubernetes Operator
  hosts: "{{ target_hosts | default('localhost') }}"
  gather_facts: false
  become: false

  vars:
    app_name: tailscale-operator
    app_namespace: tailscale
    manifest_url: "https://raw.githubusercontent.com/tailscale/tailscale/main/cmd/k8s-operator/deploy/manifests/operator.yaml"
    manifest_path: "/tmp/tailscale-operator.yaml"

  tasks:
    # ========== 1. PREREQUISITES ==========
    - name: Verify kubectl is available
      ansible.builtin.command: kubectl version --client
      register: kubectl_check
      changed_when: false

    - name: Verify Tailscale is running on host
      ansible.builtin.command: tailscale status --self
      register: ts_status
      changed_when: false

    # ========== 2. READ OAUTH CREDENTIALS FROM BWS ==========
    - name: Read VM inventory from BWS cache
      ansible.builtin.shell: |
        set -eu
        BWS_CACHE=/tmp/bws_secrets.json
        jq -r --arg k "{{ inventory_secret_name | default('inventory/' + (vm_hostname | default(''))) }}" '.[] | select(.key==$k) | .value' "$BWS_CACHE"
      register: inventory_raw
      changed_when: false

    - name: Parse inventory
      ansible.builtin.set_fact:
        inventory: "{{ inventory_raw.stdout | from_json }}"

    - name: Extract OAuth pointer keys
      ansible.builtin.set_fact:
        oauth_client_id_key: "{{ inventory.tailscale.oauth_client_id_key }}"
        oauth_client_secret_key: "{{ inventory.tailscale.oauth_client_secret_key }}"

    - name: Resolve OAuth client ID from pointer
      ansible.builtin.shell: |
        set -eu
        BWS_CACHE=/tmp/bws_secrets.json
        jq -r --arg k "{{ oauth_client_id_key }}" '.[] | select(.key==$k) | .value' "$BWS_CACHE"
      register: client_id_raw
      changed_when: false
      no_log: true

    - name: Resolve OAuth client secret from pointer
      ansible.builtin.shell: |
        set -eu
        BWS_CACHE=/tmp/bws_secrets.json
        jq -r --arg k "{{ oauth_client_secret_key }}" '.[] | select(.key==$k) | .value' "$BWS_CACHE"
      register: client_secret_raw
      changed_when: false
      no_log: true

    - name: Set OAuth credentials
      ansible.builtin.set_fact:
        ts_oauth_client_id: "{{ client_id_raw.stdout | trim }}"
        ts_oauth_client_secret: "{{ client_secret_raw.stdout | trim }}"
      no_log: true

    - name: Verify OAuth credentials exist
      ansible.builtin.assert:
        that:
          - ts_oauth_client_id is defined
          - ts_oauth_client_id | length > 0
          - ts_oauth_client_secret is defined
          - ts_oauth_client_secret | length > 0
        fail_msg: >-
          Tailscale OAuth client credentials not found in BWS.
          Ensure inventory/shared/secrets/tailscale/oauthclientid and
          inventory/shared/secrets/tailscale/oauthclientsecret are populated.
          Create an OAuth client at https://login.tailscale.com/admin/settings/oauth

    # ========== 3. ENSURE NAMESPACE EXISTS ==========
    - name: Ensure namespace exists
      ansible.builtin.shell: |
        kubectl create namespace {{ app_namespace }} --dry-run=client -o yaml | kubectl apply -f -
      register: ns_apply
      changed_when: "'created' in ns_apply.stdout or 'configured' in ns_apply.stdout"

    - name: Label namespace
      ansible.builtin.command: >-
        kubectl label namespace {{ app_namespace }}
        app.kubernetes.io/name={{ app_name }}
        app.kubernetes.io/part-of=golden-master
        --overwrite
      changed_when: false

    # ========== 4. DOWNLOAD AND APPLY STATIC MANIFESTS ==========
    - name: Download official Tailscale operator manifest
      ansible.builtin.get_url:
        url: "{{ manifest_url }}"
        dest: "{{ manifest_path }}"
        mode: '0644'
        force: true

    - name: Inject OAuth credentials and proxy tags into manifest
      ansible.builtin.shell: |
        set -eu
        sed -i \
          -e "s|client_id: # SET CLIENT ID HERE|client_id: \"{{ ts_oauth_client_id }}\"|" \
          -e "s|client_secret: # SET CLIENT SECRET HERE|client_secret: \"{{ ts_oauth_client_secret }}\"|" \
          -e 's|value: "tag:k8s"|value: "tag:k8s-operator"|' \
          "{{ manifest_path }}"
      no_log: true

    - name: Apply Tailscale operator manifest
      ansible.builtin.command:
        cmd: kubectl apply -f {{ manifest_path }}
      register: manifest_apply
      changed_when: "'created' in manifest_apply.stdout or 'configured' in manifest_apply.stdout"

    - name: Display applied resources
      ansible.builtin.debug:
        msg: "{{ manifest_apply.stdout_lines }}"

    # ========== 4. WAIT FOR OPERATOR ==========
    - name: Wait for operator deployment to be available
      ansible.builtin.command: >-
        kubectl -n {{ app_namespace }} rollout status
        deployment/operator
        --timeout=120s
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: operator_wait
      changed_when: false

    # ========== 5. CLEANUP AND STATUS ==========
    - name: Clean up downloaded manifest
      ansible.builtin.file:
        path: "{{ manifest_path }}"
        state: absent

    - name: Display deployment status
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "Tailscale Operator Deployed Successfully"
          - "=========================================="
          - "Namespace: {{ app_namespace }}"
          - "Method: Static manifests (no Helm)"
          - "=========================================="
