---
- name: Uninstall Tailscale Operator
  hosts: "{{ target_hosts | default('localhost') }}"
  gather_facts: false
  become: false

  vars:
    app_name: tailscale-operator
    app_namespace: "tailscale"
  tasks:
    - name: Check namespace exists
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Namespace
        name: "{{ app_namespace }}"
      register: ns_check

    - name: Skip if namespace does not exist
      ansible.builtin.meta: end_play
      when: ns_check.resources | length == 0

    - name: Delete Deployment tailscale-operator
      kubernetes.core.k8s:
        api_version: apps/v1
        kind: Deployment
        name: tailscale-operator
        namespace: "{{ app_namespace }}"
        state: absent
        wait: true
        wait_timeout: 120

    - name: Delete ServiceAccount tailscale-operator
      kubernetes.core.k8s:
        api_version: v1
        kind: ServiceAccount
        name: tailscale-operator
        namespace: "{{ app_namespace }}"
        state: absent

    - name: Delete operator Secret
      kubernetes.core.k8s:
        api_version: v1
        kind: Secret
        name: tailscale-operator
        namespace: "{{ app_namespace }}"
        state: absent

    - name: Delete ClusterRole tailscale-operator
      kubernetes.core.k8s:
        api_version: rbac.authorization.k8s.io/v1
        kind: ClusterRole
        name: tailscale-operator
        state: absent
      failed_when: false

    - name: Delete ClusterRoleBinding tailscale-operator
      kubernetes.core.k8s:
        api_version: rbac.authorization.k8s.io/v1
        kind: ClusterRoleBinding
        name: tailscale-operator
        state: absent
      failed_when: false

    - name: Verify removal
      kubernetes.core.k8s_info:
        api_version: apps/v1
        kind: Deployment
        name: tailscale-operator
        namespace: "{{ app_namespace }}"
      register: verify
      failed_when: verify.resources | length > 0
