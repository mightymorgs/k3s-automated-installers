---
# Sonarr Service
# NodePort for Tailscale access
apiVersion: v1
kind: Service
metadata:
  name: sonarr
  namespace: media-stack
  labels:
    app: sonarr
    app.kubernetes.io/name: sonarr
    app.kubernetes.io/part-of: media-stack
spec:
  type: NodePort
  selector:
    app: sonarr
  ports:
    - name: http
      port: 8989
      targetPort: 8989
      nodePort: 30989
      protocol: TCP
