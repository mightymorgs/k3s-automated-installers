---
# playbook_metadata:
#   id: "atomic/apps/sonarr/08-wire-plex"
#   type: "atomic"
#
#   # ========== FILE LOCATION ==========
#   path_info:
#     file_path: "atomic/apps/sonarr/config/08-wire-plex.yml"
#     category: "apps"
#     subsystem: "sonarr"
#
#   # ========== TRADITIONAL METADATA ==========
#   dependencies: ["sonarr_deployed", "plex_deployed"]
#   provides: ["sonarr_plex_wired"]
#   tags: ["sonarr", "plex", "integration", "wiring", "phase4"]
#   estimated_duration: 30
#   parallel_safe: false
#   idempotent: true
#   description: Register Plex as notification connection in Sonarr for library refresh on episode import
#   requires_apps: ["sonarr", "plex"]
#
#   # ========== BWS STATE INTERACTION ==========
#   bws_state:
#     reads:
#       - path: "_state.apps.sonarr.api_key"
#       - path: "_state.apps.plex.api_key"

- name: Wire Plex into Sonarr
  hosts: "{{ target_hosts | default('localhost') }}"
  gather_facts: false
  become: false

  vars:
    plex_namespace: "plex"
    sonarr_namespace: "media-stack"
    app_namespace: "{{ sonarr_namespace }}"
    # sonarr_url: from BWS _state via Phase 4 extra-vars

  tasks:
    # ========== VALIDATE REQUIRED VARS ==========

    # ========== SKIP IF PLEX NOT INSTALLED ==========
    - name: Skip if plex is not installed on this VM
      when: plex_api_key is not defined
      block:
        - name: "plex not installed — skipping sonarr <-> plex wiring"
          ansible.builtin.debug:
            msg: "plex is not installed on this VM (no plex_api_key in BWS state) — skipping wiring"
        - name: End play gracefully
          ansible.builtin.meta: end_play

    - name: Fail if sonarr_api_key not provided
      ansible.builtin.fail:
        msg: "sonarr_api_key must be provided via extra-vars (from BWS inventory)"
      when: sonarr_api_key is not defined or sonarr_api_key | length == 0

    - name: Fail if plex_api_key not provided
      ansible.builtin.fail:
        msg: "plex_api_key must be provided via extra-vars (from BWS inventory)"
      when: plex_api_key is not defined or plex_api_key | length == 0

    # ========== VERIFY SONARR API ==========
    - name: Verify Sonarr API is accessible
      ansible.builtin.uri:
        url: "{{ sonarr_url }}/api/v3/system/status"
        method: GET
        headers:
          X-Api-Key: "{{ sonarr_api_key }}"
        return_content: false
      register: api_status
      retries: 5
      delay: 10
      until: api_status.status is defined and api_status.status == 200
      failed_when: false

    - name: Fail if Sonarr API not accessible
      ansible.builtin.fail:
        msg: "Sonarr API not accessible at {{ sonarr_url }} (status: {{ api_status.status | default('no response') }}). App is installed but API unreachable."
      when: api_status.status is not defined or api_status.status != 200

    # ========== CHECK EXISTING NOTIFICATIONS ==========
    - name: Get existing notifications
      ansible.builtin.uri:
        url: "{{ sonarr_url }}/api/v3/notification"
        method: GET
        headers:
          X-Api-Key: "{{ sonarr_api_key }}"
        status_code: [200]
      register: existing_notifications

    - name: Check if Plex Media Server notification already exists
      ansible.builtin.set_fact:
        plex_notification_exists: "{{ (existing_notifications.json | selectattr('name', 'equalto', 'Plex Media Server') | list | length) > 0 }}"

    # ========== ADD PLEX NOTIFICATION ==========
    - name: Add Plex Media Server as notification connection
      ansible.builtin.uri:
        url: "{{ sonarr_url }}/api/v3/notification"
        method: POST
        headers:
          X-Api-Key: "{{ sonarr_api_key }}"
          Content-Type: "application/json"
        body_format: json
        body:
          name: "Plex Media Server"
          implementation: "PlexServer"
          configContract: "PlexServerSettings"
          onDownload: true
          onUpgrade: true
          onRename: true
          onSeriesAdd: false
          onSeriesDelete: false
          fields:
            - name: "host"
              value: "{{ plex_service_name }}.{{ plex_namespace }}.svc.cluster.local"
            - name: "port"
              value: "{{ plex_service_port }}"
            - name: "authToken"
              value: "{{ plex_api_key }}"
            - name: "useSsl"
              value: false
            - name: "updateLibrary"
              value: true
        status_code: [200, 201]
        return_content: true
      register: add_plex_result
      when: not plex_notification_exists

    # ========== DISPLAY RESULT ==========
    - name: Display wiring result
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "Sonarr <-> Plex Wiring Complete"
          - "=========================================="
          - "Notification: Plex Media Server ({{ 'added' if (not plex_notification_exists and add_plex_result is defined and add_plex_result.status | default(0) in [200, 201]) else ('exists' if plex_notification_exists else 'FAILED') }})"
          - "Events: onDownload, onUpgrade, onRename"
          - "Library update: enabled"
          - "=========================================="
