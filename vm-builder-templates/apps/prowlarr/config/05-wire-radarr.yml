---
# playbook_metadata:
#   id: "atomic/apps/prowlarr/05-wire-radarr"
#   type: "atomic"
#
#   # ========== FILE LOCATION ==========
#   path_info:
#     file_path: "atomic/apps/prowlarr/config/05-wire-radarr.yml"
#     category: "apps"
#     subsystem: "prowlarr"
#
#   # ========== TRADITIONAL METADATA ==========
#   dependencies: ["prowlarr_deployed", "radarr_deployed"]
#   provides: ["prowlarr_radarr_wired"]
#   tags: ["prowlarr", "radarr", "integration", "wiring", "phase4"]
#   estimated_duration: 30
#   parallel_safe: false
#   idempotent: true
#   description: Register Radarr as an application in Prowlarr for indexer sync
#   requires_apps: ["prowlarr", "radarr"]
#
#   # ========== BWS STATE INTERACTION ==========
#   bws_state:
#     reads:
#       - path: "_state.apps.prowlarr.api_key"
#       - path: "_state.apps.radarr.api_key"

- name: Wire Radarr into Prowlarr
  hosts: "{{ target_hosts | default('localhost') }}"
  gather_facts: false
  become: false

  vars:
    prowlarr_namespace: "media-stack"
    app_namespace: "{{ prowlarr_namespace }}"
    # prowlarr_url: from BWS _state via Phase 4 extra-vars

  tasks:
    # ========== VALIDATE REQUIRED VARS ==========

    # ========== SKIP IF RADARR NOT INSTALLED ==========
    - name: Skip if radarr is not installed on this VM
      when: radarr_api_key is not defined
      block:
        - name: "radarr not installed — skipping prowlarr <-> radarr wiring"
          ansible.builtin.debug:
            msg: "radarr is not installed on this VM (no radarr_api_key in BWS state) — skipping wiring"
        - name: End play gracefully
          ansible.builtin.meta: end_play

    - name: Fail if prowlarr_api_key not provided
      ansible.builtin.fail:
        msg: "prowlarr_api_key must be provided via extra-vars (from BWS inventory)"
      when: prowlarr_api_key is not defined or prowlarr_api_key | length == 0

    - name: Fail if radarr_api_key not provided
      ansible.builtin.fail:
        msg: "radarr_api_key must be provided via extra-vars (from BWS inventory)"
      when: radarr_api_key is not defined or radarr_api_key | length == 0

    # ========== VERIFY PROWLARR API ==========
    - name: Verify Prowlarr API is accessible
      ansible.builtin.uri:
        url: "{{ prowlarr_url }}/api/v1/system/status"
        method: GET
        headers:
          X-Api-Key: "{{ prowlarr_api_key }}"
        return_content: false
      register: api_status
      retries: 5
      delay: 10
      until: api_status.status is defined and api_status.status == 200
      failed_when: false

    - name: Fail if Prowlarr API not accessible
      ansible.builtin.fail:
        msg: "Prowlarr API not accessible at {{ prowlarr_url }} (status: {{ api_status.status | default('no response') }}). App is installed but API unreachable."
      when: api_status.status is not defined or api_status.status != 200

    # ========== CHECK EXISTING APPLICATIONS ==========
    - name: Get existing Prowlarr applications
      ansible.builtin.uri:
        url: "{{ prowlarr_url }}/api/v1/applications"
        method: GET
        headers:
          X-Api-Key: "{{ prowlarr_api_key }}"
        status_code: 200
      register: prowlarr_apps
      changed_when: false

    - name: Check if Radarr app already exists
      ansible.builtin.set_fact:
        radarr_app_exists: >-
          {{ (prowlarr_apps.json | selectattr('name', 'equalto', 'Radarr') | list | length) > 0 }}

    # ========== ADD RADARR TO PROWLARR ==========
    - name: Add Radarr to Prowlarr
      ansible.builtin.uri:
        url: "{{ prowlarr_url }}/api/v1/applications"
        method: POST
        headers:
          X-Api-Key: "{{ prowlarr_api_key }}"
          Content-Type: "application/json"
        body_format: json
        body:
          name: "Radarr"
          syncLevel: "fullSync"
          implementation: "Radarr"
          configContract: "RadarrSettings"
          fields:
            - name: "prowlarrUrl"
              value: "{{ prowlarr_url }}"
            - name: "baseUrl"
              value: "{{ radarr_url }}"
            - name: "apiKey"
              value: "{{ radarr_api_key }}"
            - name: "syncCategories"
              value: [2000, 2030, 2040]
        status_code: [200, 201]
      register: add_radarr
      changed_when: add_radarr.status in [200, 201]
      when: not radarr_app_exists

    - name: Radarr already configured in Prowlarr
      ansible.builtin.debug:
        msg: "Radarr app already exists in Prowlarr - skipping"
      when: radarr_app_exists

    # ========== DISPLAY RESULT ==========
    - name: Display wiring result
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "Prowlarr <-> Radarr Wiring Complete"
          - "=========================================="
          - "Radarr: {{ 'Added to Prowlarr' if not radarr_app_exists else 'Already configured' }}"
          - "Sync: fullSync (categories: 2000, 2030, 2040)"
          - "=========================================="
