---
# playbook_metadata:
#   id: "atomic/apps/prowlarr/07-wire-sabnzbd"
#   type: "atomic"
#
#   # ========== FILE LOCATION ==========
#   path_info:
#     file_path: "atomic/apps/prowlarr/config/07-wire-sabnzbd.yml"
#     category: "apps"
#     subsystem: "prowlarr"
#
#   # ========== TRADITIONAL METADATA ==========
#   dependencies: ["prowlarr_deployed", "sabnzbd_deployed"]
#   provides: ["prowlarr_sabnzbd_wired"]
#   tags: ["prowlarr", "sabnzbd", "integration", "wiring", "phase4"]
#   estimated_duration: 30
#   parallel_safe: false
#   idempotent: true
#   description: Register SABnzbd as Usenet download client in Prowlarr
#   requires_apps: ["prowlarr", "sabnzbd"]
#
#   # ========== BWS STATE INTERACTION ==========
#   bws_state:
#     reads:
#       - path: "_state.apps.prowlarr.api_key"
#       - path: "_state.apps.sabnzbd.api_key"

- name: Wire SABnzbd into Prowlarr
  hosts: "{{ target_hosts | default('localhost') }}"
  gather_facts: false
  become: false

  vars:
    prowlarr_namespace: "media-stack"
    sabnzbd_namespace: "media-stack"
    app_namespace: "{{ prowlarr_namespace }}"
    # prowlarr_url: from BWS _state via Phase 4 extra-vars

  tasks:
    # ========== VALIDATE REQUIRED VARS ==========

    # ========== SKIP IF SABNZBD NOT INSTALLED ==========
    - name: Skip if sabnzbd is not installed on this VM
      when: sabnzbd_api_key is not defined
      block:
        - name: "sabnzbd not installed — skipping prowlarr <-> sabnzbd wiring"
          ansible.builtin.debug:
            msg: "sabnzbd is not installed on this VM (no sabnzbd_api_key in BWS state) — skipping wiring"
        - name: End play gracefully
          ansible.builtin.meta: end_play

    - name: Fail if prowlarr_api_key not provided
      ansible.builtin.fail:
        msg: "prowlarr_api_key must be provided via extra-vars (from BWS inventory)"
      when: prowlarr_api_key is not defined or prowlarr_api_key | length == 0

    - name: Fail if sabnzbd_api_key not provided
      ansible.builtin.fail:
        msg: "sabnzbd_api_key must be provided via extra-vars (from BWS inventory)"
      when: sabnzbd_api_key is not defined or sabnzbd_api_key | length == 0

    # ========== VERIFY PROWLARR API ==========
    - name: Verify Prowlarr API is accessible
      ansible.builtin.uri:
        url: "{{ prowlarr_url }}/api/v1/system/status"
        method: GET
        headers:
          X-Api-Key: "{{ prowlarr_api_key }}"
        return_content: false
      register: api_status
      retries: 5
      delay: 10
      until: api_status.status is defined and api_status.status == 200
      failed_when: false

    - name: Fail if Prowlarr API not accessible
      ansible.builtin.fail:
        msg: "Prowlarr API not accessible at {{ prowlarr_url }} (status: {{ api_status.status | default('no response') }}). App is installed but API unreachable."
      when: api_status.status is not defined or api_status.status != 200

    # ========== CHECK EXISTING DOWNLOAD CLIENTS ==========
    - name: Get existing Prowlarr download clients
      ansible.builtin.uri:
        url: "{{ prowlarr_url }}/api/v1/downloadclient"
        method: GET
        headers:
          X-Api-Key: "{{ prowlarr_api_key }}"
        status_code: 200
      register: prowlarr_download_clients
      changed_when: false

    - name: Check if SABnzbd download client already exists
      ansible.builtin.set_fact:
        sabnzbd_client_exists: >-
          {{ (prowlarr_download_clients.json | selectattr('name', 'equalto', 'SABnzbd') | list | length) > 0 }}

    # ========== ADD SABNZBD AS DOWNLOAD CLIENT ==========
    - name: Add SABnzbd as download client in Prowlarr
      ansible.builtin.uri:
        url: "{{ prowlarr_url }}/api/v1/downloadclient"
        method: POST
        headers:
          X-Api-Key: "{{ prowlarr_api_key }}"
          Content-Type: "application/json"
        body_format: json
        body:
          enable: true
          protocol: "usenet"
          priority: 1
          name: "SABnzbd"
          implementation: "Sabnzbd"
          configContract: "SabnzbdSettings"
          fields:
            - name: "host"
              value: "{{ sabnzbd_service_name }}.{{ sabnzbd_namespace }}.svc.cluster.local"
            - name: "port"
              value: "{{ sabnzbd_service_port }}"
            - name: "useSsl"
              value: false
            - name: "urlBase"
              value: ""
            - name: "apiKey"
              value: "{{ sabnzbd_api_key }}"
            - name: "username"
              value: ""
            - name: "password"
              value: ""
            - name: "category"
              value: "prowlarr"
        status_code: [200, 201, 400]
        return_content: true
      register: add_sabnzbd
      changed_when: add_sabnzbd.status in [200, 201]
      when: not sabnzbd_client_exists

    - name: Fail with details if SABnzbd creation returned 400
      ansible.builtin.fail:
        msg: "Prowlarr API rejected SABnzbd download client (400): {{ add_sabnzbd.content | default('no response body') }}"
      when: not sabnzbd_client_exists and add_sabnzbd.status is defined and add_sabnzbd.status == 400

    - name: SABnzbd already configured in Prowlarr
      ansible.builtin.debug:
        msg: "SABnzbd download client already exists in Prowlarr - skipping"
      when: sabnzbd_client_exists

    # ========== DISPLAY RESULT ==========
    - name: Display wiring result
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "Prowlarr <-> SABnzbd Wiring Complete"
          - "=========================================="
          - "Download client: SABnzbd ({{ 'Added to Prowlarr' if not sabnzbd_client_exists else 'Already configured' }})"
          - "Category mappings: tv-sonarr (5000,5030,5040), movies-radarr (2000,2030,2040)"
          - "=========================================="
