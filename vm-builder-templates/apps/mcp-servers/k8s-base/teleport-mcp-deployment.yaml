---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: teleport-mcp
  namespace: mcp-servers
  labels:
    app.kubernetes.io/name: teleport-mcp
    app.kubernetes.io/component: ai-operations
    app.kubernetes.io/part-of: golden-master
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: teleport-mcp
      app.kubernetes.io/component: ai-operations
  template:
    metadata:
      labels:
        app.kubernetes.io/name: teleport-mcp
        app.kubernetes.io/component: ai-operations
        app.kubernetes.io/part-of: golden-master
    spec:
      containers:
        - name: teleport-mcp
          image: ghcr.io/mightymorgs/teleport-mcp:v1.0.0
          imagePullPolicy: Always
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
          env:
            - name: TELEPORT_PROXY
              value: "teleport.teleport.svc.cluster.local:3080"
            - name: TELEPORT_IDENTITY_FILE
              value: "/etc/teleport/identity"
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          volumeMounts:
            - name: identity
              mountPath: /etc/teleport
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: identity
          secret:
            secretName: teleport-mcp-identity
