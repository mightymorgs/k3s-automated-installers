- name: Verify MCP Servers Health
  hosts: "{{ target_hosts | default('localhost') }}"
  gather_facts: false
  become: false

  vars:
    mcp_namespace: mcp-tools
    mcp_servers:
      - name: vault-mcp
        port: 8080
        type: deployment
      - name: awx-mcp
        port: 8080
        type: deployment
      - name: teleport-mcp
        port: 8080
        type: deployment
      - name: k8s-rag-mcp
        port: 8080
        type: deployment

    # Global timeout constants
    health_probe_timeout_seconds: 5
    retry_interval_seconds: 10

  tasks:
    # ========== 1. CHECK INDIVIDUAL MCP SERVER DEPLOYMENTS ==========
    - name: Check Vault MCP Server ready replicas
      ansible.builtin.command: >-
        kubectl get deployment vault-mcp -n {{ mcp_namespace }}
        -o jsonpath='{.status.readyReplicas}'
      register: vault_mcp
      changed_when: false
      retries: 3
      delay: "{{ retry_interval_seconds }}"
      until: vault_mcp.rc == 0 and vault_mcp.stdout not in ['', '0']

    - name: Check AWX MCP Server ready replicas
      ansible.builtin.command: >-
        kubectl get deployment awx-mcp -n {{ mcp_namespace }}
        -o jsonpath='{.status.readyReplicas}'
      register: awx_mcp
      changed_when: false
      retries: 3
      delay: "{{ retry_interval_seconds }}"
      until: awx_mcp.rc == 0 and awx_mcp.stdout not in ['', '0']

    - name: Check Teleport MCP Server ready replicas
      ansible.builtin.command: >-
        kubectl get deployment teleport-mcp -n {{ mcp_namespace }}
        -o jsonpath='{.status.readyReplicas}'
      register: teleport_mcp
      changed_when: false
      retries: 3
      delay: "{{ retry_interval_seconds }}"
      until: teleport_mcp.rc == 0 and teleport_mcp.stdout not in ['', '0']

    - name: Check K8s RAG MCP Server ready replicas
      ansible.builtin.command: >-
        kubectl get deployment k8s-rag-mcp -n {{ mcp_namespace }}
        -o jsonpath='{.status.readyReplicas}'
      register: k8s_rag_mcp
      changed_when: false
      retries: 3
      delay: "{{ retry_interval_seconds }}"
      until: k8s_rag_mcp.rc == 0 and k8s_rag_mcp.stdout not in ['', '0']

    # ========== 2. VERIFY ALL MCP SERVERS RUNNING ==========
    - name: Verify all MCP Servers are running
      ansible.builtin.assert:
        that:
          - vault_mcp.rc == 0 and vault_mcp.stdout not in ['', '0']
          - awx_mcp.rc == 0 and awx_mcp.stdout not in ['', '0']
          - teleport_mcp.rc == 0 and teleport_mcp.stdout not in ['', '0']
          - k8s_rag_mcp.rc == 0 and k8s_rag_mcp.stdout not in ['', '0']
        fail_msg: "One or more MCP Servers are not running"
        success_msg: "All MCP Servers are running"

    # ========== 3. BUILD STATUS SUMMARY ==========
    - name: Build MCP status summary
      ansible.builtin.set_fact:
        mcp_status:
          vault_mcp: "{{ vault_mcp.stdout }} replicas ready"
          awx_mcp: "{{ awx_mcp.stdout }} replicas ready"
          teleport_mcp: "{{ teleport_mcp.stdout }} replicas ready"
          k8s_rag_mcp: "{{ k8s_rag_mcp.stdout }} replicas ready"

    # ========== 4. DISPLAY VERIFICATION SUMMARY ==========
    - name: Display MCP verification results
      ansible.builtin.debug:
        msg:
          - "========== MCP Servers Verification =========="
          - "Status: HEALTHY"
          - "Namespace: {{ mcp_namespace }}"
          - ""
          - "MCP Server Status:"
          - "  Vault MCP Server: {{ mcp_status.vault_mcp }}"
          - "  AWX MCP Server: {{ mcp_status.awx_mcp }}"
          - "  Teleport MCP Server: {{ mcp_status.teleport_mcp }}"
          - "  K8s RAG MCP Server: {{ mcp_status.k8s_rag_mcp }}"
          - ""
          - "MCP Capabilities:"
          - "  - Vault: Secret management, credential rotation"
          - "  - AWX: Job template execution, inventory queries"
          - "  - Teleport: Access management, session recording"
          - "  - K8s RAG: Semantic search over cluster state"
          - ""
          - "AI Agent Integration:"
          - "  Connect via SSE endpoint on each MCP server"
          - "  Example: http://vault-mcp-server.mcp-tools.svc:8080/sse"
