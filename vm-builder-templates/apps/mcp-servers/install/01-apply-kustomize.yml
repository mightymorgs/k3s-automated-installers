- name: Deploy MCP Servers
  hosts: "{{ target_hosts | default('localhost') }}"
  gather_facts: true
  become: false

  vars:
    mcp_namespace: mcp-servers
    templates_dir: "{{ playbook_dir }}/../templates"
    render_dir: /tmp/mcp-servers-manifests
    kubectl_action: "{{ 'replace --force' if install_mode | default('rebuild') == 'full' else 'apply' }}"

    # Global timeout constants
    app_start_timeout_seconds: 600
    retry_interval_seconds: 10
    health_probe_timeout_seconds: 5

    # List of all J2 templates to render (namespace excluded — handled by "Ensure namespace exists" task)
    mcp_templates:
      - vault-mcp-deployment.yaml.j2
      - vault-mcp-service.yaml.j2
      - awx-mcp-deployment.yaml.j2
      - awx-mcp-service.yaml.j2
      - teleport-mcp-deployment.yaml.j2
      - teleport-mcp-service.yaml.j2
      - k8s-rag-mcp-deployment.yaml.j2
      - k8s-rag-mcp-service.yaml.j2
    # Deployments to wait on (label selector uses app.kubernetes.io/name)
    mcp_deployments:
      - name: vault-mcp
        label: vault-mcp
      - name: awx-mcp
        label: awx-mcp
      - name: teleport-mcp
        label: teleport-mcp
      - name: k8s-rag-mcp
        label: k8s-rag-mcp

  tasks:
    - name: Verify kubectl is available
      ansible.builtin.command: kubectl version --client
      register: kubectl_check
      changed_when: false

    - name: Verify K3s cluster is accessible
      ansible.builtin.command: kubectl get nodes
      register: nodes_check
      changed_when: false
      retries: 5
      delay: 10
      until: nodes_check.rc == 0

    - name: Create render directory
      ansible.builtin.file:
        path: "{{ render_dir }}"
        state: directory
        mode: '0755'

    - name: Render all J2 templates
      ansible.builtin.template:
        src: "{{ templates_dir }}/{{ item }}"
        dest: "{{ render_dir }}/{{ item | replace('.j2', '') }}"
        mode: '0644'
      loop: "{{ mcp_templates }}"

    - name: Ensure namespace exists
      ansible.builtin.shell: |
        kubectl create namespace {{ mcp_namespace }} --dry-run=client -o yaml | kubectl apply -f -
      register: ns_apply
      changed_when: "'created' in ns_apply.stdout or 'configured' in ns_apply.stdout"

    # Split-apply: protected kinds always use kubectl apply (never replace --force).
    # Prevents namespace cascade deletion and secret rotation on rebuild.
    - name: Apply protected resources (Namespace, Secret, PVC, PushSecret)
      ansible.builtin.shell: |
        for f in {{ render_dir }}/*.yaml; do
          kind=$(grep -m1 '^kind:' "$f" 2>/dev/null | awk '{print $2}')
          case "$kind" in
            Namespace|Secret|PersistentVolumeClaim|PushSecret|ClusterRole|ClusterRoleBinding)
              kubectl apply -f "$f" 2>&1 && echo "[APPLIED] $f"
              ;;
          esac
        done
      register: protected_apply
      changed_when: "'created' in protected_apply.stdout or 'configured' in protected_apply.stdout"

    - name: Apply workload resources
      ansible.builtin.shell: |
        for f in {{ render_dir }}/*.yaml; do
          kind=$(grep -m1 '^kind:' "$f" 2>/dev/null | awk '{print $2}')
          case "$kind" in
            Namespace|Secret|PersistentVolumeClaim|PushSecret|ClusterRole|ClusterRoleBinding)
              ;;  # already applied above
            *)
              kubectl {{ kubectl_action }} -f "$f" 2>&1 && echo "[APPLIED] $f"
              ;;
          esac
        done
      register: workload_apply
      changed_when: "'created' in workload_apply.stdout or 'configured' in workload_apply.stdout"

    - name: Wait for MCP deployments to be ready
      ansible.builtin.command: >-
        kubectl -n {{ mcp_namespace }} wait
        --for=condition=ready pod
        -l app.kubernetes.io/name={{ item.label }}
        --timeout=600s
      register: pod_wait
      changed_when: false
      failed_when: false
      retries: 3
      delay: 10
      until: pod_wait.rc == 0
      loop: "{{ mcp_deployments }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Get Tailscale IP for access URL
      ansible.builtin.command: tailscale ip -4
      register: tailscale_ip
      changed_when: false
      failed_when: false

    - name: Display deployment status
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "MCP Servers Deployed Successfully"
          - "=========================================="
          - "Namespace: {{ mcp_namespace }}"
          - ""
          - "MCP Servers Status:"
          - "  vault-mcp:    {{ 'Ready' if pod_wait.results[0].rc | default(1) == 0 else 'Not ready' }}"
          - "  awx-mcp:      {{ 'Ready' if pod_wait.results[1].rc | default(1) == 0 else 'Not ready' }}"
          - "  teleport-mcp: {{ 'Ready' if pod_wait.results[2].rc | default(1) == 0 else 'Not ready' }}"
          - "  k8s-rag-mcp:  {{ 'Ready' if pod_wait.results[3].rc | default(1) == 0 else 'Not ready' }}"
          - ""
          - "Tailscale IP: {{ tailscale_ip.stdout | default('N/A') }}"
          - "=========================================="

    - name: Clean up render directory
      ansible.builtin.file:
        path: "{{ render_dir }}"
        state: absent
