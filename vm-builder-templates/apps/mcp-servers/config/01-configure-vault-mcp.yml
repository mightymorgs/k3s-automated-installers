- name: Configure Vault MCP Server
  hosts: "{{ target_hosts | default('k3s_servers') }}"
  gather_facts: false
  become: true

  vars:
    mcp_servers_namespace: "mcp-servers"
    kubeconfig_path: /etc/rancher/k3s/k3s.yaml
    kubeconfig: "{{ kubeconfig_path | default('/etc/rancher/k3s/k3s.yaml') }}"
    mcp_namespace: "{{ mcp_servers_namespace }}"
    vault_namespace: "vault"
    bws_vault_root_token_secret: "vault/root_token"

  tasks:
    # ========================================
    # CHECK IF VAULT-MCP IS DEPLOYED
    # ========================================
    - name: Check if Vault MCP Server is deployed
      ansible.builtin.command:
        cmd: kubectl get pod -n {{ mcp_namespace }} -l app=vault-mcp
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      register: vault_mcp_check
      changed_when: false
      failed_when: false

    - name: Set Vault MCP availability fact
      ansible.builtin.set_fact:
        vault_mcp_available: "{{ vault_mcp_check.rc == 0 and vault_mcp_check.stdout | length > 0 }}"

    - name: Skip if Vault MCP Server not deployed
      ansible.builtin.debug:
        msg: "Vault MCP Server not deployed - skipping configuration"
      when: not vault_mcp_available

    - name: End play if Vault MCP Server not available
      ansible.builtin.meta: end_play
      when: not vault_mcp_available

    - name: Retrieve Vault root token from BWS
      ansible.builtin.command:
        cmd: bws secret get "{{ bws_vault_root_token_secret }}" --output json
      environment:
        BWS_ACCESS_TOKEN: "{{ lookup('env', 'BWS_ACCESS_TOKEN') }}"
      register: bws_vault_token
      changed_when: false
      no_log: true

    - name: Parse Vault token
      ansible.builtin.set_fact:
        vault_token: "{{ (bws_vault_token.stdout | from_json).value }}"
      no_log: true

    - name: Create MCP Vault credentials secret
      ansible.builtin.command:
        cmd: >-
          kubectl apply -f -
        stdin: |
          apiVersion: v1
          kind: Secret
          metadata:
            name: vault-mcp-credentials
            namespace: {{ mcp_namespace }}
          type: Opaque
          stringData:
            VAULT_ADDR: "{{ vault_url }}"
            VAULT_TOKEN: "{{ vault_token }}"
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: vault_creds_result
      changed_when: "'created' in vault_creds_result.stdout or 'configured' in vault_creds_result.stdout"
      no_log: true

    - name: Restart Vault MCP Server to pick up credentials
      ansible.builtin.shell: |
        kubectl rollout restart deployment/vault-mcp-server -n {{ mcp_namespace }}
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      register: restart_result
      changed_when: true

    - name: Wait for Vault MCP Server to be ready
      ansible.builtin.shell: |
        kubectl get deployment vault-mcp-server -n {{ mcp_namespace }} -o json
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: vault_mcp
      retries: 30
      delay: 10
      until:
        - vault_mcp.rc == 0
        - (vault_mcp.stdout | from_json).status.readyReplicas | default(0) > 0
      changed_when: false

    - name: Display Vault MCP configuration status
      ansible.builtin.debug:
        msg:
          - "Vault MCP Server configured successfully"
          - "Namespace: {{ mcp_namespace }}"
          - "Vault Address: {{ vault_url }}"
          - "Status: Ready"
