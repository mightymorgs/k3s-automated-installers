---
- name: Uninstall MCP Servers
  hosts: "{{ target_hosts | default('localhost') }}"
  gather_facts: false
  become: false

  vars:
    app_name: mcp-servers
    app_namespace: "mcp-servers"
    delete_pvc: false

  tasks:
    - name: Check namespace exists
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Namespace
        name: "{{ app_namespace }}"
      register: ns_check

    - name: Skip if namespace does not exist
      ansible.builtin.meta: end_play
      when: ns_check.resources | length == 0

    - name: Delete MCP server Deployments
      kubernetes.core.k8s:
        api_version: apps/v1
        kind: Deployment
        name: "{{ item }}"
        namespace: "{{ app_namespace }}"
        state: absent
        wait: true
        wait_timeout: 120
      loop:
        - awx-mcp
        - k8s-rag-mcp
        - teleport-mcp
        - vault-mcp

    - name: Delete MCP server Services
      kubernetes.core.k8s:
        api_version: v1
        kind: Service
        name: "{{ item }}"
        namespace: "{{ app_namespace }}"
        state: absent
      loop:
        - awx-mcp
        - k8s-rag-mcp
        - teleport-mcp
        - vault-mcp

    - name: Verify removal
      kubernetes.core.k8s_info:
        api_version: apps/v1
        kind: Deployment
        namespace: "{{ app_namespace }}"
      register: verify
      failed_when: verify.resources | length > 0
