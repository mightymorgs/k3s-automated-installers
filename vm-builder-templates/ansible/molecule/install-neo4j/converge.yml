---
- name: "Create Kind cluster"
  ansible.builtin.import_playbook: ../shared/create-kind.yml

- name: "Prepare namespaces"
  ansible.builtin.import_playbook: ../shared/prepare-namespaces.yml

- name: "Ensure neo4j namespace"
  hosts: localhost
  gather_facts: false
  environment:
    KUBECONFIG: /tmp/molecule-kubeconfig
  tasks:
    - name: Create neo4j namespace
      ansible.builtin.shell: >-
        kubectl create namespace neo4j --dry-run=client -o yaml | kubectl apply -f -
      changed_when: false

- name: "Deploy neo4j"
  ansible.builtin.import_playbook: ../../../apps/neo4j/install/01-deploy.yml
