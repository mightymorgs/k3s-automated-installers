---
- name: "Create Kind cluster"
  ansible.builtin.import_playbook: ../shared/create-kind.yml

- name: "Prepare namespaces"
  ansible.builtin.import_playbook: ../shared/prepare-namespaces.yml

- name: "Ensure kibana namespace"
  hosts: localhost
  gather_facts: false
  environment:
    KUBECONFIG: /tmp/molecule-kubeconfig
  tasks:
    - name: Create kibana namespace
      ansible.builtin.shell: >-
        kubectl create namespace kibana --dry-run=client -o yaml | kubectl apply -f -
      changed_when: false

- name: "Deploy kibana"
  ansible.builtin.import_playbook: ../../../apps/kibana/install/01-deploy.yml
