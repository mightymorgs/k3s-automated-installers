---
dependency:
  name: galaxy
  options:
    requirements-file: molecule/requirements.yml
driver:
  name: default
  options:
    managed: false
platforms:
  - name: localhost
provisioner:
  name: ansible
  config_options:
    defaults:
      gathering: explicit
  inventory:
    hosts:
      all:
        hosts:
          localhost:
            ansible_connection: local
verifier:
  name: ansible
