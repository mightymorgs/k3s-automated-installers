---
- name: "Create Kind cluster"
  ansible.builtin.import_playbook: ../shared/create-kind.yml

- name: "Prepare namespaces"
  ansible.builtin.import_playbook: ../shared/prepare-namespaces.yml

- name: "Ensure cloudflare namespace"
  hosts: localhost
  gather_facts: false
  environment:
    KUBECONFIG: /tmp/molecule-kubeconfig
  tasks:
    - name: Create cloudflare namespace
      ansible.builtin.shell: >-
        kubectl create namespace cloudflare-system --dry-run=client -o yaml | kubectl apply -f -
      changed_when: false

- name: "Deploy cloudflare"
  ansible.builtin.import_playbook: ../../../apps/cloudflare/install/01-deploy-tunnel.yml
