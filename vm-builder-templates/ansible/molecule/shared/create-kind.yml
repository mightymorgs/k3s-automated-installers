---
- name: Create Kind cluster for Molecule testing
  hosts: localhost
  gather_facts: false
  vars:
    kind_cluster_name: "molecule-test"
  tasks:
    - name: Check if Kind is installed
      ansible.builtin.command: kind version
      register: kind_version
      changed_when: false
      failed_when: kind_version.rc != 0

    - name: Check if cluster already exists
      ansible.builtin.command: kind get clusters
      register: existing_clusters
      changed_when: false

    - name: Create Kind cluster
      ansible.builtin.command: >-
        kind create cluster
        --name {{ kind_cluster_name }}
        --wait 60s
      when: kind_cluster_name not in existing_clusters.stdout_lines
      register: kind_create
      changed_when: kind_create.rc == 0

    - name: Set KUBECONFIG for Kind
      ansible.builtin.command: kind get kubeconfig --name {{ kind_cluster_name }}
      register: kubeconfig_raw
      changed_when: false

    - name: Write kubeconfig to temp file
      ansible.builtin.copy:
        content: "{{ kubeconfig_raw.stdout }}"
        dest: "/tmp/molecule-kubeconfig"
        mode: "0600"

    - name: Verify cluster is ready
      ansible.builtin.command: kubectl --kubeconfig /tmp/molecule-kubeconfig get nodes
      register: nodes
      changed_when: false
      retries: 5
      delay: 5
      until: nodes.rc == 0
