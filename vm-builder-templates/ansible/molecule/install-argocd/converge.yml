---
- name: "Create Kind cluster"
  ansible.builtin.import_playbook: ../shared/create-kind.yml

- name: "Prepare namespaces"
  ansible.builtin.import_playbook: ../shared/prepare-namespaces.yml

- name: "Ensure argocd namespace"
  hosts: localhost
  gather_facts: false
  environment:
    KUBECONFIG: /tmp/molecule-kubeconfig
  tasks:
    - name: Create argocd namespace
      ansible.builtin.shell: >-
        kubectl create namespace argocd --dry-run=client -o yaml | kubectl apply -f -
      changed_when: false

- name: "Deploy argocd"
  ansible.builtin.import_playbook: ../../../apps/argocd/install/01-apply-kustomize.yml
