---
- name: "Create Kind cluster"
  ansible.builtin.import_playbook: ../shared/create-kind.yml

- name: "Prepare namespaces"
  ansible.builtin.import_playbook: ../shared/prepare-namespaces.yml

- name: "Ensure tailscale-operator namespace"
  hosts: localhost
  gather_facts: false
  environment:
    KUBECONFIG: /tmp/molecule-kubeconfig
  tasks:
    - name: Create tailscale-operator namespace
      ansible.builtin.shell: >-
        kubectl create namespace tailscale --dry-run=client -o yaml | kubectl apply -f -
      changed_when: false

- name: "Deploy tailscale-operator"
  ansible.builtin.import_playbook: ../../../apps/tailscale-operator/install/01-deploy.yml
