---
- name: "Create Kind cluster"
  ansible.builtin.import_playbook: ../shared/create-kind.yml

- name: "Prepare namespaces"
  ansible.builtin.import_playbook: ../shared/prepare-namespaces.yml

- name: "Ensure traefik namespace"
  hosts: localhost
  gather_facts: false
  environment:
    KUBECONFIG: /tmp/molecule-kubeconfig
  tasks:
    - name: Create traefik namespace
      ansible.builtin.shell: >-
        kubectl create namespace traefik --dry-run=client -o yaml | kubectl apply -f -
      changed_when: false

- name: "Deploy traefik"
  ansible.builtin.import_playbook: ../../../apps/traefik/install/01-deploy.yml
