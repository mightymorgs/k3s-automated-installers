---
dependency:
  name: galaxy
  options:
    requirements-file: molecule/requirements.yml
driver:
  name: default
  options:
    managed: false
platforms:
  - name: localhost
provisioner:
  name: ansible
  config_options:
    defaults:
      gathering: explicit
  options:
    extra-vars: "@../fixtures/per-app/config-vault.json"
  env:
    KUBECONFIG: /tmp/molecule-kubeconfig
  inventory:
    hosts:
      all:
        hosts:
          localhost:
            ansible_connection: local
            target_hosts: localhost
            install_mode: rebuild
            kubectl_action: apply
scenario:
  create_sequence:
    - create
    - prepare
  converge_sequence:
    - converge
  destroy_sequence:
    - destroy
  test_sequence:
    - dependency
    - create
    - prepare
    - converge
    - idempotence
    - verify
    - destroy
verifier:
  name: ansible
