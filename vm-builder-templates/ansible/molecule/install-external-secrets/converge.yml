---
- name: "Create Kind cluster"
  ansible.builtin.import_playbook: ../shared/create-kind.yml

- name: "Prepare namespaces"
  ansible.builtin.import_playbook: ../shared/prepare-namespaces.yml

- name: "Ensure external-secrets namespace"
  hosts: localhost
  gather_facts: false
  environment:
    KUBECONFIG: /tmp/molecule-kubeconfig
  tasks:
    - name: Create external-secrets namespace
      ansible.builtin.shell: >-
        kubectl create namespace external-secrets --dry-run=client -o yaml | kubectl apply -f -
      changed_when: false

- name: "Deploy external-secrets"
  ansible.builtin.import_playbook: ../../../apps/external-secrets/install/01-deploy-kubectl.yml
