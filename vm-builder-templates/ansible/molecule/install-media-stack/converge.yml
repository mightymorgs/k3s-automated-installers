---
- name: "Create Kind cluster"
  ansible.builtin.import_playbook: ../shared/create-kind.yml

- name: "Prepare namespaces"
  ansible.builtin.import_playbook: ../shared/prepare-namespaces.yml

- name: "Ensure media-stack namespace"
  hosts: localhost
  gather_facts: false
  environment:
    KUBECONFIG: /tmp/molecule-kubeconfig
  tasks:
    - name: Create media-stack namespace
      ansible.builtin.shell: >-
        kubectl create namespace media-stack --dry-run=client -o yaml | kubectl apply -f -
      changed_when: false

- name: "Deploy media-stack"
  ansible.builtin.import_playbook: ../../../apps/media-stack/install/01-apply-kustomize.yml
