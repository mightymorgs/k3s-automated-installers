---
- name: "Create Kind cluster"
  ansible.builtin.import_playbook: ../shared/create-kind.yml

- name: "Prepare namespaces"
  ansible.builtin.import_playbook: ../shared/prepare-namespaces.yml

- name: "Ensure qbittorrent namespace"
  hosts: localhost
  gather_facts: false
  environment:
    KUBECONFIG: /tmp/molecule-kubeconfig
  tasks:
    - name: Create qbittorrent namespace
      ansible.builtin.shell: >-
        kubectl create namespace media-stack --dry-run=client -o yaml | kubectl apply -f -
      changed_when: false

- name: "Deploy qbittorrent"
  ansible.builtin.import_playbook: ../../../apps/qbittorrent/install/01-deploy.yml
