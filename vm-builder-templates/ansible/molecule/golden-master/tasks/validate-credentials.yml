---
# Molecule validation: credential handling
#
# Rules checked:
#   - credentials-metadata-exists (WARNING): Install playbook has credentials: block in header
#   - non-empty-extraction-guard (CRITICAL): Extraction commands guarded against empty output
#   - config-file-content-check (WARNING): test -f paired with test -s for config file checks

# ============================================================
# DISCOVER INSTALL PLAYBOOKS
# ============================================================

- name: "Find install playbooks for {{ app_path | basename }} (credentials)"
  ansible.builtin.find:
    paths: "{{ app_path }}/install"
    patterns: "*.yml"
    file_type: file
  register: install_playbooks_for_creds

- name: "Skip — no install playbooks for {{ app_path | basename }}"
  ansible.builtin.debug:
    msg: "No install playbooks found — skipping credentials validation"
  when: install_playbooks_for_creds.files | length == 0

- name: "Validate credentials for {{ app_path | basename }}"
  when: install_playbooks_for_creds.files | length > 0
  block:

    - name: "Read install playbooks for {{ app_path | basename }} (credentials)"
      ansible.builtin.slurp:
        src: "{{ item.path }}"
      register: install_cred_contents
      loop: "{{ install_playbooks_for_creds.files }}"
      loop_control:
        label: "{{ item.path | basename }}"

    # ============================================================
    # Detect which features are present in the playbook
    # ============================================================

    - name: "Detect playbook features for {{ app_path | basename }}"
      ansible.builtin.set_fact:
        _all_content: >-
          {{ install_cred_contents.results
             | selectattr('content', 'defined')
             | map(attribute='content')
             | map('b64decode')
             | join('\n') }}

    - name: "Set feature flags for {{ app_path | basename }}"
      ansible.builtin.set_fact:
        has_secrets: >-
          {{ 'kind: Secret' in _all_content
             or 'kubectl create secret' in _all_content
             or "lookup('password'" in _all_content }}
        has_credential_extraction: >-
          {{ 'kubectl exec' in _all_content
             or 'config_file_path' in _all_content
             or 'extraction_command' in _all_content
             or 'credential_extraction' in _all_content }}
        has_config_file_check: >-
          {{ 'test -f' in _all_content }}

    # ================================================================
    # RULE: credentials-metadata-exists (WARNING)
    #
    # Install playbooks should have a credentials: block in the
    # playbook metadata header. This drives sync-app-state.sh
    # generically — without it, the app needs a legacy fallback
    # case in the sync script.
    #
    # Only applies to apps that handle secrets (generate, create,
    # or extract credentials).
    # ================================================================

    - name: "WARNING [credentials-metadata-exists] {{ app_path | basename }}"
      ansible.builtin.assert:
        that:
          - "'credentials:' in _all_content"
        fail_msg: >-
          {{ app_path | basename }} handles secrets but has no credentials:
          block in the install playbook metadata header. Without this block,
          sync-app-state.sh needs a legacy fallback case for this app.
          Add a credentials: block to the playbook_metadata comment.
        success_msg: "PASS: credentials metadata exists"
      when: has_secrets | bool
      register: rule_credentials_metadata
      failed_when: false

    - name: "Record credentials-metadata-exists results"
      ansible.builtin.set_fact:
        validation_results: >-
          {{ validation_results | default([]) + [{
            'app': app_path | basename,
            'rule': 'credentials-metadata-exists',
            'category': 'credentials',
            'severity': 'warning',
            'files_checked': 1 if has_secrets | bool else 0,
            'failures': 1 if (has_secrets | bool and
              rule_credentials_metadata is defined and
              rule_credentials_metadata.failed | default(false)) else 0,
            'passed': not (has_secrets | bool) or
              (rule_credentials_metadata is defined and
               not rule_credentials_metadata.failed | default(false))
          }] }}

    # ================================================================
    # RULE: non-empty-extraction-guard (CRITICAL)
    #
    # Credential extraction commands must be guarded against empty output.
    # An empty credential silently corrupts the pipeline — the K8s Secret
    # is created with an empty value, PushSecret pushes empty to Vault,
    # and sync-app-state.sh writes empty to BWS.
    #
    # Only applies to apps that extract credentials from running pods.
    # ================================================================

    - name: "CRITICAL [non-empty-extraction-guard] {{ app_path | basename }}"
      ansible.builtin.assert:
        that:
          - >-
            _all_content is search('length == 0|length > 0|Refusing|empty.*fail|fail.*empty|Guard.*empty')
        fail_msg: >-
          {{ app_path | basename }} extracts credentials but has no empty-value
          guard. Extraction commands must be followed by a fail task that checks
          the extracted value length. An empty credential corrupts the entire
          pipeline (K8s Secret -> PushSecret -> Vault -> BWS).
        success_msg: "PASS: non-empty extraction guard found"
      when: has_credential_extraction | bool
      register: rule_non_empty_guard
      failed_when: false

    - name: "Record non-empty-extraction-guard results"
      ansible.builtin.set_fact:
        validation_results: >-
          {{ validation_results | default([]) + [{
            'app': app_path | basename,
            'rule': 'non-empty-extraction-guard',
            'category': 'credentials',
            'severity': 'critical',
            'files_checked': 1 if has_credential_extraction | bool else 0,
            'failures': 1 if (has_credential_extraction | bool and
              rule_non_empty_guard is defined and
              rule_non_empty_guard.failed | default(false)) else 0,
            'passed': not (has_credential_extraction | bool) or
              (rule_non_empty_guard is defined and
               not rule_non_empty_guard.failed | default(false))
          }] }}

    # ================================================================
    # RULE: config-file-content-check (WARNING)
    #
    # When checking for config files to extract credentials from,
    # use both test -f (file exists) AND test -s (file non-empty).
    # A zero-byte config file passes test -f but contains no data,
    # leading to empty credential extraction downstream.
    #
    # Only applies to apps that use test -f for config file checks.
    # ================================================================

    - name: "WARNING [config-file-content-check] {{ app_path | basename }}"
      ansible.builtin.assert:
        that:
          - "'test -s' in _all_content"
        fail_msg: >-
          {{ app_path | basename }} uses test -f for config file checks but
          does not pair it with test -s (non-empty check). A zero-byte config
          file passes test -f but contains no data. Use:
          test -f /path/to/config && test -s /path/to/config
        success_msg: "PASS: test -s found alongside test -f"
      when: has_config_file_check | bool
      register: rule_config_file_check
      failed_when: false

    - name: "Record config-file-content-check results"
      ansible.builtin.set_fact:
        validation_results: >-
          {{ validation_results | default([]) + [{
            'app': app_path | basename,
            'rule': 'config-file-content-check',
            'category': 'credentials',
            'severity': 'warning',
            'files_checked': 1 if has_config_file_check | bool else 0,
            'failures': 1 if (has_config_file_check | bool and
              rule_config_file_check is defined and
              rule_config_file_check.failed | default(false)) else 0,
            'passed': not (has_config_file_check | bool) or
              (rule_config_file_check is defined and
               not rule_config_file_check.failed | default(false))
          }] }}
