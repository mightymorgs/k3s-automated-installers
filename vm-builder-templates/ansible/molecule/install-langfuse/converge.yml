---
- name: "Create Kind cluster"
  ansible.builtin.import_playbook: ../shared/create-kind.yml

- name: "Prepare namespaces"
  ansible.builtin.import_playbook: ../shared/prepare-namespaces.yml

- name: "Ensure langfuse namespace"
  hosts: localhost
  gather_facts: false
  environment:
    KUBECONFIG: /tmp/molecule-kubeconfig
  tasks:
    - name: Create langfuse namespace
      ansible.builtin.shell: >-
        kubectl create namespace ai-tools --dry-run=client -o yaml | kubectl apply -f -
      changed_when: false

- name: "Deploy langfuse"
  ansible.builtin.import_playbook: ../../../apps/langfuse/install/01-deploy.yml
