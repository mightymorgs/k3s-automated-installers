---
- name: "Create Kind cluster"
  ansible.builtin.import_playbook: ../shared/create-kind.yml

- name: "Prepare namespaces"
  ansible.builtin.import_playbook: ../shared/prepare-namespaces.yml

- name: "Ensure mcp-servers namespace"
  hosts: localhost
  gather_facts: false
  environment:
    KUBECONFIG: /tmp/molecule-kubeconfig
  tasks:
    - name: Create mcp-servers namespace
      ansible.builtin.shell: >-
        kubectl create namespace ai-ops --dry-run=client -o yaml | kubectl apply -f -
      changed_when: false

- name: "Deploy mcp-servers"
  ansible.builtin.import_playbook: ../../../apps/mcp-servers/install/01-apply-kustomize.yml
