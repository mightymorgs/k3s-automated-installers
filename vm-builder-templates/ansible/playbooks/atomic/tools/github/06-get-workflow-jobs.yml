- name: Get GitHub Actions workflow jobs
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    repo_name: "{{ target_repo_name | default('media-stack') }}"
    run_id: '{{ target_run_id }}'
    secrets_json_path: "{{ project_root | default(playbook_dir + '/../../../../..') }}/secrets/secrets.json"
  tasks:
    - name: Load GitHub PAT
      ansible.builtin.set_fact:
        github_pat: "{{ (lookup('file', secrets_json_path) | from_json).github.token | default('') }}"
      no_log: true
    - name: Resolve GitHub owner via API
      ansible.builtin.uri:
        url: https://api.github.com/user
        method: GET
        headers:
          Authorization: token {{ github_pat }}
          Accept: application/vnd.github+json
        return_content: true
      register: gh_user
      no_log: true
    - name: Set owner
      ansible.builtin.set_fact:
        github_owner: '{{ gh_user.json.login }}'
    - name: Fetch jobs for run
      ansible.builtin.uri:
        url: >-
          https://api.github.com/repos/{{ github_owner }}/{{ repo_name }}/actions/runs/{{
          run_id }}/jobs?per_page=10
        method: GET
        headers:
          Authorization: token {{ github_pat }}
          Accept: application/vnd.github+json
        return_content: true
      register: jobs
    - name: Display job statuses
      ansible.builtin.debug:
        msg: >-
          {{ jobs.json.jobs | map(attribute='name') | list }}
          =>
          {{ jobs.json.jobs | map(attribute='conclusion') | list }}
