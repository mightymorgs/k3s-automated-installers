#   description: Sync non-sensitive deployment references to GitHub Actions repo secrets
- name: Sync deployment references to GitHub Actions secrets
  hosts: localhost
  gather_facts: false
  vars:
    github_pat_env_env: "{{ lookup('env', 'github_pat') }}"
  tasks:
    - name: Assert GitHub PAT
      ansible.builtin.assert:
        that: [github_pat_env | length > 0]
        fail_msg: github/pat (PAT) not set
      no_log: true
    - name: Resolve GitHub owner via API
      ansible.builtin.uri:
        url: https://api.github.com/user
        method: GET
        headers:
          Authorization: token {{ github_pat_env }}
          Accept: application/vnd.github+json
        return_content: true
      register: gh_user
      no_log: true
    - name: Set owner
      ansible.builtin.set_fact:
        github_owner: '{{ gh_user.json.login }}'
    - name: Get repo public key
      ansible.builtin.uri:
        url: https://api.github.com/repos/{{ github_owner }}/{{ repo_name }}/actions/secrets/public-key
        method: GET
        headers:
          Authorization: token {{ github_pat_env }}
          Accept: application/vnd.github+json
        return_content: true
      register: pk
      no_log: true
    - name: Encrypt secret (BWS_INVENTORY_KEY)
      ansible.builtin.shell: |
        python3 - <<'PY'
        import base64, sys
        from nacl import encoding, public
        key_b64 = sys.argv[1]
        secret  = sys.argv[2]
        pk = public.PublicKey(key_b64.encode('utf-8'), encoding.Base64Encoder())
        box = public.SealedBox(pk)
        enc = box.encrypt(secret.encode('utf-8'))
        print(base64.b64encode(enc).decode('utf-8'))
        PY
        "{{ pk.json.key }}" "{{ bws_inventory_key }}"
      register: enc_bws_key
      changed_when: false
      no_log: true
    - name: PUT BWS_INVENTORY_KEY
      ansible.builtin.uri:
        url: https://api.github.com/repos/{{ github_owner }}/{{ repo_name }}/actions/secrets/BWS_INVENTORY_KEY
        method: PUT
        headers:
          Authorization: token {{ github_pat_env }}
          Accept: application/vnd.github+json
        body_format: json
        body:
          encrypted_value: '{{ enc_bws_key.stdout }}'
          key_id: '{{ pk.json.key_id }}'
      no_log: true
    - name: Encrypt secret (VAULT_SECRET_PATH)
      ansible.builtin.shell: |
        python3 - <<'PY'
        import base64, sys
        from nacl import encoding, public
        key_b64 = sys.argv[1]
        secret  = sys.argv[2]
        pk = public.PublicKey(key_b64.encode('utf-8'), encoding.Base64Encoder())
        box = public.SealedBox(pk)
        enc = box.encrypt(secret.encode('utf-8'))
        print(base64.b64encode(enc).decode('utf-8'))
        PY
        "{{ pk.json.key }}" "{{ vault_secret_path }}"
      register: enc_vault_path
      changed_when: false
      no_log: true
    - name: PUT VAULT_SECRET_PATH
      ansible.builtin.uri:
        url: https://api.github.com/repos/{{ github_owner }}/{{ repo_name }}/actions/secrets/VAULT_SECRET_PATH
        method: PUT
        headers:
          Authorization: token {{ github_pat_env }}
          Accept: application/vnd.github+json
        body_format: json
        body:
          encrypted_value: '{{ enc_vault_path.stdout }}'
          key_id: '{{ pk.json.key_id }}'
      no_log: true
    - name: Summary
      ansible.builtin.debug:
        msg: ['Synced repo secrets: BWS_INVENTORY_KEY, VAULT_SECRET_PATH']
