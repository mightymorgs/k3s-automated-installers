#       - gh-api: "2024-11-01"
#         os: "ubuntu-24.04"
#         result: "success"
#         test_date: "2025-11-13"
#         notes: "Tested with GitHub REST API v3, creates private repo via PAT from BWS or secrets.json"
#
#   # ========== TRADITIONAL METADATA ==========
#   batch_id: "20260122_v31_metadata_migration"
#   dependencies: []
#   provides: ["github_repo_created"]
#   tags: ["github", "repo", "api", "automation"]
#   estimated_duration: 20
#   parallel_safe: true
