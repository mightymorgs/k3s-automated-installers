# Following pattern from: ansible/playbooks/atomic/tools/github/02-set-actions-secret-bws-token.yml
# Uses official GitHub CLI installation method (apt repository)
- name: Install GitHub CLI
  hosts: "{{ target_hosts | default('localhost') }}"
  gather_facts: true
  become: true
  tasks:
    - name: Check if GitHub CLI is already installed
      ansible.builtin.command: gh --version
      register: gh_current_version
      changed_when: false
      failed_when: false
    - name: Set installation needed fact
      ansible.builtin.set_fact:
        gh_needs_install: '{{ gh_current_version.rc != 0 }}'
    - name: Install curl if missing
      ansible.builtin.apt:
        name: curl
        state: present
        update_cache: false
      when: gh_needs_install
    - name: Add GitHub CLI apt repository keyring
      ansible.builtin.get_url:
        url: https://cli.github.com/packages/githubcli-archive-keyring.gpg
        dest: /usr/share/keyrings/githubcli-archive-keyring.gpg
        mode: '0644'
      when: gh_needs_install
    - name: Determine architecture for apt repository
      ansible.builtin.set_fact:
        gh_arch: >-
          {{ 'amd64' if ansible_architecture == 'x86_64'
             else 'arm64' if ansible_architecture == 'aarch64'
             else ansible_architecture }}
      when: gh_needs_install
    - name: Add GitHub CLI apt repository
      ansible.builtin.apt_repository:
        repo: >-
          deb [arch={{ gh_arch }}
          signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg]
          https://cli.github.com/packages stable main
        filename: github-cli
        state: present
      when: gh_needs_install
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
      when: gh_needs_install
      changed_when: false
    - name: Install GitHub CLI package
      ansible.builtin.apt:
        name: gh
        state: present
      when: gh_needs_install
    - name: Verify GitHub CLI installation
      ansible.builtin.command: gh --version
      register: gh_verify
      changed_when: false
    - name: Display GitHub CLI version
      ansible.builtin.debug:
        msg:
          - ==========================================
          - GitHub CLI Installed Successfully
          - ==========================================
          - '{{ gh_verify.stdout_lines[0] }}'
          - ==========================================
