#       - gh: "2.x"
#         os: "ubuntu-24.04"
#         result: "success"
#         test_date: "2025-11-13"
#         notes: "Sets BWS_ACCESS_TOKEN in GitHub Actions secrets via gh CLI, idempotent (overwrites existing)"
#
#   # ========== TRADITIONAL METADATA ==========
#   batch_id: "20260122_v31_metadata_migration"
#   dependencies: ["github_repo_created"]
#   provides: ["github_actions_secret_bws_set"]
#   tags: ["github", "actions", "secrets", "bitwarden"]
#   estimated_duration: 40
#   parallel_safe: true
#   idempotent: true
#   description: Set GitHub Actions secret BWS_ACCESS_TOKEN using PAT and Bitwarden token; uses gh CLI for simplicity
- name: Set GitHub Actions secret (BWS_ACCESS_TOKEN)
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    repo_name: "{{ target_repo_name | default('media-stack') }}"
    bws_access_token: "{{ lookup('env', 'BWS_ACCESS_TOKEN') }}"
    secrets_json_path: "{{ project_root | default(playbook_dir + '/../../../../..') }}/secrets/secrets.json"
  pre_tasks:
    - name: Load Bitwarden token (fallback to secrets.json)
      ansible.builtin.set_fact:
        resolved_bws_token: >-
          {{ (bws_access_token if (bws_access_token | length > 0)
              else ((lookup('file', secrets_json_path) | from_json).bitwarden.access_token))
          | default('') }}
      no_log: true
    - name: Assert BWS token available
      ansible.builtin.assert:
        that: [resolved_bws_token | length > 0]
        fail_msg: Bitwarden access token not found in env or secrets.json
      no_log: true
    - name: Resolve GitHub PAT from Bitwarden (key ~ github + (token|pat))
      ansible.builtin.command: >-
        docker run --rm
        -e BWS_ACCESS_TOKEN={{ resolved_bws_token }}
        bitwarden/bws secret list --output json
      register: bws_list
      changed_when: false
      failed_when: false
      no_log: true
    - name: Parse GitHub PAT secret id from BWS list
      ansible.builtin.set_fact:
        github_pat_secret_id: >-
          {{ (bws_list.stdout | default('[]')) | from_json
             | selectattr('key', 'search', 'github')
             | selectattr('key', 'search', 'token|pat')
             | map(attribute='id') | first | default('') }}
      no_log: true
    - name: Fetch GitHub PAT value from Bitwarden
      ansible.builtin.command: >-
        docker run --rm
        -e BWS_ACCESS_TOKEN={{ resolved_bws_token }}
        bitwarden/bws secret get {{ github_pat_secret_id }} --output json
      register: bws_pat
      changed_when: false
      failed_when: false
      no_log: true
      when: github_pat_secret_id | length > 0
    - name: Set GitHub PAT fact from BWS or secrets.json
      ansible.builtin.set_fact:
        github_pat: >-
          {{ (bws_pat.stdout | default('') | ternary((bws_pat.stdout | from_json).value,
          ''))
              if (bws_pat is defined and bws_pat.stdout is defined and bws_pat.stdout | length > 0)
              else ((lookup('file', secrets_json_path) | from_json).github.token
          | default('')) }}
      no_log: true
    - name: Assert GitHub PAT resolved
      ansible.builtin.assert:
        that: [github_pat | length > 0]
        fail_msg: GitHub PAT not found via Bitwarden or secrets.json
      no_log: true
    - name: Resolve GitHub owner via API
      ansible.builtin.uri:
        url: https://api.github.com/user
        method: GET
        headers:
          Authorization: token {{ github_pat }}
          Accept: application/vnd.github+json
        return_content: true
      register: gh_user
      no_log: true
    - name: Set GitHub owner fact
      ansible.builtin.set_fact:
        github_owner: "{{ (gh_user.json.login | default('')) }}"
  tasks:
    - name: Install GitHub CLI if missing (Ubuntu/Debian)
      ansible.builtin.shell: |
        set -eo pipefail
        if ! command -v gh >/dev/null 2>&1; then
          type -p curl >/dev/null || sudo apt-get update
          type -p curl >/dev/null || sudo apt-get install -y curl
          curl -fsSL \
            https://cli.github.com/packages/githubcli-archive-keyring.gpg \
            | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          sudo chmod go+r \
            /usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) \
            signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] \
            https://cli.github.com/packages stable main" \
            | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          sudo apt-get update && sudo apt-get install -y gh
        fi
      args:
        executable: /bin/bash
      changed_when: false
    - name: Set Actions secret via gh CLI
      ansible.builtin.shell: |
        set -euo pipefail
        export GH_TOKEN="{{ github_pat }}"
        gh secret set BWS_ACCESS_TOKEN \
          -R "{{ github_owner }}/{{ repo_name }}" \
          -b"{{ resolved_bws_token }}"
      args:
        executable: /bin/bash
      no_log: true
      changed_when: true
  vars_files: []
  handlers: []
