#     category: "tools"
#     subsystem: "github"
#
#   # ========== VERSION COMPATIBILITY ==========
#   compatibility:
#     primary_component:
#       name: "gh-api"
#       folder_version: null
#       supported_versions: ["2020-01-01+"]
#       version_range: ">=2020-01-01"
#
#     requires:
#       os:
#         ubuntu: ">=22.04"
