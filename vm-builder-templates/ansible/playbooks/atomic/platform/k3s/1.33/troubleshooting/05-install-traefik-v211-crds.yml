#         notes: "Installs traefik.containo.us CRDs for Traefik v2.11 compatibility"
#
#   # ========== TRADITIONAL METADATA ==========
#   batch_id: "20260122_v31_metadata_migration"
#   dependencies: ["k3s_installed"]
#   provides: ["traefik_v211_crds_installed"]
#   tags: ["k3s", "traefik", "crd", "troubleshooting"]
#   estimated_duration: 60
#   parallel_safe: false
#   idempotent: true
#   description: Install Traefik v2.11 CRDs with traefik.containo.us API group
- name: Install Traefik v2.11 CRDs
  hosts: "{{ target_hosts | default('k3s_masters') }}"
  gather_facts: false
  become: false
  vars:
    traefik_crd_url: >-
      https://raw.githubusercontent.com/traefik/traefik/v2.11/docs/content/reference/dynamic-configuration/kubernetes-crd-definition-v1.yml
  tasks:
    - name: Display installation information
      ansible.builtin.debug:
        msg:
          - ==========================================
          - Installing Traefik v2.11 CRDs
          - ==========================================
          - 'Issue: Traefik v2.11 expects traefik.containo.us CRDs'
          - 'Current: traefik.io CRDs installed'
          - 'Solution: Install traefik.containo.us CRDs for v2.11'
          - 'Source: {{ traefik_crd_url }}'
          - ==========================================

    # ========== PHASE 1: Fetch kubeconfig ==========
    - name: Fetch kubeconfig from remote host
      ansible.builtin.slurp:
        src: /etc/rancher/k3s/k3s.yaml
      register: kubeconfig_raw
    - name: Save kubeconfig locally
      ansible.builtin.copy:
        content: "{{ kubeconfig_raw.content | b64decode | regex_replace('127.0.0.1', ansible_host) }}"
        dest: /tmp/media-stack-kubeconfig.yaml
        mode: '0600'
      delegate_to: localhost

    # ========== PHASE 2: Download and apply Traefik v2.11 CRDs ==========
    - name: Download Traefik v2.11 CRDs
      ansible.builtin.get_url:
        url: '{{ traefik_crd_url }}'
        dest: /tmp/traefik-v2.11-crds.yaml
        mode: '0644'
      delegate_to: localhost
    - name: Apply Traefik v2.11 CRDs
      kubernetes.core.k8s:
        state: present
        src: /tmp/traefik-v2.11-crds.yaml
        kubeconfig: /tmp/media-stack-kubeconfig.yaml
      delegate_to: localhost
      register: crd_apply

    # ========== PHASE 3: Verify CRDs ==========
    - name: Wait for CRDs to be established
      ansible.builtin.pause:
        seconds: 5
    - name: Get IngressRoute CRD (traefik.containo.us)
      kubernetes.core.k8s_info:
        api_version: apiextensions.k8s.io/v1
        kind: CustomResourceDefinition
        name: ingressroutes.traefik.containo.us
        kubeconfig: /tmp/media-stack-kubeconfig.yaml
      delegate_to: localhost
      register: ingressroute_crd
    - name: Verify CRD is installed
      ansible.builtin.assert:
        that: [ingressroute_crd.resources | length > 0]
        fail_msg: Traefik v2.11 CRDs not installed!
        success_msg: Traefik v2.11 CRDs installed ✓

    # ========== PHASE 4: Restart Traefik to pick up new CRDs ==========
    - name: Restart Traefik deployment
      kubernetes.core.k8s:
        api_version: apps/v1
        kind: Deployment
        name: traefik
        namespace: media-stack
        state: patched
        definition:
          spec:
            template:
              metadata:
                annotations:
                  kubectl.kubernetes.io/restartedAt: '{{ ansible_date_time.iso8601 }}'
        kubeconfig: /tmp/media-stack-kubeconfig.yaml
      delegate_to: localhost
    - name: Wait for Traefik to restart
      ansible.builtin.pause:
        seconds: 10
    - name: Verify Traefik pod is running
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Pod
        namespace: media-stack
        label_selectors: [app=traefik]
        kubeconfig: /tmp/media-stack-kubeconfig.yaml
      delegate_to: localhost
      register: traefik_pods
    - name: Check Traefik logs for errors
      ansible.builtin.debug:
        msg: >-
          Traefik status: >-
            {{ traefik_pods.resources[0].status.phase if traefik_pods.resources | length > 0 else 'NOT FOUND' }}

    # ========== PHASE 5: Summary ==========
    - name: Display summary
      ansible.builtin.debug:
        msg:
          - ==========================================
          - Traefik v2.11 CRDs Installed!
          - ==========================================
          - ''
          - 'CRDs now available:'
          - '  - ingressroutes.traefik.containo.us ✓'
          - '  - middlewares.traefik.containo.us ✓'
          - '  - (and other Traefik CRDs)'
          - ''
          - 'Next steps:'
          - '  1. Migrate IngressRoutes from traefik.io to traefik.containo.us'
          - '  2. Verify Traefik can discover routes'
          - ==========================================
