#   description: Fix corrupted Traefik IngressRoutes by deleting and recreating from manifests
- name: Fix Corrupted Traefik IngressRoutes
  hosts: "{{ target_hosts | default('k3s_masters') }}"
  gather_facts: false
  become: false
  vars:
    media_namespace: media-stack
    project_root: "{{ lookup('env', 'PWD') | regex_replace('/ansible$', '') }}"
    ingressroute_manifests:
      - '{{ project_root }}/k8s/media-stack/base/ingressroutes.yaml'
      - '{{ project_root }}/k8s/media-stack/base/ingressroutes-optional-apps.yaml'
  tasks:
    - name: Display troubleshooting information
      ansible.builtin.debug:
        msg:
          - ==========================================
          - Fixing Corrupted Traefik IngressRoutes
          - ==========================================
          - 'Namespace: {{ media_namespace }}'
          - 'Issue: IngressRoutes showing empty routes causing 404 errors'
          - 'Solution: Delete corrupted resources and recreate from source manifests'
          - ==========================================

    # ========== PHASE 1: Fetch kubeconfig ==========
    - name: Fetch kubeconfig from remote host
      ansible.builtin.slurp:
        src: /etc/rancher/k3s/k3s.yaml
      register: kubeconfig_raw
    - name: Save kubeconfig locally (fix server address)
      ansible.builtin.copy:
        content: "{{ kubeconfig_raw.content | b64decode | regex_replace('127.0.0.1', ansible_host) }}"
        dest: /tmp/media-stack-kubeconfig.yaml
        mode: '0600'
      delegate_to: localhost

    # ========== PHASE 2: Get current IngressRoutes ==========
    - name: Get existing IngressRoutes
      kubernetes.core.k8s_info:
        api_version: traefik.io/v1alpha1
        kind: IngressRoute
        namespace: '{{ media_namespace }}'
        kubeconfig: /tmp/media-stack-kubeconfig.yaml
      delegate_to: localhost
      register: existing_ingressroutes
    - name: Display existing IngressRoutes
      ansible.builtin.debug:
        msg: >-
          Found {{ existing_ingressroutes.resources | length }} IngressRoutes: >-
            {{ existing_ingressroutes.resources | map(attribute='metadata.name') | list }}

    # ========== PHASE 3: Delete corrupted IngressRoutes ==========
    - name: Delete all IngressRoutes in namespace
      kubernetes.core.k8s:
        api_version: traefik.io/v1alpha1
        kind: IngressRoute
        namespace: '{{ media_namespace }}'
        name: '{{ item.metadata.name }}'
        state: absent
        kubeconfig: /tmp/media-stack-kubeconfig.yaml
      delegate_to: localhost
      loop: '{{ existing_ingressroutes.resources }}'
      when: existing_ingressroutes.resources | length > 0

    # ========== PHASE 4: Recreate IngressRoutes from source manifests ==========
    - name: Check which manifest files exist
      ansible.builtin.stat:
        path: '{{ item }}'
      loop: '{{ ingressroute_manifests }}'
      register: manifest_check
      delegate_to: localhost
    - name: Load and apply IngressRoute manifests
      kubernetes.core.k8s:
        state: present
        src: '{{ item.item }}'
        kubeconfig: /tmp/media-stack-kubeconfig.yaml
      delegate_to: localhost
      loop: '{{ manifest_check.results }}'
      when: item.stat.exists
      register: ingressroute_apply

    # ========== PHASE 5: Verify IngressRoutes ==========
    - name: Get recreated IngressRoutes
      kubernetes.core.k8s_info:
        api_version: traefik.io/v1alpha1
        kind: IngressRoute
        namespace: '{{ media_namespace }}'
        kubeconfig: /tmp/media-stack-kubeconfig.yaml
      delegate_to: localhost
      register: new_ingressroutes
    - name: Verify IngressRoutes have valid routes
      ansible.builtin.assert:
        that:
          - item.spec.routes is defined
          - item.spec.routes | length > 0
          - item.spec.routes[0].match is defined
        fail_msg: IngressRoute {{ item.metadata.name }} still has corrupted routes!
        success_msg: IngressRoute {{ item.metadata.name }} is valid
      loop: '{{ new_ingressroutes.resources }}'
      loop_control:
        label: '{{ item.metadata.name }}'
    - name: Build hostname list
      ansible.builtin.set_fact:
        hostname_list: >-
          {{ new_ingressroutes.resources |
          map('combine', {'display': item.metadata.name ~ ': ' ~ item.spec.routes[0].match})
          |
          map(attribute='display') | list }}
      vars:
        item: '{{ new_ingressroutes.resources }}'
    - name: Display fix summary
      ansible.builtin.debug:
        msg:
          - ==========================================
          - IngressRoutes Fixed Successfully!
          - ==========================================
          - ''
          - 'Recreated IngressRoutes:'
          - "{{ new_ingressroutes.resources | map(attribute='metadata.name') | list }}"
          - ''
          - 'Hostnames configured:'
          - "{% for ir in new_ingressroutes.resources %}  - {{ ir.metadata.name }}:\
            \ {{ ir.spec.routes[0].match }}{% if not loop.last %}\n{% endif %}{%\
            \ endfor %}"
          - ''
          - 'Next steps:'
          - >-
            1. Test internal access:
            curl -H 'Host: sonarr.{{ domain | default("example.local") }}'
            http://{{ ansible_host }}
          - >-
            2. Test external access via Cloudflare tunnel:
            https://sonarr.{{ domain | default("example.local") }}
          - '  3. Check Traefik logs if issues persist'
          - ==========================================
