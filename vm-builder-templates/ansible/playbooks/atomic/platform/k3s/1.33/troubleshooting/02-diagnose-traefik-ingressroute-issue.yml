#         notes: "Diagnoses version/CRD compatibility when routes field becomes empty"
#
#   # ========== TRADITIONAL METADATA ==========
#   batch_id: "20260122_v31_metadata_migration"
#   dependencies: ["k3s_installed", "traefik_deployed"]
#   provides: ["traefik_diagnostics"]
#   tags: ["k3s", "traefik", "ingressroute", "troubleshooting", "diagnostics"]
#   estimated_duration: 60
#   parallel_safe: false
#   idempotent: true
#   description: Diagnose Traefik version and IngressRoute CRD compatibility issues
- name: Diagnose Traefik IngressRoute Issues
  hosts: "{{ target_hosts | default('k3s_masters') }}"
  gather_facts: false
  become: false
  vars:
    media_namespace: media-stack
    project_root: "{{ lookup('env', 'PWD') | regex_replace('/ansible$', '') }}"
  tasks:
    - name: Display diagnostic information
      ansible.builtin.debug:
        msg:
          - ==========================================
          - Diagnosing Traefik IngressRoute Issues
          - ==========================================
          - 'Namespace: {{ media_namespace }}'
          - 'Issue: IngressRoutes routes field becomes empty [{}]'
          - 'Goal: Identify version/CRD compatibility issues'
          - ==========================================

    # ========== PHASE 1: Fetch kubeconfig ==========
    - name: Fetch kubeconfig from remote host
      ansible.builtin.slurp:
        src: /etc/rancher/k3s/k3s.yaml
      register: kubeconfig_raw
    - name: Save kubeconfig locally
      ansible.builtin.copy:
        content: "{{ kubeconfig_raw.content | b64decode | regex_replace('127.0.0.1', ansible_host) }}"
        dest: /tmp/media-stack-kubeconfig.yaml
        mode: '0600'
      delegate_to: localhost

    # ========== PHASE 2: Get Traefik Version ==========
    - name: Get Traefik deployment
      kubernetes.core.k8s_info:
        api_version: apps/v1
        kind: Deployment
        name: traefik
        namespace: kube-system
        kubeconfig: /tmp/media-stack-kubeconfig.yaml
      delegate_to: localhost
      register: traefik_deployment
    - name: Extract Traefik image version
      ansible.builtin.set_fact:
        traefik_image: >-
          {{ traefik_deployment.resources[0].spec.template.spec.containers[0].image | default('unknown') }}
      when: traefik_deployment.resources | length > 0
    - name: Display Traefik version
      ansible.builtin.debug:
        msg: "Traefik image: {{ traefik_image | default('not found') }}"

    # ========== PHASE 3: Check CRD Version ==========
    - name: Get IngressRoute CRD
      kubernetes.core.k8s_info:
        api_version: apiextensions.k8s.io/v1
        kind: CustomResourceDefinition
        name: ingressroutes.traefik.io
        kubeconfig: /tmp/media-stack-kubeconfig.yaml
      delegate_to: localhost
      register: ingressroute_crd
    - name: Extract CRD creation date and version
      ansible.builtin.set_fact:
        crd_creation: "{{ ingressroute_crd.resources[0].metadata.creationTimestamp | default('unknown') }}"
        crd_version: "{{ ingressroute_crd.resources[0].spec.versions[0].name | default('unknown') }}"
      when: ingressroute_crd.resources | length > 0
    - name: Display CRD info
      ansible.builtin.debug:
        msg:
          - "CRD Version: {{ crd_version | default('not found') }}"
          - "CRD Created: {{ crd_creation | default('not found') }}"

    # ========== PHASE 4: Test Direct Manifest Application ==========
    - name: Create test IngressRoute with full spec
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: traefik.io/v1alpha1
          kind: IngressRoute
          metadata:
            name: test-ingressroute
            namespace: '{{ media_namespace }}'
          spec:
            entryPoints: [web]
            routes:
              - match: Host(`test.{{ domain | default('example.local') }}`)
                kind: Rule
                services:
                  - name: sonarr
                    port: 8989
        kubeconfig: /tmp/media-stack-kubeconfig.yaml
      delegate_to: localhost
      register: test_ingressroute_create
    - name: Wait 5 seconds for reconciliation
      ansible.builtin.pause:
        seconds: 5
    - name: Get test IngressRoute back
      kubernetes.core.k8s_info:
        api_version: traefik.io/v1alpha1
        kind: IngressRoute
        name: test-ingressroute
        namespace: '{{ media_namespace }}'
        kubeconfig: /tmp/media-stack-kubeconfig.yaml
      delegate_to: localhost
      register: test_ingressroute_get
    - name: Display test IngressRoute spec
      ansible.builtin.debug:
        var: test_ingressroute_get.resources[0].spec
      when: test_ingressroute_get.resources | length > 0
    - name: Check if test IngressRoute routes are corrupted
      ansible.builtin.set_fact:
        test_routes_corrupted: '{{ test_ingressroute_get.resources[0].spec.routes[0] == {} }}'
      when: test_ingressroute_get.resources | length > 0

    # ========== PHASE 5: Compare with working IngressRoute ==========
    - name: Get Traefik dashboard IngressRoute (should be working)
      kubernetes.core.k8s_info:
        api_version: traefik.io/v1alpha1
        kind: IngressRoute
        name: traefik-dashboard
        namespace: kube-system
        kubeconfig: /tmp/media-stack-kubeconfig.yaml
      delegate_to: localhost
      register: traefik_dashboard_ir
      failed_when: false
    - name: Display traefik-dashboard IngressRoute if exists
      ansible.builtin.debug:
        var: traefik_dashboard_ir.resources[0].spec
      when:
        - traefik_dashboard_ir.resources is defined
        - traefik_dashboard_ir.resources | length > 0

    # ========== PHASE 6: Get all IngressRoutes for comparison ==========
    - name: Get all IngressRoutes in cluster
      kubernetes.core.k8s_info:
        api_version: traefik.io/v1alpha1
        kind: IngressRoute
        kubeconfig: /tmp/media-stack-kubeconfig.yaml
      delegate_to: localhost
      register: all_ingressroutes
    - name: Analyze all IngressRoutes
      ansible.builtin.debug:
        msg:
          - 'IngressRoute: {{ item.metadata.name }} ({{ item.metadata.namespace }})'
          - '  Routes: {{ item.spec.routes }}'
          - "  Corrupted: {{ item.spec.routes[0] == {} if item.spec.routes | length > 0 else 'no routes' }}"
      loop: '{{ all_ingressroutes.resources }}'
      loop_control:
        label: '{{ item.metadata.name }}'

    # ========== PHASE 7: Cleanup test resource ==========
    - name: Delete test IngressRoute
      kubernetes.core.k8s:
        api_version: traefik.io/v1alpha1
        kind: IngressRoute
        name: test-ingressroute
        namespace: '{{ media_namespace }}'
        state: absent
        kubeconfig: /tmp/media-stack-kubeconfig.yaml
      delegate_to: localhost

    # ========== PHASE 8: Summary ==========
    - name: Display diagnostic summary
      ansible.builtin.debug:
        msg:
          - ==========================================
          - Traefik Diagnostic Summary
          - ==========================================
          - ''
          - "Traefik Version: {{ traefik_image | default('not found') }}"
          - "IngressRoute CRD Version: {{ crd_version | default('not found') }}"
          - "CRD Created: {{ crd_creation | default('not found') }}"
          - ''
          - "Test IngressRoute Routes Corrupted: {{ test_routes_corrupted | default('unknown') }}"
          - ''
          - 'Total IngressRoutes in cluster: {{ all_ingressroutes.resources | length }}'
          - ''
          - 'Next Steps:'
          - '  1. If test IngressRoute also corrupted → CRD/Traefik version issue'
          - '  2. If test IngressRoute OK → Manifest format issue'
          - '  3. Check if any working IngressRoutes exist for syntax comparison'
          - ==========================================
