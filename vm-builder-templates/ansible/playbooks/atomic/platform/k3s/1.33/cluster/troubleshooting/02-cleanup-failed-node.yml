- name: Cleanup failed node registration
  hosts: k3s_masters
  gather_facts: false
  become: false
  vars:
    failed_node_name: k3s-automation-test-worker
  tasks:
    - name: Check if node exists in cluster
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Node
        name: '{{ failed_node_name }}'
        kubeconfig: /etc/rancher/k3s/k3s.yaml
      register: node_check
      failed_when: false
    - name: Delete failed node from cluster
      kubernetes.core.k8s:
        api_version: v1
        kind: Node
        name: '{{ failed_node_name }}'
        state: absent
        kubeconfig: /etc/rancher/k3s/k3s.yaml
      when: node_check.resources | length > 0
    - name: Display cleanup status
      ansible.builtin.debug:
        msg:
          - ==========================================
          - Node cleanup complete
          - '==========================================  '
          - >-
            Node {{ failed_node_name }}
            {{ 'deleted' if node_check.resources | length > 0
            else 'not found (already clean)' }}
          - ==========================================
- name: Stop K3s agent and clean worker state
  hosts: k3s_workers
  gather_facts: false
  become: true
  tasks:
    - name: Stop K3s agent service
      ansible.builtin.systemd:
        name: k3s-agent
        state: stopped
      ignore_errors: true
    - name: Remove K3s agent data directory
      ansible.builtin.file:
        path: /var/lib/rancher/k3s/agent
        state: absent
    - name: Remove node password file
      ansible.builtin.file:
        path: /etc/rancher/node/password
        state: absent
    - name: Display worker cleanup status
      ansible.builtin.debug:
        msg:
          - ==========================================
          - Worker node state cleaned
          - ==========================================
          - 'Removed:'
          - '  - K3s agent data'
          - '  - Node password file'
          - ==========================================
          - Worker is ready for clean rejoin
          - ==========================================
