#   description: Extract K3s join token from master node
- name: Extract K3s join token from master node
  hosts: k3s_masters
  gather_facts: false
  become: true
  tasks:
    - name: Ensure K3s server is running
      ansible.builtin.systemd:
        name: k3s
        state: started
        enabled: true
    - name: Wait for K3s node-token file to exist
      ansible.builtin.wait_for:
        path: /var/lib/rancher/k3s/server/node-token
        timeout: 60
    - name: Read K3s join token
      ansible.builtin.slurp:
        src: /var/lib/rancher/k3s/server/node-token
      register: k3s_token_raw
    - name: Parse K3s token
      ansible.builtin.set_fact:
        k3s_join_token: '{{ k3s_token_raw.content | b64decode | trim }}'
    - name: Display token extraction confirmation
      ansible.builtin.debug:
        msg:
          - K3s join token extracted successfully
          - 'Master URL: https://{{ ansible_default_ipv4.address }}:6443'
          - 'Token length: {{ k3s_join_token | length }} characters'
    - name: Share token with localhost for worker nodes
      ansible.builtin.set_fact:
        k3s_master_url: https://{{ ansible_default_ipv4.address }}:6443
        k3s_master_token: '{{ k3s_join_token }}'
      delegate_to: localhost
      delegate_facts: true
      run_once: true
