#   description: Configure CoreDNS with custom DNS entries from ConfigMap
- name: Configure CoreDNS Custom DNS Entries
  hosts: "{{ target_hosts | default('k3s_masters') }}"
  gather_facts: false
  become: false
  vars:
    coredns_configmap_path: >-
      {{ configmap_path | default(project_root + '/k8s/media-stack/base/coredns-configmap.yaml') }}
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  tasks:
    - name: Display CoreDNS configuration information
      ansible.builtin.debug:
        msg:
          - ==========================================
          - Configuring CoreDNS Custom DNS
          - ==========================================
          - 'ConfigMap: {{ coredns_configmap_path }}'
          - 'Purpose: Custom domain resolution for services'
          - ==========================================
    - name: Copy CoreDNS ConfigMap to master node
      ansible.builtin.copy:
        src: '{{ coredns_configmap_path }}'
        dest: /tmp/coredns-custom.yaml
        mode: '0644'
    - name: Apply CoreDNS custom ConfigMap
      ansible.builtin.command: kubectl apply -f /tmp/coredns-custom.yaml
      register: coredns_apply
      changed_when: "'created' in coredns_apply.stdout or 'configured' in coredns_apply.stdout"
    - name: Restart CoreDNS deployment
      ansible.builtin.command: kubectl rollout restart deployment coredns -n kube-system
      when: coredns_apply is changed
      register: coredns_restart
      changed_when: true
    - name: Wait for CoreDNS to be ready
      ansible.builtin.command: kubectl rollout status deployment coredns -n kube-system
        --timeout=2m
      when: coredns_apply is changed
      changed_when: false
    - name: Display configuration summary
      ansible.builtin.debug:
        msg:
          - ==========================================
          - CoreDNS Custom DNS Configured
          - ==========================================
          - "Status: {{ 'Updated' if coredns_apply is changed else 'Already configured' }}"
          - ''
          - 'Verify DNS resolution from cluster:'
          - '  kubectl run dns-test --rm -i --restart=Never --image=busybox -- nslookup
            <your-domain>'
          - ==========================================
