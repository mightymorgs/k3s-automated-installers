#         test_date: "2025-11-10"
#         notes: "Updates Traefik deployment and service to expose port 443"
#
#   # ========== TRADITIONAL METADATA ==========
#   batch_id: "20260122_v31_metadata_migration"
#   dependencies: ["k3s_installed", "traefik_deployed"]
#   provides: ["traefik_websecure_enabled"]
#   tags: ["k3s", "traefik", "https", "websecure", "update"]
#   estimated_duration: 120
#   parallel_safe: false
#   idempotent: true
#   description: Update Traefik deployment and service to add websecure (port 443) entrypoint
- name: Update Traefik for Websecure Entrypoint
  hosts: "{{ target_hosts | default('k3s_masters') }}"
  gather_facts: false
  become: false
  vars:
    media_namespace: media-stack
    project_root: "{{ lookup('env', 'PWD') | regex_replace('/ansible$', '') }}"
  tasks:
    - name: Display update information
      ansible.builtin.debug:
        msg:
          - ==========================================
          - Updating Traefik for HTTPS Support
          - ==========================================
          - 'Changes:'
          - '  - Add websecure entrypoint (port 443)'
          - '  - Update Deployment with --entrypoints.websecure.address=:443'
          - '  - Update Service to expose port 443'
          - ==========================================

    # ========== PHASE 1: Fetch kubeconfig ==========
    - name: Fetch kubeconfig from remote host
      ansible.builtin.slurp:
        src: /etc/rancher/k3s/k3s.yaml
      register: kubeconfig_raw
    - name: Save kubeconfig locally
      ansible.builtin.copy:
        content: "{{ kubeconfig_raw.content | b64decode | regex_replace('127.0.0.1', ansible_host) }}"
        dest: /tmp/media-stack-kubeconfig.yaml
        mode: '0600'
      delegate_to: localhost

    # ========== PHASE 2: Apply updated Traefik manifests ==========
    - name: Apply updated Traefik deployment
      kubernetes.core.k8s:
        state: present
        src: '{{ project_root }}/k8s/media-stack/base/traefik-deployment.yaml'
        kubeconfig: /tmp/media-stack-kubeconfig.yaml
      delegate_to: localhost
      register: traefik_deployment_result
    - name: Apply updated Traefik service
      kubernetes.core.k8s:
        state: present
        src: '{{ project_root }}/k8s/media-stack/base/traefik-service.yaml'
        kubeconfig: /tmp/media-stack-kubeconfig.yaml
      delegate_to: localhost
      register: traefik_service_result

    # ========== PHASE 3: Wait for Traefik to restart ==========
    - name: Wait for Traefik deployment to roll out
      kubernetes.core.k8s_info:
        api_version: apps/v1
        kind: Deployment
        name: traefik
        namespace: '{{ media_namespace }}'
        wait: true
        wait_condition:
          type: Progressing
          status: 'True'
          reason: NewReplicaSetAvailable
        wait_timeout: 120
        kubeconfig: /tmp/media-stack-kubeconfig.yaml
      delegate_to: localhost
    - name: Get Traefik pods
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Pod
        namespace: '{{ media_namespace }}'
        label_selectors: [app=traefik]
        kubeconfig: /tmp/media-stack-kubeconfig.yaml
      delegate_to: localhost
      register: traefik_pods
    - name: Verify Traefik pod is running
      ansible.builtin.assert:
        that:
          - traefik_pods.resources | length > 0
          - traefik_pods.resources[0].status.phase == "Running"
        fail_msg: Traefik pod is not running!
        success_msg: Traefik pod is running

    # ========== PHASE 4: Verify websecure configuration ==========
    - name: Get updated Traefik service
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Service
        name: traefik
        namespace: '{{ media_namespace }}'
        kubeconfig: /tmp/media-stack-kubeconfig.yaml
      delegate_to: localhost
      register: traefik_service
    - name: Check for websecure port
      ansible.builtin.set_fact:
        websecure_configured: >-
          {{ traefik_service.resources[0].spec.ports |
          selectattr('port', 'equalto', 443) | list | length > 0 }}
    - name: Verify websecure port is configured
      ansible.builtin.assert:
        that: [websecure_configured]
        fail_msg: Websecure port (443) not configured in service!
        success_msg: Websecure port (443) is configured ✓
    - name: Display Traefik service status
      ansible.builtin.debug:
        msg:
          - 'Service: {{ traefik_service.resources[0].metadata.name }}'
          - 'Type: {{ traefik_service.resources[0].spec.type }}'
          - "External IP: {{ traefik_service.resources[0].status.loadBalancer.ingress[0].ip | default('Pending') }}"
          - "Ports: {{ traefik_service.resources[0].spec.ports | map(attribute='port') | list }}"

    # ========== PHASE 5: Summary ==========
    - name: Display update summary
      ansible.builtin.debug:
        msg:
          - ==========================================
          - Traefik Update Complete!
          - ==========================================
          - ''
          - "Deployment: {{ 'Updated' if traefik_deployment_result.changed else 'No changes' }}"
          - "Service: {{ 'Updated' if traefik_service_result.changed else 'No changes' }}"
          - ''
          - 'Entrypoints now configured:'
          - '  - web (port 80) ✓'
          - '  - websecure (port 443) ✓'
          - ''
          - Traefik can now handle HTTPS traffic from Cloudflare Tunnel
          - ''
          - 'Next steps:'
          - '  1. Verify IngressRoutes are using websecure entrypoint'
          - '  2. Test external HTTPS access'
          - ==========================================
