#   description: Configure K3s Traefik with websecure (port 443) entrypoint for HTTPS traffic
- name: Configure Traefik Websecure Entrypoint
  hosts: "{{ target_hosts | default('k3s_masters') }}"
  gather_facts: false
  become: false
  vars:
    media_namespace: media-stack
  tasks:
    - name: Display configuration information
      ansible.builtin.debug:
        msg:
          - ==========================================
          - Configuring Traefik Websecure Entrypoint
          - ==========================================
          - 'Issue: Traefik only listening on port 80 (web)'
          - 'Solution: Add websecure entrypoint (port 443)'
          - 'Method: K3s HelmChartConfig CRD'
          - ==========================================

    # ========== PHASE 1: Fetch kubeconfig ==========
    - name: Fetch kubeconfig from remote host
      ansible.builtin.slurp:
        src: /etc/rancher/k3s/k3s.yaml
      register: kubeconfig_raw
    - name: Save kubeconfig locally
      ansible.builtin.copy:
        content: "{{ kubeconfig_raw.content | b64decode | regex_replace('127.0.0.1', ansible_host) }}"
        dest: /tmp/media-stack-kubeconfig.yaml
        mode: '0600'
      delegate_to: localhost

    # ========== PHASE 2: Create HelmChartConfig for Traefik ==========
    - name: Create/Update Traefik HelmChartConfig
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: helm.cattle.io/v1
          kind: HelmChartConfig
          metadata:
            name: traefik
            namespace: kube-system
          spec:
            valuesContent: |-
              ports:
                web:
                  port: 80
                  expose: true
                  exposedPort: 80
                websecure:
                  port: 443
                  expose: true
                  exposedPort: 443
              additionalArguments:
                - --entrypoints.web.address=:80
                - --entrypoints.websecure.address=:443
        kubeconfig: /tmp/media-stack-kubeconfig.yaml
      delegate_to: localhost
      register: helmchartconfig_result
    - name: Display HelmChartConfig status
      ansible.builtin.debug:
        msg: HelmChartConfig {{ 'created' if helmchartconfig_result.changed else 'already exists' }}

    # ========== PHASE 3: Wait for Traefik to restart ==========
    - name: Wait for Traefik to apply new configuration
      ansible.builtin.pause:
        seconds: 30
        prompt: Waiting for K3s to restart Traefik with new configuration...
    - name: Get Traefik pods
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Pod
        namespace: kube-system
        label_selectors: [app.kubernetes.io/name=traefik]
        kubeconfig: /tmp/media-stack-kubeconfig.yaml
      delegate_to: localhost
      register: traefik_pods
    - name: Display Traefik pod status
      ansible.builtin.debug:
        msg:
          - 'Traefik pods: {{ traefik_pods.resources | length }}'
          - "Status: {{ traefik_pods.resources | map(attribute='status.phase') | list }}"

    # ========== PHASE 4: Verify websecure port ==========
    - name: Get Traefik service
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Service
        name: traefik
        namespace: kube-system
        kubeconfig: /tmp/media-stack-kubeconfig.yaml
      delegate_to: localhost
      register: traefik_service
    - name: Check for websecure port
      ansible.builtin.set_fact:
        websecure_port: "{{ traefik_service.resources[0].spec.ports | selectattr('port', 'equalto', 443) | list }}"
      when: traefik_service.resources | length > 0
    - name: Verify websecure port is configured
      ansible.builtin.assert:
        that: [websecure_port is defined, websecure_port | length > 0]
        fail_msg: Websecure port (443) not found in Traefik service!
        success_msg: Websecure port (443) is configured
    - name: Display Traefik service ports
      ansible.builtin.debug:
        msg:
          - 'Traefik service ports:'
          - '{{ traefik_service.resources[0].spec.ports }}'

    # ========== PHASE 5: Summary ==========
    - name: Display configuration summary
      ansible.builtin.debug:
        msg:
          - ==========================================
          - Traefik Websecure Configuration Complete!
          - ==========================================
          - ''
          - 'Entrypoints configured:'
          - '  - web (port 80)'
          - '  - websecure (port 443) ✓'
          - ''
          - IngressRoutes can now handle HTTPS traffic from Cloudflare Tunnel
          - ''
          - 'Next steps:'
          - '  1. Verify IngressRoutes are using both web and websecure entrypoints'
          - '  2. Test external HTTPS access'
          - ==========================================
