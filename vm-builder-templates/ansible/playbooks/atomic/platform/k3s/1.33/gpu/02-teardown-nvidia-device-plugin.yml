- name: Teardown NVIDIA Device Plugin from K3s
  hosts: "{{ target_hosts | default('k3s_masters') }}"
  gather_facts: true
  become: false
  vars:
    kustomize_base: '{{ project_root }}/k8s/nvidia-device-plugin/base'
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  tasks:
    - name: Display teardown information
      ansible.builtin.debug:
        msg:
          - ==========================================
          - Tearing Down NVIDIA Device Plugin
          - ==========================================
          - This will remove GPU support from K8s
          - GPU workloads will fail to schedule after this
          - ==========================================
    - name: Sync K8s manifests to node
      ansible.posix.synchronize:
        src: '{{ project_root }}/k8s/'
        dest: /tmp/neo4j-k8s-deploy/
        delete: false
        recursive: true
    - name: Check if device plugin exists
      kubernetes.core.k8s_info:
        api_version: apps/v1
        kind: DaemonSet
        name: nvidia-device-plugin-daemonset
        namespace: kube-system
        kubeconfig: /etc/rancher/k3s/k3s.yaml
      register: plugin_check
      failed_when: false
    - name: Delete NVIDIA device plugin via Kustomize
      kubernetes.core.k8s:
        state: absent
        src: /tmp/neo4j-k8s-deploy/nvidia-device-plugin/base
        kubeconfig: /etc/rancher/k3s/k3s.yaml
      register: plugin_delete
      when: plugin_check.resources | length > 0
    - name: Display teardown summary
      ansible.builtin.debug:
        msg:
          - ==========================================
          - NVIDIA Device Plugin Teardown Complete
          - ==========================================
          - "DaemonSet: {{ 'Deleted' if plugin_check.resources | length > 0 else 'Not found' }}"
          - 'GPU Support: Removed from K8s'
          - ''
          - 'Note: NVIDIA Container Toolkit still installed'
          - 'Note: NVIDIA drivers still present'
          - ==========================================
