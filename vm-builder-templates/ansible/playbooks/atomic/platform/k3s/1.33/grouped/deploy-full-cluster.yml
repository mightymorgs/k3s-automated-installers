# ============================================================================
# GROUPED PLAYBOOK: Deploy Complete K3s Cluster
# ============================================================================
# Orchestrates atomic playbooks to deploy a full K3s cluster with tools
#
# Steps:
#   1. Install K3s server on master
#   2. Install Helm
#   3. Install Longhorn storage
#   4. Join worker nodes (if applicable)
#
# Usage:
#   ansible-playbook -i inventory/hosts.ini \
#     atomic/platform/k3s/1.33/grouped/deploy-full-cluster.yml
# ============================================================================
- name: 'Step 1: Install K3s on master node'
  ansible.builtin.import_playbook: ../server/01-install.yml
- name: 'Step 2: Install Helm package manager'
  ansible.builtin.import_playbook: ../tools/01-install-helm.yml
- name: 'Step 3: Install Longhorn distributed storage'
  ansible.builtin.import_playbook: ../../../../atomic/storage/longhorn/1.7/helm/01-install.yml
- name: Cluster Ready
  hosts: k3s_masters
  gather_facts: false
  become: false
  tasks:
    - name: Get cluster status
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Node
        kubeconfig: /etc/rancher/k3s/k3s.yaml
      register: cluster_status_info
    - name: Format cluster status
      ansible.builtin.set_fact:
        cluster_status:
          stdout_lines: "{{ cluster_status_info.resources | map(attribute='metadata.name') | list }}"
    - name: Display completion message
      ansible.builtin.debug:
        msg:
          - ==========================================
          - K3s Cluster Deployment Complete
          - ==========================================
          - ✅ K3s server installed
          - ✅ Helm installed
          - ✅ Longhorn storage ready
          - ==========================================
          - 'Cluster Status:'
          - '{{ cluster_status.stdout_lines }}'
          - ==========================================
          - 'Next: Join workers with cluster/02-join-worker.yml'
          - ==========================================
