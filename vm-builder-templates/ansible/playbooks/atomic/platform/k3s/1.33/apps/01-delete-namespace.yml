- name: Delete Kubernetes namespace
  hosts: "{{ target_hosts | default('k3s_masters') }}"
  gather_facts: false
  become: false
  vars:
    namespace_name: "{{ namespace | default('') }}"
  vars_prompt:
    - name: namespace_name_prompt
      prompt: Enter namespace to delete
      private: false
  tasks:
    - name: Validate namespace parameter
      ansible.builtin.assert:
        that: [namespace_name is defined, namespace_name | length > 0]
        fail_msg: namespace parameter is required
    - name: Check if namespace exists
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Namespace
        name: '{{ namespace_name }}'
        kubeconfig: /etc/rancher/k3s/k3s.yaml
      register: ns_check
      failed_when: false
    - name: Skip if namespace does not exist
      ansible.builtin.debug:
        msg: Namespace {{ namespace_name }} does not exist, skipping deletion
      when: ns_check.resources | length == 0
    - name: Delete namespace
      kubernetes.core.k8s:
        api_version: v1
        kind: Namespace
        name: '{{ namespace_name }}'
        state: absent
        wait: true
        wait_timeout: 300
        kubeconfig: /etc/rancher/k3s/k3s.yaml
      when: ns_check.resources | length > 0
    - name: Verify namespace deletion
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Namespace
        name: '{{ namespace_name }}'
        kubeconfig: /etc/rancher/k3s/k3s.yaml
      register: ns_verify
      failed_when: ns_verify.resources | length > 0
      when: ns_check.resources | length > 0
    - name: Display deletion summary
      ansible.builtin.debug:
        msg:
          - ==========================================
          - Namespace Deletion Complete
          - ==========================================
          - 'Namespace: {{ namespace_name }}'
          - "Status: {{ 'Deleted' if ns_check.resources | length > 0 else 'Did not exist' }}"
          - ==========================================
