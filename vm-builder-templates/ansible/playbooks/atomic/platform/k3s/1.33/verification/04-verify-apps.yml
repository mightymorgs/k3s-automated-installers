#
#   # ========== VERSION COMPATIBILITY ==========
#   compatibility:
#     primary_component:
#       name: "k3s"
#       folder_version: "1.33"
#       supported_versions: ["1.30.0+", "1.33.x"]
#       version_range: ">=1.30.0"
