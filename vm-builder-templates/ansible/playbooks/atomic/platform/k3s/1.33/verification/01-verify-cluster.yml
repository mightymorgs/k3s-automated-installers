#       - k3s: "1.33.5"
#         os: "ubuntu-24.04"
#         result: "success"
#         test_date: "2025-11-10"
#         notes: "Verifies nodes, system pods, Longhorn, NFS PVC, and Traefik CRDs"
#
#   # ========== TRADITIONAL METADATA ==========
#   batch_id: "20260122_v31_metadata_migration"
#   dependencies: ["k3s_installed", "longhorn_installed", "nfs_pvc_configured"]
#   provides: ["k3s_cluster_verified", "storage_verified"]
#   tags: ["k3s", "verification", "health-check"]
#   estimated_duration: 60
#   parallel_safe: true
#   idempotent: true
#   description: Verify K3s cluster health, storage, and component status
- name: Verify K3s Cluster Installation
  hosts: "{{ target_hosts | default('k3s_masters') }}"
  gather_facts: true
  become: false
  vars:
    kubeconfig_path: /etc/rancher/k3s/k3s.yaml
    longhorn_namespace: longhorn-system
    nfs_pvc_name: nfs-pvc
    nfs_namespace: default
  tasks:
    - name: Display verification information
      ansible.builtin.debug:
        msg:
          - ==========================================
          - K3s Cluster Verification
          - ==========================================
          - 'Checking:'
          - '  - Node status'
          - '  - System pods'
          - '  - Longhorn storage'
          - '  - NFS PVC'
          - '  - Traefik CRDs'
          - ==========================================

    # ========== NODE VERIFICATION ==========
    - name: Get cluster nodes
      kubernetes.core.k8s_info:
        kind: Node
        kubeconfig: '{{ kubeconfig_path }}'
      register: cluster_nodes
      changed_when: false
    - name: Verify nodes are Ready
      ansible.builtin.assert:
        that:
          - cluster_nodes.resources | length > 0
          - >-
            cluster_nodes.resources
            | selectattr('status.conditions', 'defined')
            | selectattr('status.conditions', 'selectattr', 'type', 'equalto', 'Ready')
            | selectattr('status.conditions', 'selectattr', 'status', 'equalto',
            'True')
            | list | length == cluster_nodes.resources | length
        fail_msg: Not all nodes are in Ready state
        success_msg: All {{ cluster_nodes.resources | length }} node(s) are Ready

    # ========== SYSTEM PODS VERIFICATION ==========
    - name: Get kube-system pods
      kubernetes.core.k8s_info:
        kind: Pod
        namespace: kube-system
        kubeconfig: '{{ kubeconfig_path }}'
      register: kube_system_pods
      changed_when: false
    - name: Check kube-system pods are running
      ansible.builtin.assert:
        that:
          - kube_system_pods.resources | length > 0
          - kube_system_pods.resources | rejectattr('status.phase', 'equalto', 'Running')
            | list | length == 0
        fail_msg: Some kube-system pods are not running
        success_msg: All {{ kube_system_pods.resources | length }} kube-system pods
          are running

    # ========== LONGHORN VERIFICATION ==========
    - name: Check if Longhorn namespace exists
      kubernetes.core.k8s_info:
        kind: Namespace
        name: '{{ longhorn_namespace }}'
        kubeconfig: '{{ kubeconfig_path }}'
      register: longhorn_ns
      changed_when: false
    - name: Get Longhorn pods
      kubernetes.core.k8s_info:
        kind: Pod
        namespace: '{{ longhorn_namespace }}'
        kubeconfig: '{{ kubeconfig_path }}'
      register: longhorn_pods
      changed_when: false
      when: longhorn_ns.resources | length > 0
    - name: Verify Longhorn pods are running
      ansible.builtin.assert:
        that:
          - longhorn_pods.resources | length > 0
          - longhorn_pods.resources | rejectattr('status.phase', 'equalto', 'Running')
            | list | length == 0
        fail_msg: Some Longhorn pods are not running
        success_msg: All {{ longhorn_pods.resources | length }} Longhorn pods are
          running
      when: longhorn_ns.resources | length > 0
    - name: Verify Longhorn StorageClass exists
      kubernetes.core.k8s_info:
        kind: StorageClass
        name: longhorn
        kubeconfig: '{{ kubeconfig_path }}'
      register: longhorn_sc
      changed_when: false
    - name: Check Longhorn StorageClass
      ansible.builtin.assert:
        that: [longhorn_sc.resources | length > 0]
        fail_msg: Longhorn StorageClass not found
        success_msg: Longhorn StorageClass is configured

    # ========== NFS PVC VERIFICATION ==========
    - name: Check NFS PVC status
      kubernetes.core.k8s_info:
        kind: PersistentVolumeClaim
        name: '{{ nfs_pvc_name }}'
        namespace: '{{ nfs_namespace }}'
        kubeconfig: '{{ kubeconfig_path }}'
      register: nfs_pvc
      changed_when: false
      failed_when: false
    - name: Verify NFS PVC is bound
      ansible.builtin.assert:
        that:
          - nfs_pvc.resources | length > 0
          - nfs_pvc.resources[0].status.phase == "Bound"
        fail_msg: NFS PVC is not bound
        success_msg: NFS PVC is bound and ready
      when: nfs_pvc.resources | default([]) | length > 0

    # ========== TRAEFIK CRD VERIFICATION ==========
    - name: Check for Traefik IngressRoute CRD
      kubernetes.core.k8s_info:
        kind: CustomResourceDefinition
        name: ingressroutes.traefik.io
        kubeconfig: '{{ kubeconfig_path }}'
      register: traefik_crd
      changed_when: false
      failed_when: false
    - name: Verify Traefik CRD exists
      ansible.builtin.assert:
        that: [traefik_crd.resources | length > 0]
        fail_msg: Traefik IngressRoute CRD not found
        success_msg: Traefik CRDs are installed
      when: traefik_crd.resources | default([]) | length > 0

    # ========== SUMMARY ==========
    - name: Collect verification results
      ansible.builtin.set_fact:
        verification_summary:
          nodes:
            total: '{{ cluster_nodes.resources | length }}'
            ready: "{{ cluster_nodes.resources | selectattr('status.conditions',\
              \ 'defined') | selectattr('status.conditions', 'selectattr', 'type',\
              \ 'equalto', 'Ready') | selectattr('status.conditions', 'selectattr',\
              \ 'status', 'equalto', 'True') | list | length }}"
          kube_system_pods:
            total: '{{ kube_system_pods.resources | length }}'
            running: >-
              {{ kube_system_pods.resources | selectattr('status.phase', 'equalto', 'Running') | list | length }}
          longhorn:
            installed: '{{ longhorn_ns.resources | length > 0 }}'
            pods_total: '{{ longhorn_pods.resources | default([]) | length }}'
            pods_running: >-
              {{
                longhorn_pods.resources | default([])
                | selectattr('status.phase', 'equalto', 'Running')
                | list | length
              }}
            storageclass: '{{ longhorn_sc.resources | length > 0 }}'
          nfs:
            pvc_exists: '{{ nfs_pvc.resources | default([]) | length > 0 }}'
            pvc_bound: >-
              {{ nfs_pvc.resources | default([]) | length > 0 and nfs_pvc.resources[0].status.phase == 'Bound' }}
          traefik:
            crds_installed: '{{ traefik_crd.resources | default([]) | length > 0 }}'
    - name: Display verification summary
      ansible.builtin.debug:
        msg:
          - ==========================================
          - K3s Cluster Verification Summary
          - ==========================================
          - ''
          - 'Nodes: {{ verification_summary.nodes.ready }}/{{ verification_summary.nodes.total
            }} Ready'
          - >-
            Kube-System Pods:
            {{ verification_summary.kube_system_pods.running }}/{{ verification_summary.kube_system_pods.total
            }}
            Running
          - ''
          - 'Longhorn Storage:'
          - '  Installed: {{ verification_summary.longhorn.installed }}'
          - >-
            Pods:
            {{ verification_summary.longhorn.pods_running }}/{{ verification_summary.longhorn.pods_total
            }}
            Running
          - "  StorageClass: {{ 'Available' if verification_summary.longhorn.storageclass else 'Not Found' }}"
          - ''
          - 'NFS Storage:'
          - '  PVC Exists: {{ verification_summary.nfs.pvc_exists }}'
          - '  PVC Bound: {{ verification_summary.nfs.pvc_bound }}'
          - ''
          - 'Traefik:'
          - '  CRDs Installed: {{ verification_summary.traefik.crds_installed }}'
          - ''
          - ==========================================
          - >-
            Cluster Status:
            {{
              'HEALTHY'
              if (verification_summary.nodes.ready == verification_summary.nodes.total
                  and verification_summary.kube_system_pods.running == verification_summary.kube_system_pods.total)
              else 'DEGRADED'
            }}
          - ==========================================
