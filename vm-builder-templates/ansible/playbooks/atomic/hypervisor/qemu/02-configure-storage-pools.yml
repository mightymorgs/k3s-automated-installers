- name: Configure libvirt storage pools
  hosts: hypervisor
  become: true

  tasks:
    - name: Ensure libvirt images directory exists
      ansible.builtin.file:
        path: /var/lib/libvirt/images
        state: directory
        owner: libvirt-qemu
        group: kvm
        mode: '0750'

    - name: Check if default storage pool exists
      ansible.builtin.command:
        cmd: virsh pool-info default
      register: pool_check
      changed_when: false
      failed_when: false

    - name: Define default storage pool
      ansible.builtin.command:
        cmd: >
          virsh pool-define-as default dir
          --source-path /dev/null
          --target /var/lib/libvirt/images
      when: pool_check.rc != 0
      changed_when: true

    - name: Start default storage pool
      ansible.builtin.command:
        cmd: virsh pool-start default
      when: pool_check.rc != 0
      changed_when: true

    - name: Enable autostart for default storage pool
      ansible.builtin.command:
        cmd: virsh pool-autostart default
      when: pool_check.rc != 0
      changed_when: true

    - name: Download Ubuntu 24.04 cloud image
      ansible.builtin.get_url:
        url: https://cloud-images.ubuntu.com/releases/24.04/release/ubuntu-24.04-server-cloudimg-amd64.img
        dest: /var/lib/libvirt/images/ubuntu-24.04-server-cloudimg-amd64.img
        mode: '0644'
        owner: libvirt-qemu
        group: kvm
      register: cloud_image

    - name: Display cloud image info
      ansible.builtin.debug:
        msg: "Ubuntu 24.04 cloud image ready at /var/lib/libvirt/images/ubuntu-24.04-server-cloudimg-amd64.img"
