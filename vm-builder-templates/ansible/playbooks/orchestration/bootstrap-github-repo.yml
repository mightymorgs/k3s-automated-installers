#   description: Bootstrap GitHub repository, push code, and set Actions secret (BWS token) using atomic playbooks
- name: PHASE 1 - Ensure GitHub private repo exists
  ansible.builtin.import_playbook: ../atomic/tools/github/01-create-private-repo.yml
  vars:
    target_repo_name: "{{ target_repo_name | default('media-stack') }}"
- name: PHASE 2 - Push repository contents
  ansible.builtin.import_playbook: ../atomic/tools/github/03-push-repo.yml
  vars:
    target_repo_name: "{{ target_repo_name | default('media-stack') }}"
- name: PHASE 3 - Set Actions secret (BWS_ACCESS_TOKEN)
  ansible.builtin.import_playbook: ../atomic/tools/github/02-set-actions-secret-bws-token.yml
  vars:
    target_repo_name: "{{ target_repo_name | default('media-stack') }}"
