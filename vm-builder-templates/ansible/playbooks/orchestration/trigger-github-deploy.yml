- name: PHASE 1 - Dispatch deploy workflow
  ansible.builtin.import_playbook: ../atomic/tools/github/04-dispatch-workflow.yml
  vars:
    target_repo_name: "{{ target_repo_name | default('media-stack') }}"
    target_ref: "{{ target_ref | default('main') }}"
- name: PHASE 2 - Wait for completion
  ansible.builtin.import_playbook: ../atomic/tools/github/05-wait-workflow-complete.yml
  vars:
    target_repo_name: "{{ target_repo_name | default('media-stack') }}"
    target_run_id: "{{ hostvars['localhost'].dispatched_run_id | default('') }}"
