# ========================================
# PHASE 1: Install Bootstrap Tools
# ========================================
- name: PHASE 1.1 - Install BWS CLI
  ansible.builtin.import_playbook: ../atomic/tools/bws/01-install-cli.yml
  vars:
    target_hosts: localhost

- name: PHASE 1.2 - Install GitHub CLI
  ansible.builtin.import_playbook: ../atomic/tools/github/01-install-gh-cli.yml
  vars:
    target_hosts: localhost

- name: PHASE 1.3 - Install Ansible
  ansible.builtin.import_playbook: ../atomic/tools/ansible/01-install-ansible.yml
  vars:
    target_hosts: localhost

# ========================================
# PHASE 2: Configure Networking
# ========================================
- name: PHASE 2 - Join Tailscale Network with Auto-Derived Tags
  ansible.builtin.import_playbook: ../atomic/networking/tailscale/host/01-join-via-oauth.yml
  vars:
    target_hosts: localhost
    ansible_connection: local

# ========================================
# PHASE 3: Verify Bootstrap Components
# ========================================
- name: PHASE 3.1 - Verify Bootstrap Tools
  ansible.builtin.import_playbook: ../atomic/verification/vm-bootstrap/01-verify-tools.yml
  vars:
    target_hosts: localhost

- name: PHASE 3.2 - Verify Network Connectivity
  ansible.builtin.import_playbook: ../atomic/verification/vm-bootstrap/02-verify-network.yml
  vars:
    target_hosts: localhost

# ========================================
# PHASE 4: Write Back Bootstrap State to BWS
# ========================================
- name: PHASE 4 - Write Back Bootstrap State to BWS
  ansible.builtin.import_playbook: ../atomic/tools/secrets/06-write-back-bootstrap-state.yml
  vars:
    inventory_secret_name: "{{ inventory_secret_name | default('inventory/' ~ ansible_hostname) }}"

# ========================================
# PHASE 5: Cleanup Temporary Files
# ========================================
- name: PHASE 5 - Cleanup Temporary Files and Caches
  ansible.builtin.import_playbook: ../atomic/platform/ubuntu/common/cleanup/01-remove-temp-files.yml
  vars:
    target_hosts: localhost

# ========================================
# PHASE 6: Display Golden Master Bootstrap Summary
# ========================================
- name: PHASE 6 - Display Golden Master Bootstrap Summary
  ansible.builtin.import_playbook: ../atomic/verification/vmbootstrap/03-display-summary.yml
  vars:
    target_hosts: localhost
    ansible_connection: local
