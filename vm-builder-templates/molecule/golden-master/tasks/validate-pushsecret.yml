---
# Molecule validation: PushSecret templates
#
# Rules checked:
#   - pushsecret-exists (WARNING): Apps with credentials metadata should have pushsecret.yaml.j2
#   - pushsecret-naming (WARNING): PushSecret name matches app_name + '-push' pattern
#   - pushsecret-vault-path (WARNING): remoteKey uses apps/data/ prefix

# ============================================================
# DISCOVER PUSHSECRET TEMPLATES
# ============================================================

- name: "Find PushSecret templates for {{ app_path | basename }}"
  ansible.builtin.find:
    paths: "{{ app_path }}/templates"
    patterns: "*pushsecret*"
    file_type: file
  register: pushsecret_templates

# ============================================================
# DISCOVER INSTALL PLAYBOOKS (for credentials metadata check)
# ============================================================

- name: "Find install playbooks for {{ app_path | basename }} (pushsecret check)"
  ansible.builtin.find:
    paths: "{{ app_path }}/install"
    patterns: "*.yml"
    file_type: file
  register: install_playbooks_for_push

- name: "Read install playbooks for credentials check"
  ansible.builtin.slurp:
    src: "{{ item.path }}"
  register: install_contents_for_push
  loop: "{{ install_playbooks_for_push.files }}"
  loop_control:
    label: "{{ item.path | basename }}"
  when: install_playbooks_for_push.files | length > 0

# ============================================================
# RULE: pushsecret-exists (WARNING)
#
# Apps that have credentials: metadata in their install playbook
# header should also have a pushsecret.yaml.j2 template.
# Without it, credentials stay in K8s Secrets only — they are not
# pushed to Vault or synced to BWS via the credential pipeline.
# ============================================================

- name: "Check if install playbooks have credentials metadata"
  ansible.builtin.set_fact:
    has_credentials_metadata: >-
      {{ (install_contents_for_push.results | default([]))
         | selectattr('content', 'defined')
         | map(attribute='content')
         | map('b64decode')
         | select('search', 'credentials:')
         | list | length > 0 }}

- name: "WARNING [pushsecret-exists] {{ app_path | basename }}"
  ansible.builtin.assert:
    that:
      - pushsecret_templates.files | length > 0
    fail_msg: >-
      {{ app_path | basename }} has credentials: metadata in install playbook
      but no pushsecret template in templates/. Without a PushSecret CRD,
      credentials are not pushed to Vault for the credential pipeline.
    success_msg: "PASS: PushSecret template exists"
  when: has_credentials_metadata | bool
  register: rule_pushsecret_exists
  failed_when: false

- name: "Record pushsecret-exists results"
  ansible.builtin.set_fact:
    validation_results: >-
      {{ validation_results | default([]) + [{
        'app': app_path | basename,
        'rule': 'pushsecret-exists',
        'category': 'pushsecret',
        'severity': 'warning',
        'files_checked': 1 if has_credentials_metadata | bool else 0,
        'failures': 1 if (has_credentials_metadata | bool and
          rule_pushsecret_exists is defined and
          rule_pushsecret_exists.failed | default(false)) else 0,
        'passed': not (has_credentials_metadata | bool) or
          (rule_pushsecret_exists is defined and
           not rule_pushsecret_exists.failed | default(false))
      }] }}

# ============================================================
# VALIDATE PUSHSECRET CONTENT (only if templates exist)
# ============================================================

- name: "Validate PushSecret templates for {{ app_path | basename }}"
  when: pushsecret_templates.files | length > 0
  block:

    - name: "Read PushSecret templates for {{ app_path | basename }}"
      ansible.builtin.slurp:
        src: "{{ item.path }}"
      register: pushsecret_contents
      loop: "{{ pushsecret_templates.files }}"
      loop_control:
        label: "{{ item.path | basename }}"

    # ================================================================
    # RULE: pushsecret-naming (WARNING)
    #
    # PushSecret name should follow the convention: app_name + '-push'.
    # This enables consistent kubectl queries:
    #   kubectl get pushsecret -A -l app.kubernetes.io/component=push-secret
    # ================================================================

    - name: "WARNING [pushsecret-naming] {{ app_path | basename }}"
      ansible.builtin.assert:
        that:
          - >-
            (item.content | b64decode) is search('name:.*-push')
            or (item.content | b64decode) is search('name:.*{{ app_name }}.*push')
        fail_msg: >-
          {{ item.source | basename }} PushSecret name does not follow the
          naming convention (app_name + '-push'). Use {{ '{{' }} app_name {{ '}}' }}-push.
        success_msg: "PASS: {{ item.source | basename }}"
      loop: "{{ pushsecret_contents.results }}"
      loop_control:
        label: "{{ item.source | basename }}"
      register: rule_pushsecret_naming
      failed_when: false

    - name: "Record pushsecret-naming results"
      ansible.builtin.set_fact:
        validation_results: >-
          {{ validation_results | default([]) + [{
            'app': app_path | basename,
            'rule': 'pushsecret-naming',
            'category': 'pushsecret',
            'severity': 'warning',
            'files_checked': pushsecret_contents.results | length,
            'failures': rule_pushsecret_naming.results
              | selectattr('failed', 'equalto', true)
              | list | length,
            'passed': rule_pushsecret_naming.results
              | selectattr('failed', 'equalto', false)
              | list | length == rule_pushsecret_naming.results | length
          }] }}

    # ================================================================
    # RULE: pushsecret-vault-path (WARNING)
    #
    # remoteKey must use the apps/data/ prefix to write to the correct
    # Vault KV path. Without it, credentials end up in the wrong location
    # and sync-app-state.sh cannot find them.
    # ================================================================

    - name: "WARNING [pushsecret-vault-path] {{ app_path | basename }}"
      ansible.builtin.assert:
        that:
          - "'apps/data/' in (item.content | b64decode)"
        fail_msg: >-
          {{ item.source | basename }} does not use apps/data/ prefix in remoteKey.
          All PushSecret remoteKey paths must start with apps/data/app_name/
          for the credential pipeline (sync-app-state.sh) to find them.
        success_msg: "PASS: {{ item.source | basename }}"
      loop: "{{ pushsecret_contents.results }}"
      loop_control:
        label: "{{ item.source | basename }}"
      register: rule_pushsecret_vault_path
      failed_when: false

    - name: "Record pushsecret-vault-path results"
      ansible.builtin.set_fact:
        validation_results: >-
          {{ validation_results | default([]) + [{
            'app': app_path | basename,
            'rule': 'pushsecret-vault-path',
            'category': 'pushsecret',
            'severity': 'warning',
            'files_checked': pushsecret_contents.results | length,
            'failures': rule_pushsecret_vault_path.results
              | selectattr('failed', 'equalto', true)
              | list | length,
            'passed': rule_pushsecret_vault_path.results
              | selectattr('failed', 'equalto', false)
              | list | length == rule_pushsecret_vault_path.results | length
          }] }}

# ============================================================
# NO PUSHSECRET TEMPLATES — record N/A results
# ============================================================

- name: "Record N/A pushsecret-naming (no templates)"
  ansible.builtin.set_fact:
    validation_results: >-
      {{ validation_results | default([]) + [{
        'app': app_path | basename,
        'rule': 'pushsecret-naming',
        'category': 'pushsecret',
        'severity': 'warning',
        'files_checked': 0,
        'failures': 0,
        'passed': true
      }] }}
  when: pushsecret_templates.files | length == 0

- name: "Record N/A pushsecret-vault-path (no templates)"
  ansible.builtin.set_fact:
    validation_results: >-
      {{ validation_results | default([]) + [{
        'app': app_path | basename,
        'rule': 'pushsecret-vault-path',
        'category': 'pushsecret',
        'severity': 'warning',
        'files_checked': 0,
        'failures': 0,
        'passed': true
      }] }}
  when: pushsecret_templates.files | length == 0
