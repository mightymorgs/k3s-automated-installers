services:
  neo4j:
    image: neo4j:5.15-community
    container_name: idi-neo4j
    restart: unless-stopped
    stop_grace_period: 30s
    entrypoint: >
      bash -c '
        echo "Cleaning stale lock/pid files..." >&2;
        rm -f /var/lib/neo4j/run/neo4j.pid 2>/dev/null;
        find /data -name "store_lock" -delete 2>/dev/null;
        find /data -name "database_lock" -delete 2>/dev/null;
        find /data -name "write.lock" -delete 2>/dev/null;
        exec tini -g -- /startup/docker-entrypoint.sh neo4j
      '
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-idi-dev-password}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_server_memory_pagecache_size=512M
      - NEO4J_server_memory_heap_initial__size=512M
      - NEO4J_server_memory_heap_max__size=1G
    volumes:
      - ./idi-neo4j/data:/data
      - ./idi-neo4j/logs:/logs
      - ./idi-neo4j/import:/var/lib/neo4j/import
    networks:
      - idi-net
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p ${NEO4J_PASSWORD:-idi-dev-password} 'RETURN 1'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  idi-tools:
    build:
      context: .
      dockerfile: Dockerfile.idi-tools
    container_name: idi-tools
    profiles:
      - tools
    environment:
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-idi-dev-password}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
    volumes:
      - .:/app
    networks:
      - idi-net
    depends_on:
      neo4j:
        condition: service_healthy
    stdin_open: true
    tty: true

  vm-builder-web:
    build:
      context: .
      dockerfile: Dockerfile.vm-builder
    container_name: vm-builder-web
    command: web
    profiles:
      - web
    ports:
      - "8080:8080"
    environment:
      - BWS_ACCESS_TOKEN=${BWS_ACCESS_TOKEN:-}
      - TEMPLATES_REPO_PATH=/data/templates
    volumes:
      - web-data:/data
      - ./vm-builder/vm-builder-templates:/data/templates:ro
    networks:
      - idi-net

  idi-web:
    build:
      context: .
      dockerfile: Dockerfile.idi-web
    container_name: idi-web
    command: web
    profiles:
      - idi-web
    ports:
      - "8090:8090"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-idi-dev-password}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
    volumes:
      - .:/app
    networks:
      - idi-net
    depends_on:
      neo4j:
        condition: service_healthy

  ollama:
    image: ollama/ollama:latest
    container_name: idi-ollama
    profiles:
      - enrichment
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - idi-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  n8n:
    image: n8nio/n8n:latest
    container_name: idi-n8n
    profiles:
      - enrichment
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - GENERIC_TIMEZONE=${TIMEZONE:-America/New_York}
      - WEBHOOK_URL=http://localhost:5678/
      - NODE_FUNCTION_ALLOW_BUILTIN=fs,path,https,http,url
      - N8N_RUNNERS_MODE=internal
      - N8N_RUNNERS_ALLOW_BUILTIN_MODULES=fs,path,https,http,url
      - N8N_RUNNERS_MAX_PAYLOAD=67108864
      - N8N_RUNNERS_HEALTH_CHECK_INTERVAL=120
      - N8N_RUNNERS_MAX_OLD_SPACE_SIZE=4096
      - NODE_OPTIONS=--max-old-space-size=4096
      - N8N_SECURE_COOKIE=false
    volumes:
      - n8n-data:/home/node/.n8n
      - ./catalog/skills/api:/skills:rw
      - ./schemas/skill:/schemas:ro
      - ./catalog/specs:/specs:ro
    networks:
      - idi-net
    restart: unless-stopped

networks:
  idi-net:
    name: idi-net
    driver: bridge

volumes:
  web-data:
  ollama-data:
  n8n-data:
